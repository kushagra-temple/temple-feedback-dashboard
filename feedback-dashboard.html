ocus have become very erratic since the new update"}, {"sender": "DG US", "is_team": true, "date": "25/05", "text": "Entropy hasn’t changed I think."}, {"sender": "DG US", "is_team": true, "date": "25/05", "text": "What’s erratic about it"}, {"sender": "+91 99202 13572", "is_team": false, "date": "25/05", "text": "Its generally very high for me now all the time. Focus is also high for large blocks when I am not even doing any activity"}, {"sender": "+91 99202 13572", "is_team": false, "date": "25/05", "text": "Will share specific examples going forward"}, {"sender": "+91 99202 13572", "is_team": false, "date": "25/05", "text": "Fyi - my mom was wearing the temple since last evening till an hour ago so ignore that data"}, {"sender": "DG US", "is_team": true, "date": "25/05", "text": "I agree. Let me get to the bottom of this."}, {"sender": "+91 99202 13572", "is_team": false, "date": "26/05", "text": "IMG-20260526-WA0000.jpg (file attached)\nEveryday when I get up from the bed is when I hit lowest entropy momentarily. Doesnt feel accurate or real."}, {"sender": "+91 99202 13572", "is_team": false, "date": "26/05", "text": "IMG-20260526-WA0001.jpg (file attached)"}, {"sender": "+91 99202 13572", "is_team": false, "date": "26/05", "text": "I had very good sleep in the night. But the entropy was always in “stimulated” zone. Its a bit paradoxical that same sleep summary is saying that I had high entropy and great sleep quality and recovery"}, {"sender": "+91 99202 13572", "is_team": false, "date": "26/05", "text": "Both brain flow and entropy do not seem to be adding meaningfully to my sleep score or recovery score - I might be wrong but thats the sense I am getting"}, {"sender": "Eshaan Temple", "is_team": true, "date": "26/05", "text": "Yes Akshant. Currently physical recovery factors in HRV, RHR and Deep Sleep duration\nCognitive recovery factors in time asleep, restorative sleep quantity and sleep efficiency.\nWorkstream to ingress entropy and BF values in sleep quality and recoveries is in progress. Releasing this soon."}, {"sender": "DG US", "is_team": true, "date": "26/05", "text": "We need different names for entropy levels in the night <This message was edited>"}, {"sender": "+91 99202 13572", "is_team": false, "date": "26/05", "text": "“Activity detected” is not using the context. For eg., when I finish running activity, it is picking up next 5 mins as high HR and prompting me to add a activity"}, {"sender": "+91 99202 13572", "is_team": false, "date": "26/05", "text": "IMG-20260526-WA0004.jpg (file attached)"}, {"sender": "+91 99202 13572", "is_team": false, "date": "26/05", "text": "Think we should have a 15 mins cutoff for activity prompt - getting too many 5-10 mins prompt due to just walking"}, {"sender": "DG US", "is_team": true, "date": "26/05", "text": "Agree. Was thinking 20 minutes."}, {"sender": "+91 99202 13572", "is_team": false, "date": "28/05", "text": "IMG-20260528-WA0001.jpg (file attached)\nI am not seeing any data in my charts post 11 am yesterday."}, {"sender": "+91 99202 13572", "is_team": false, "date": "28/05", "text": "No eating detection also post 2 pm."}, {"sender": "+91 99202 13572", "is_team": false, "date": "28/05", "text": "Fyi - I was on low battery in the evening and the battery died while I was sleeping"}, {"sender": "Eshaan Temple", "is_team": true, "date": "28/05", "text": "Getting this checked, Akshant"}, {"sender": "DG US", "is_team": true, "date": "28/05", "text": "We need to find a way to sync in the background without draining too much battery"}, {"sender": "+91 99202 13572", "is_team": false, "date": "28/05", "text": "IMG-20260528-WA0011.jpg (file attached)\nSomething is off. Not seeing any data even for today"}, {"sender": "DG US", "is_team": true, "date": "28/05", "text": "Yeah, something is off. Checking asap"}, {"sender": "Eshaan Temple", "is_team": true, "date": "28/05", "text": "Akshant - getting your device replaced. Team has checked this and seems like some issue with flash storage."}, {"sender": "+91 99202 13572", "is_team": false, "date": "28/05", "text": "Got it."}, {"sender": "+91 99202 13572", "is_team": false, "date": "28/05", "text": "Was my wearing it on low charge a reason for this?"}, {"sender": "DG US", "is_team": true, "date": "28/05", "text": "No, some manufacturing testing that we need to do it seems. We will get your device and diagnose what we need to change"}, {"sender": "+91 99202 13572", "is_team": false, "date": "29/05", "text": "IMG-20260601-WA0009.jpg (file attached)\nFocus being high 7-10 pm is not explainable for me. I wasnt doing anything with high focus."}, {"sender": "DG US", "is_team": true, "date": "29/05", "text": "Were you still?"}, {"sender": "+91 99202 13572", "is_team": false, "date": "29/05", "text": "I was at home. So mostly sitting but not still like watching a movie"}, {"sender": "DG US", "is_team": true, "date": "29/05", "text": "Should get fixed in next update. We screwed up the focus algo recently."}, {"sender": "DG US", "is_team": true, "date": "29/05", "text": "The fix was released yesterday, but then rolled back due to some other issue."}, {"sender": "+91 99202 13572", "is_team": false, "date": "30/05", "text": "I did a 36 hour fast. Zero calories. As expected, Temple did not detect any chewing. Would have been cool for the product to pick up that I havent eaten (and hence fasting) and bake that into my morning insight card."}, {"sender": "+91 99202 13572", "is_team": false, "date": "30/05", "text": "Wdyt?"}, {"sender": "Eshaan Temple", "is_team": true, "date": "30/05", "text": "Very cool! We’ll bake this in. Fasting will be great lever for giving commentary in morning insights."}, {"sender": "+91 99202 13572", "is_team": false, "date": "01/06", "text": "IMG-20260601-WA0002.jpg (file attached)"}, {"sender": "+91 99206 42098", "is_team": false, "date": "01/06", "text": "IMG-20260601-WA0001.jpg (file attached)"}, {"sender": "DG US", "is_team": true, "date": "01/06", "text": "We are overtly indexed on sleep duration for recovery."}, {"sender": "+91 99202 13572", "is_team": false, "date": "01/06", "text": "Also, it feels like we are relying too much on past sleep duration for predicting how much I should sleep today. If I clock 9 hours a few days, it should not take 7 hours as low sleep duration. Infact, 9 hours might be over sleeping. (My numbers could be diff, just taking examples here)"}, {"sender": "Sahil Kaul", "is_team": true, "date": "01/06", "text": "Getting this checked for your data, @⁨~Akshant⁩ - to see if the algo is over indexing on high sleep days to give you the sleep sufficiency target."}, {"sender": "Sahil Kaul", "is_team": true, "date": "01/06", "text": "Hello @⁨~Akshant⁩ - we checked this case in detail. Here are the details:\n*Your Sleep median* : ~8 hours (For the last 21 days of available data)\n*Sleep for previous night* : 6h 20m (About 100 mins delta from median)\n*Accumulated Debt* : Around 110 mins (Small debt of 10m from before days)\nThere are 2 changes we've noted that would help understanding:\n- More visibility into your target sleep time, sleep sufficiency and factors that affect this. (Should refrain from going into calculations though)\n- Tone down the % debt spread over days - we would have gone to around 8h30 - 8h45m still. Would that have been better target for you, Akshant?"}, {"sender": "+91 99202 13572", "is_team": false, "date": "03/06", "text": "Hey Sahil - I will revert on this. Sorry missed this message"}, {"sender": "+91 99202 13572", "is_team": false, "date": "03/06", "text": "IMG-20260603-WA0001.jpg (file attached)"}, {"sender": "+91 99202 13572", "is_team": false, "date": "03/06", "text": "“Possible activity detected” message came even though my activity was on. Needs to be fixed"}, {"sender": "+91 99202 13572", "is_team": false, "date": "03/06", "text": "IMG-20260603-WA0002.jpg (file attached)\nThe zone legends should be different colors. Also, if we are starting from zone 0, there should be 6 bars, currently there are only 5."}, {"sender": "Eshaan Temple", "is_team": true, "date": "03/06", "text": "Should not happen. Will get this fixed"}, {"sender": "+91 99202 13572", "is_team": false, "date": "03/06", "text": "IMG-20260603-WA0003.jpg (file attached)\nHow do we explain the dip in focus and then a sharp jump. I was running at a consistent pace largely during this activity"}, {"sender": "Eshaan Temple", "is_team": true, "date": "03/06", "text": "Solving for focus during physical activity is WIP. Will get back here."}, {"sender": "Eshaan Temple", "is_team": true, "date": "03/06", "text": "This is a bug. Reporting this. HR zones have distinct colours. Checking what broke in your case."}, {"sender": "Eshaan Temple", "is_team": true, "date": "03/06", "text": "Akshant - a device reboot happened while you were working out at 9:11am BST.\nDue to this possible auto activity got triggered as previous context of workout was lost.\nWe have figured the bug in firmware code that caused the reboot. Hot fix releasing tonight."}, {"sender": "+91 99202 13572", "is_team": false, "date": "04/06", "text": "IMG-20260604-WA0000.jpg (file attached)\nToday’s min shows 24 but the min in the chart is 38"}, {"sender": "Eshaan Temple", "is_team": true, "date": "04/06", "text": "Will get this checked today."}, {"sender": "Eshaan Temple", "is_team": true, "date": "04/06", "text": "team has figured out the issue here. edge case of cached values not getting picked in a particular scenario.\nfixing this in today’s release"}, {"sender": "+91 99202 13572", "is_team": false, "date": "08/06", "text": "Whats the basis of sleep quality? I woke up in the night at 4 am and sleep quality scores were 4/10 for both deep and rem sleep. I slept again and woke up at 6 am. Both sleep scores went up (deep = 6 and rem = 8). Although there is no deep sleep between 4 to 6 am"}, {"sender": "+91 99202 13572", "is_team": false, "date": "08/06", "text": "IMG-20260608-WA0000.jpg (file attached)"}, {"sender": "Eshaan Temple", "is_team": true, "date": "08/06", "text": "Sleep quality depends on duration and Brain Flow factors during Deep and REM stages.\nWhen the sleep got updated, we recompute the sleep stages for entire duration (system is a probabilistic model rather than deterministic - so it recomputes deep and REM stages during entire sleep duration)\nHave received feedbacks here on changing sleep fragmentation. We are syncing with team today on how to handle this better."}]}, {"name": "Ankush", "group": "Ankush", "thread": [{"sender": "+91 98713 56021", "is_team": false, "date": "20/05", "text": "Hi Ankush - this group serves as your customer care, product feedback, or friendly help for any questions you might have. Feel free to ask for replacement devices/ tapes in case you lose your Temple or anything else"}, {"sender": "+91 99531 11122", "is_team": false, "date": "23/05", "text": "Hi Team Temple, hope y'all had a great productive week!"}, {"sender": "+91 99531 11122", "is_team": false, "date": "23/05", "text": "Thanks Karan for coming over on Tuesday and onboarding me. It was highly appreciated."}, {"sender": "+91 99531 11122", "is_team": false, "date": "23/05", "text": "I'm quite enjoying wearing the device, and compared to my Ultrahuman Air ring, it is far better on most aspects. Sharing a few thoughts / suggestions basis my 3 days of use:\n1. *To make the tape better*: the tape's stickiness strengthens over time. However by day 3 one starts to feel the glue stress on the skin which is akin to an old band-aid feels.\n2. *To make the tape better*: when you take off the tape after 3/4 days to recharge the device, some small dots appear on surface of the skin where it was mounted. This could vary from skin to skin type, but something to look out for.\n3. *To make the UI better*: many a times one munches onto something during a meeting etc. The device is so powerful that it catches everything and asks you to feed in what you ate. Can we consider adding an option to 'dismiss' the ask by the app, since one may want to feed ininfo on all major meals, but not on the tit-bits one eats through the day.\n4. *To make the battery life better*: its the first discharge of my device and it lasted 3.5 days. I'm assuming that overtime battery health will only deteriorate. It will be great if battery life can be increased to match the tape life.\nSharing these in the spirit of making Temple even better. There's no taking away from the fact that it is already awesome!"}, {"sender": "+91 98713 56021", "is_team": false, "date": "23/05", "text": "Thanks Ankush - really glad it's clicking.\nOn the points:\n1.⁠ ⁠The skin stress is most likely first-time adaptation. Should ease by your second or third cycle. Tell us if it doesn't.\n2.⁠ ⁠⁠On the small dots - quick check: were they sticky to the touch when you ran your finger over them, or just visible marks on the skin? Changes what we're looking at.\n3.⁠ ⁠⁠We believe every nibble deserves a journal entry. However, dismiss/ snooze on the eating prompt is on the roadmap.\n4.⁠ ⁠⁠Battery is built around the tape rhythm by design - we want you to change the tapes every 3-4 days to keep the skin comfortable. The discharge curve holds steady over time too - you won't see meaningful deterioration in normal use.\nLooking forward to more such feedback. Did you try the device on one of your Super bike rides yet?"}, {"sender": "Karan Temple CS", "is_team": true, "date": "02/06", "text": "Hey @⁨~Ankush Wadhera⁩ - how has the last week been for you? Hope the skin stress from tapes has subsided."}, {"sender": "+91 99531 11122", "is_team": false, "date": "02/06", "text": "Hey, thanks for checking in. 👍🏻\nThings are looking good and I’m enjoying my Temple. I think it’s just about getting used to it.\nI’ve been doing small experiments like alternating the placement on left and then on right temple on every subsequent charge.\nLast few days have been hectic so haven’t spent enough time on the app.\nIn the coming days I plan to check the correlation across a few common parameters on my Ultrahuman Air and Temple. Will share as I discover more.\nHeading for my global tech conference to Amsterdam so there’s going to be a lot of questions 🙂"}, {"sender": "Karan Temple CS", "is_team": true, "date": "02/06", "text": "Looking forward to hearing from you. Safe travels."}, {"sender": "+91 99531 11122", "is_team": false, "date": "12/06", "text": "Hi team, wanted to share few quick inputs basis my last 10 days of use while on a lot of overseas travel:\n1. Every 3.5 days when I take it off to charge and change the tape, it leaves residual glue on the device which needs to be cleaned. So some cleaning instructions will be helpful to ensure that one doesn’t damage the device / scratch the sensor.\n2. ⁠Around the sensor, you could consider raising the plastic to create a mini boundary wall of sorts so that the residual glue doesn’t slide over onto the sensor.\n3. ⁠One feature from the Ultrahuman Air that we may want to draw inspiration from is to create different modes that consume more vs less battery. So during travel, on a long flight, when I see I have less than 10-15% battery, if I can move to a ‘light’ mode that makes the battery last longer."}, {"sender": "Aman Temple", "is_team": true, "date": "12/06", "text": "Hi Ankush, thank you for your feedback. Addressing your points below:\nPoints 1 & 2: The device and tapes are designed to prevent residual glue from sticking, especially around the sensor area. Is this happening to you often? I hear you on the cleaning instructions suggestion. In the meantime, you can use a dry cloth or wet wipe to gently wipe the glue off.\nPoint 3: Point taken. I've conveyed the same to the product team.\nHope this helps. Please let me know if you have any further questions :) <This message was edited>"}, {"sender": "+91 99531 11122", "is_team": false, "date": "12/06", "text": "I feel that in trying to maximise the surface area of the glue, the current cutting around the sensor portion in the double sided tape is a bit too close to the sensor. Which is why when one takes off the 3.5 day old bandage from the device, residual glue tends to stay back close to the sensor and while wiping it off, it tends to rub off on the sensor part. Hope I’m able to explain and it’s making sense :)"}, {"sender": "+91 99531 11122", "is_team": false, "date": "12/06", "text": "Again, I’m only sharing areas for further improvement. There’s no taking away from the fact that this device is way ahead of the league 🙌🏻 <This message was edited>"}, {"sender": "Aman Temple", "is_team": true, "date": "12/06", "text": "Appreciate the feedback, Ankush. I've forwarded this to the relevant teams and will ask them to keep this in mind as we continue to iterate"}, {"sender": "Aman Temple", "is_team": true, "date": "12/06", "text": "That's exactly what we need! Keep it coming, if you have any more questions/suggestions please reach out :)"}, {"sender": "Aman Temple", "is_team": true, "date": "14/06", "text": "Hey Ankush, I double checked with my team on your feedback on wiping and residue. Are you removing the tape instantly after a shower or workout (times when you notice glue)?\nAnd FYI - the most optimal way to clean would be to use a wet wipe or an alcohol swab (as opposed to a dry cloth)"}, {"sender": "+91 99531 11122", "is_team": false, "date": "14/06", "text": "Thanks for tip on using alcohol swabs/ wet wipes 👍🏻\nOn the last 2 occasions when I’ve noticed this, it’s not been after a shower or a workout. Rather it’s bern at the fag end of the battery charge when I had to remove it put it on the charger"}, {"sender": "Aman Temple", "is_team": true, "date": "15/06", "text": "This has happened a couple of times but after workouts/showers, so thanks for your feedback. Have conveyed this to the tape team <This message was edited>"}, {"sender": "+91 99531 11122", "is_team": false, "date": "15/06", "text": "VID-20260616-WA0000.mp4 (file attached)\nThought I’ll share a video. This time the residual was much lesser than the last 2 times but hopefully it helps you see what I meant.\n10 mins is 10 % 🙂"}, {"sender": "Aman Temple", "is_team": true, "date": "15/06", "text": "Hi Ankush, thank you for the feedback and the detailed video. The team is working on newer versions of tapes, and I will ensure this feedback is relayed to them. In the meantime, please continue to use wet wipes or alcohol swabs to remove the residual glue"}, {"sender": "+91 99531 11122", "is_team": false, "date": "15/06", "text": "Sharing an idea for making this even more popular than it already is.\nBefore that, I must say that in the last 2 weeks I’ve come across folks in every city I visited - Amsterdam, Copenhagen, Milan and now in Bhutan where people are asking me how did I get one 🙂.. so it’s super popular and a lot of peeps are very inquisitive and know something about Temple. This is beyond folks who stop and ask me (as they would other early adopters) what this device is etc.\nSo, back to the idea:\nIn my field of work, one of the most unassuming proponents of wearables for a healthier life that I’ve come across is Chandrababu Naidu. He’s been wearing the Ultrahuman Air for over a year now (if not longer) and has told me personally on our 1:1s that his primary use is to see assess and adjust his quality of sleep.\nSo if you have a way to get to him and try out TEMPLE, it will help spread awareness about it in a very different circle. I’ll be happy to make the connection as well. Let me know 🙏🏻"}]}, {"name": "Dhruv B", "group": "Dhruv B", "thread": [{"sender": "Dhruv Bhutiani", "is_team": false, "date": "11/06", "text": "Hey guys"}, {"sender": "Ramni", "is_team": true, "date": "11/06", "text": "Hi Dhruv,\nIt was great to meet you today!\nConsider this group your direct line to us.\nPlease feel free to use it for any feedback, queries, things you like as well as those you don't.\nCheers\nRamni"}, {"sender": "Dhruv Bhutiani", "is_team": false, "date": "11/06", "text": "Will do, thanks"}, {"sender": "Dhruv Bhutiani", "is_team": false, "date": "15/06", "text": "Hey guys, logged in my first workout today - missed the rep and excercise logging on the app itself like whoop does. Are we planning to build this internally or integrating with any 3p app to log the details?\nI use this to map my progress on previous workouts and also helps me keep my workout plans in place. I also ask my trainer to send me my workout plans on Whoop when I am not working out with him."}, {"sender": "Ramni", "is_team": true, "date": "15/06", "text": "Hi Dhruv - yes this is something that we are absolutely integrating into Temple. We will launch Automated Set Detection soon enough, which will help record your workouts. I will keep you posted when this feature is released.\nFor now, you can log an activity and check how your Entropy curve is doing while you work out. With each set, ideally your Entropy should rise and subsequently lower while you rest between sets. The goal here is to push your Entropy higher while you perform a set and notice how it falls when you rest - it'll help you gauge your personal Optimal Resting Period between sets too. Overall mapping Entropy across strength training will tell you the quality of your sets and the scope to push more!"}, {"sender": "Ramni", "is_team": true, "date": "15/06", "text": "Also, did you manage to wear the Temple during the rides in HK? :) Anything interesting that popped up for you?"}, {"sender": "Dhruv Bhutiani", "is_team": false, "date": "15/06", "text": "Looking forward to the changes"}, {"sender": "Dhruv Bhutiani", "is_team": false, "date": "15/06", "text": "I did, no significant changes though. Minor heart rate related changes only"}, {"sender": "Ramni", "is_team": true, "date": "15/06", "text": "Aah got it!"}]}, {"name": "Dr Apoorva", "group": "Dr Apoorva", "thread": [{"sender": "Dr. Apoorva", "is_team": false, "date": "15/05", "text": "😃Superb\nExcited !"}, {"sender": "Eshaan Temple", "is_team": true, "date": "16/05", "text": "Hey Dr. Apoorva! Really glad to have you onboard 👋\nCo-building this with you, so your perspective means a lot: anything you notice, love, or wish worked differently, just drop it here.\nLooking forward to it! 🎉\nEshaan, Product @ Temple"}, {"sender": "Dr. Apoorva", "is_team": false, "date": "16/05", "text": "Thanks :)\nI was wearing it overnight and all seems to be comfortable. There is no weight and after a while one forgets there is something on face"}, {"sender": "Dr. Apoorva", "is_team": false, "date": "16/05", "text": "Washed face multiple times - all okay still"}, {"sender": "DG US", "is_team": true, "date": "16/05", "text": "After washing the face, please just press the temple against the skin for 2 seconds to ooze out any water stuck between the skin and the temple.\nThis is not a must do, because temple base plate and tapes have in built drainage, but a nice to do if you remember doing it."}, {"sender": "Dr. Apoorva", "is_team": false, "date": "16/05", "text": "I asked Dad to use my temple , I went to profile and changed gender / weight / height and it instantly changed parameters. Not sure if temple can be shared btw people"}, {"sender": "Dr. Apoorva", "is_team": false, "date": "16/05", "text": "Got it, makes sense\nI did that instinctively"}, {"sender": "DG US", "is_team": true, "date": "16/05", "text": "Temple can’t be shared between people. It has to be reset before you share it with someone. And the reset functionality hasn’t been built yet."}, {"sender": "Dr. Apoorva", "is_team": false, "date": "16/05", "text": "Oh oh oh , I thought so. Understood"}, {"sender": "Dr. Apoorva", "is_team": false, "date": "16/05", "text": "I am wearing it on my left side now. Find it more comfortable to be on non dominant side"}, {"sender": "DG US", "is_team": true, "date": "16/05", "text": "Cool, hope no big difference in metrics between left and right 🙂"}, {"sender": "Dr. Apoorva", "is_team": false, "date": "16/05", "text": "No it’s similar , Thank god !"}, {"sender": "Dr. Apoorva", "is_team": false, "date": "16/05", "text": "Also the chip on temple ( main area ) - can finger touch that area ? Or we supposed to clean it with tissue paper if finger touch that area ?"}, {"sender": "DG US", "is_team": true, "date": "16/05", "text": "Should be fine for minor touches. If it becomes visibly greasy, then it’s an issue. For example, clean it after you touch it after having a aloo parantha 😃. Normal touches are totally cool <This message was edited>"}, {"sender": "Dr. Apoorva", "is_team": false, "date": "16/05", "text": "Last aloo parantha I had was 10 years ago😅But my issue is powder from gloves. I saw it on screen so cleaned it gently with tissue paper."}, {"sender": "DG US", "is_team": true, "date": "16/05", "text": "Cool, makes sense. Never a bad idea to clean."}, {"sender": "Dr. Apoorva", "is_team": false, "date": "16/05", "text": "Okay 👌\nI tracked my sleep and I am very proud that in morning I saw 99% efficiency! I am just excited to know I slept well"}, {"sender": "Dr. Apoorva", "is_team": false, "date": "16/05", "text": "Positive feedback and Good mood to start day !"}, {"sender": "Dr. Apoorva", "is_team": false, "date": "16/05", "text": "Also it asked me keep sipping water today for important HRV- that is also cool ! Reminder for water since I don’t drink much water"}, {"sender": "Dr. Apoorva", "is_team": false, "date": "16/05", "text": "Positive reinforcement!"}, {"sender": "Dr. Apoorva", "is_team": false, "date": "16/05", "text": "Hey have some questions from my patients from US Embassy, Russian Embassy and Spainish Embassy.\n- Where is the manufacturing? Is it made in India ?\n- ⁠One full charge allows you to wear Temple for how many days/ hours\n- ⁠Since it’s a small chip attached to critical area- mind! Does the wireless waves and intricate network affects the mind / health !"}, {"sender": "Dr. Apoorva", "is_team": false, "date": "16/05", "text": "<Media omitted>"}, {"sender": "Dr. Apoorva", "is_team": false, "date": "16/05", "text": "<Media omitted>"}, {"sender": "Dr. Apoorva", "is_team": false, "date": "16/05", "text": "<Media omitted>"}, {"sender": "Dr. Apoorva", "is_team": false, "date": "16/05", "text": "Also they want to know when they can buy it !!\nAll my surgeries today started with discussion on temple !!!!"}, {"sender": "DG US", "is_team": true, "date": "16/05", "text": "Manufacturing in India.\nOne full charge lasts for 2.5-4 days.\nThere is ZERO radiation towards the body side. Our Bluetooth is a custom made ultra low powered Bluetooth, that only emits waves away from the body. A dielectric coating on the body side protects the body from any little radiation that we use."}, {"sender": "Dr. Apoorva", "is_team": false, "date": "16/05", "text": "Okay cool\nWill let them know !"}, {"sender": "DG US", "is_team": true, "date": "16/05", "text": "We can get your patients on Temple first week of June onwards."}, {"sender": "Dr. Apoorva", "is_team": false, "date": "16/05", "text": "Okay nice , il let them know"}, {"sender": "Dr. Apoorva", "is_team": false, "date": "16/05", "text": "Also will there be more color options in future ? The patient wanted to know ?"}, {"sender": "DG US", "is_team": true, "date": "16/05", "text": "Three more -\nReflective Silver\nTrue Gold\nMatte Titanium"}, {"sender": "Dr. Apoorva", "is_team": false, "date": "16/05", "text": "These three are in addition to what I am wearing and you wore yesterday?"}, {"sender": "DG US", "is_team": true, "date": "16/05", "text": "Mine was reflective silver"}, {"sender": "DG US", "is_team": true, "date": "16/05", "text": "Yours is aged bronze"}, {"sender": "DG US", "is_team": true, "date": "16/05", "text": "True gold and matte titanium - you haven’t seen so far"}, {"sender": "Dr. Apoorva", "is_team": false, "date": "16/05", "text": "Okay cool , total 4. She is Russian so wanted something that matches her skin color"}, {"sender": "DG US", "is_team": true, "date": "16/05", "text": "Reflective silver and true gold look great on fair skins"}, {"sender": "Dr. Apoorva", "is_team": false, "date": "16/05", "text": "You have any research data saying it’s completely safe to use ?"}, {"sender": "Dr. Apoorva", "is_team": false, "date": "16/05", "text": "Perfect"}, {"sender": "DG US", "is_team": true, "date": "16/05", "text": "Yes yes, we have certifications."}, {"sender": "Dr. Apoorva", "is_team": false, "date": "16/05", "text": "Perfect, Il pass on information"}, {"sender": "Dr. Apoorva", "is_team": false, "date": "16/05", "text": "At some point it will be nice if you guys introduce rose gold for women since it’s a legitimate color for jewellery and watches ! Just a suggestion 😃"}, {"sender": "DG US", "is_team": true, "date": "16/05", "text": "Yes, working on it :)"}, {"sender": "DG US", "is_team": true, "date": "16/05", "text": "Trying to get the perfect rose gold."}, {"sender": "Dr. Apoorva", "is_team": false, "date": "16/05", "text": "Nice :))"}, {"sender": "Dr. Apoorva", "is_team": false, "date": "19/05", "text": "Hello Team\nFew questions / observations\n- My skin had irritation after wearing it for 2 days so I removed it and put it on right side. Your FAQ already says that - it’s normal , right ?\n- How do you measure focus ? Is it when mind and body both are motionless ? Because I perform 3 hour long highly precise plastic surgery with magnification which needs crazy focus but my focus reading is soft ! Is it because my hands , body and legs are moving alongside the dental chair ?\n- ⁠What is cognitive work ? How does it work ? What does one do to increase cognitive work ? Is it recommended to achieve target cognitive function? ( Again I am using my cognitive skills all the time but the reading doesn’t goes up 😃)\n- ⁠Is it safe for pregnant females ? A patient wants to know"}, {"sender": "Dr. Apoorva", "is_team": false, "date": "19/05", "text": "<Media omitted>"}, {"sender": "Eshaan Temple", "is_team": true, "date": "19/05", "text": "Thanks for the feedback Apoorva. We are simplifying the metrics explanation flow.\nLike you said - less verbose, colloquially used terms and also introducing vertical format ~15-30s engaging videos (with supers that can be viewed without audio too). Shipping soon!"}, {"sender": "Dr. Apoorva", "is_team": false, "date": "19/05", "text": "Super !"}, {"sender": "DG US", "is_team": true, "date": "19/05", "text": "Skin irritation – yes, can switch sides. Irritation should not happen once you put it on clean skin. Your skin will also get used to it in a week 🙂\nFocus is a physiological signal – nothing to do with motion. Next time you do a surgery, can you please log an activity on Temple as “surgery” and we will study what happens to your focus at that time.\nCognitive work is just simply focus x hours. So if focus is low, CW is also low.\nYes, fully safe for pregnant females. There’s nothing in it which is unsafe in any way."}, {"sender": "Dr. Apoorva", "is_team": false, "date": "19/05", "text": "Okay 👌"}, {"sender": "Dr. Apoorva", "is_team": false, "date": "19/05", "text": "Very helpful!"}, {"sender": "Dr. Apoorva", "is_team": false, "date": "22/05", "text": "Morning\nSo I logged my surgery yesterday. 2 hr 22 min. Mostly zen mode but focus stayed low 😃"}, {"sender": "DG US", "is_team": true, "date": "22/05", "text": "Noted. Will look into this today. And come up with a better focus metric :)"}, {"sender": "Dr. Apoorva", "is_team": false, "date": "22/05", "text": "Great :)\nIt was one of the most difficult surgery of my career and I think I did a very good job. I was mostly in a good zen mode all throughout with constant stable heart rate , does that not mean better focus automatically? Zen mode with stable vitals = Meditation = focus <This message was edited>"}, {"sender": "Dr. Apoorva", "is_team": false, "date": "22/05", "text": "My thoughts :)"}, {"sender": "DG US", "is_team": true, "date": "22/05", "text": "<Media omitted>"}, {"sender": "DG US", "is_team": true, "date": "22/05", "text": "<Media omitted>"}, {"sender": "DG US", "is_team": true, "date": "22/05", "text": "Question – your focus is usually high during the nights. Is that legit?"}, {"sender": "Dr. Apoorva", "is_team": false, "date": "22/05", "text": "Oh okay"}, {"sender": "Dr. Apoorva", "is_team": false, "date": "22/05", "text": "Yes ! Thats right , My focus is very high during night since childhood"}, {"sender": "DG US", "is_team": true, "date": "22/05", "text": "Reading?"}, {"sender": "Dr. Apoorva", "is_team": false, "date": "22/05", "text": "Yes mostly reading, preparing for exams , making lectures and writing articles/ journals and planning"}, {"sender": "Dr. Apoorva", "is_team": false, "date": "22/05", "text": "Everything happens from 10:00 pm -4;00 am"}, {"sender": "DG US", "is_team": true, "date": "22/05", "text": "Also, since 10 to 20 is much easier than 20 to 30, we will bring in some exponential scaling here. f = f^1.15 – which means that yesterday’s surgery would have been at 70"}, {"sender": "DG US", "is_team": true, "date": "22/05", "text": "Cool - your night time focus would touch 100."}, {"sender": "Dr. Apoorva", "is_team": false, "date": "22/05", "text": "Okay :)"}, {"sender": "DG US", "is_team": true, "date": "25/05", "text": "How’s it going with temple? Any new observations?"}, {"sender": "DG US", "is_team": true, "date": "25/05", "text": "How did Saturday conference go?"}, {"sender": "Dr. Apoorva", "is_team": false, "date": "25/05", "text": "<Media omitted>"}, {"sender": "Dr. Apoorva", "is_team": false, "date": "25/05", "text": "<Media omitted>"}, {"sender": "Dr. Apoorva", "is_team": false, "date": "25/05", "text": "<Media omitted>"}, {"sender": "Dr. Apoorva", "is_team": false, "date": "25/05", "text": "<Media omitted>"}, {"sender": "Dr. Apoorva", "is_team": false, "date": "25/05", "text": "<Media omitted>"}, {"sender": "Dr. Apoorva", "is_team": false, "date": "25/05", "text": "<Media omitted>"}, {"sender": "Dr. Apoorva", "is_team": false, "date": "25/05", "text": "<Media omitted>"}, {"sender": "Dr. Apoorva", "is_team": false, "date": "25/05", "text": "<Media omitted>"}, {"sender": "Dr. Apoorva", "is_team": false, "date": "25/05", "text": "Hey, I literally lectured on Temple !!"}, {"sender": "Dr. Apoorva", "is_team": false, "date": "25/05", "text": "<Media omitted>"}, {"sender": "Dr. Apoorva", "is_team": false, "date": "25/05", "text": "During Panel discussion my questions were not only on surgeries but temple !! And I did explained very scientifically"}, {"sender": "Dr. Apoorva", "is_team": false, "date": "25/05", "text": "It seemed it was a workshop on temple 😅"}, {"sender": "Dr. Apoorva", "is_team": false, "date": "25/05", "text": "So I didn’t know I was going to address 200 Women dentists from different parts of India and there would be no man other than organisers"}, {"sender": "Dr. Apoorva", "is_team": false, "date": "25/05", "text": "In one week of clinic I got reviews from patients that temple will look good on men and sports and athletes since it’s on the face"}, {"sender": "Dr. Apoorva", "is_team": false, "date": "25/05", "text": "But surprisingly during the lecture the feedback given by women practitioners was different ! They thought women can carry it better 😃and they would like to wear it also and make their aging parents wear so they can track their health."}, {"sender": "Dr. Apoorva", "is_team": false, "date": "25/05", "text": "At airport I use protocol since some of airport authority guys are my patients. And just 50-60 people walked upto me and asked if I was wearing temple and what do I feel as a doctor and if I support this project !!"}, {"sender": "Dr. Apoorva", "is_team": false, "date": "25/05", "text": "The young dentists in audience told me difference btw all competitive devices 😃so i know it all. And I kept mental health as focus and the fact it’s made in India so we need to support it.\nI was really busy and I couldn’t track my vitals during lecture. I’ll log in activity today and sit with my team to go through stats in last 2 days and I’ll message"}, {"sender": "Dr. Apoorva", "is_team": false, "date": "25/05", "text": "And we had some dentists from Nepal also who found it very interesting!"}, {"sender": "Dr. Apoorva", "is_team": false, "date": "25/05", "text": "Coming weekend I am lecturing In Manipal College, Mangalore so it will be all students mostly in their 20s. Mumbai mostly had generation 35-75 years"}, {"sender": "Dr. Apoorva", "is_team": false, "date": "27/05", "text": "Hello Team,\n-Small observation- Is it possible that new software updates is draining battery quickly than before ?\n-I have been regular with wearing temple for last 12 days. First week was okay but now my skin feels slightly itchy and I get the urge to take it off and give me skin rest. Removing and putting the adhesive tape\nOn same area is making my skin itchy especially in this hot weather.\n-How do you measure Cognitive work ? And do you recommend to achieve target ?"}, {"sender": "Dr. Apoorva", "is_team": false, "date": "27/05", "text": "<Media omitted>"}, {"sender": "Dr. Apoorva", "is_team": false, "date": "27/05", "text": "<Media omitted>"}, {"sender": "Dr. Apoorva", "is_team": false, "date": "27/05", "text": "<Media omitted>"}, {"sender": "Dr. Apoorva", "is_team": false, "date": "27/05", "text": "<Media omitted>"}, {"sender": "Dr. Apoorva", "is_team": false, "date": "27/05", "text": "<Media omitted>"}, {"sender": "Dr. Apoorva", "is_team": false, "date": "27/05", "text": "<Media omitted>"}, {"sender": "Dr. Apoorva", "is_team": false, "date": "27/05", "text": "I have a surgery at 2:30 pm tomorrow, it’s not a tricky one but il log activity and see my stats"}, {"sender": "Dr. Apoorva", "is_team": false, "date": "27/05", "text": "Have been thinking about few other vitals that temple can try monitoring.\n- Oxygen saturation\n- ⁠Brain Sugar level  ( Since Brain fog and memory are directly related to oxygen and sugar )\n- ⁠Epilepsy tremors- Symptoms are repetitive shaking, increased heart rate, and changes in skin temperature/ sweat.Since you guys are very thorough with sleep study , checking waves for epileptic episode might be helpful.\n- ⁠Body Temperature\n- ⁠BMR\nOfcourse goes without saying that there will be a disclaimer that it’s not a medical test and needs further investigation. <This message was edited>"}, {"sender": "Eshaan Temple", "is_team": true, "date": "28/05", "text": "Yes Apoorva. Goal is to keep the idle entropy low and try to hit your lowest everyday (by activities like cold shower, etc)\nRe: active entropy: Entropy rises whenever body is under load. So when you work out, active entropy rises. A sign of a healthy body is an entropy which rises up while working out and goes down when idle.\nMaking this gamification loop more clear in the upcoming release next week."}, {"sender": "Eshaan Temple", "is_team": true, "date": "28/05", "text": "Makes sense. Activity level stats are something which we are working on. For activities like Surgery - focus is an important metric like you suggested. Should show up while viewing activity summary. Releasing soon ✌️"}, {"sender": "Dr. Apoorva", "is_team": false, "date": "28/05", "text": "Got it :)"}, {"sender": "Sahil Kaul", "is_team": true, "date": "28/05", "text": "Morning Dr. Apoorva - Checked this - We've recently shipped a new version of women's health.\nWe plan to bring these graphs back shortly in the same design language."}, {"sender": "Dr. Apoorva", "is_team": false, "date": "28/05", "text": "Okay :)"}, {"sender": "Sahil Kaul", "is_team": true, "date": "28/05", "text": "On Cognitive work - it is a measure of how you've exerted yourself cognitively. It is based of Focus and the time spent in higher Focus zones. The higher the better.\nTargets are based on the overnight recoveries and level of cognitive readiness for the day. More recovery unlocks cognitive capacity. We do recommend hitting your goal to utilise your  cognitive capacity for the day. That's one pillar of our 4 main metrics :)"}, {"sender": "Dr. Apoorva", "is_team": false, "date": "28/05", "text": "Got it , So if target was 2.7 ( based on recovery ) and I achieved 7.1, It means I somehow compensated my focus x time ?"}, {"sender": "Sahil Kaul", "is_team": true, "date": "28/05", "text": "Yes. Accumulated Cognitive Work over the day with your time spent in Focus zones."}, {"sender": "Dr. Apoorva", "is_team": false, "date": "28/05", "text": "Okay understood"}, {"sender": "Dr. Apoorva", "is_team": false, "date": "31/05", "text": "<Media omitted>"}, {"sender": "Dr. Apoorva", "is_team": false, "date": "31/05", "text": "Hello Team\nGot up in morning and saw this notification. <This message was edited>"}, {"sender": "DG US", "is_team": true, "date": "31/05", "text": "Will check the crash"}, {"sender": "Dr. Apoorva", "is_team": false, "date": "31/05", "text": "Also at Mangalore airport, I was stopped by security check in. They checked temple by moving a strip of cloth and enquired about it and eventually they let me go"}, {"sender": "Dr. Apoorva", "is_team": false, "date": "31/05", "text": "At Mumbai , Delhi airports I was asked what I was wearing but they didn’t stop me."}, {"sender": "Dr. Apoorva", "is_team": false, "date": "31/05", "text": "Just FYI"}, {"sender": "Arjun Madhusudhan", "is_team": true, "date": "31/05", "text": "Hello Dr Apoorva,\nThis is Arjun from Temple, nice to e-meet you.\nThe crash was because of a few features being rolled out regarding activity auto detection. The team is on it and are fixing it. Just a small request, in the event of an app crash can you please click on 'share' on the popup? (Hopefully there isn't another crash 🙂)"}, {"sender": "Dr. Apoorva", "is_team": false, "date": "31/05", "text": "Ofcourse, I thought I should share it with developer but then I shared it with developer on WhatsApp 🙈"}, {"sender": "Dr. Apoorva", "is_team": false, "date": "31/05", "text": "Il do that :)"}, {"sender": "Dr. Apoorva", "is_team": false, "date": "31/05", "text": "Next time !"}, {"sender": "DG US", "is_team": true, "date": "31/05", "text": "We don’t get crash logs on WhatsApp 😃"}, {"sender": "Dr. Apoorva", "is_team": false, "date": "31/05", "text": "Yes yes, I meant sharing with you guys here on the group."}, {"sender": "Dr. Apoorva", "is_team": false, "date": "31/05", "text": "Il report it next time"}, {"sender": "Dr. Apoorva", "is_team": false, "date": "31/05", "text": "<Media omitted>"}, {"sender": "DG US", "is_team": true, "date": "31/05", "text": "<Media omitted>"}, {"sender": "DG US", "is_team": true, "date": "31/05", "text": "We need to get you to start partying and drinking a little 🤣"}, {"sender": "Dr. Apoorva", "is_team": false, "date": "31/05", "text": "Haha , I have no clue why am I always in zen mode. I used to think I am chaotic. So basically when I am performing surgery it’s equivalent to meditation 🧘"}, {"sender": "DG US", "is_team": true, "date": "31/05", "text": "Yes, we have seen this with other high performers at work. Their entropy is the lowest when they are in deep focus state at work."}, {"sender": "Dr. Apoorva", "is_team": false, "date": "31/05", "text": "Also can I not record two activities ?\nI recorded first surgery to check my focus. I think it was 127 at some point ( is it good ? )and tried to start another activity but there was no option to start another back to back activity"}, {"sender": "Dr. Apoorva", "is_team": false, "date": "31/05", "text": "I wanted to compare two surgeries"}, {"sender": "DG US", "is_team": true, "date": "31/05", "text": "127 is good. Focus goes up to 200 now. Anything above 80 is good. 150+ is super deep focus like your night state."}, {"sender": "DG US", "is_team": true, "date": "31/05", "text": "Did you end the first one?"}, {"sender": "Dr. Apoorva", "is_team": false, "date": "31/05", "text": "Yes I ended first"}, {"sender": "DG US", "is_team": true, "date": "31/05", "text": "Should have been able to start the new one in that case"}, {"sender": "DG US", "is_team": true, "date": "31/05", "text": "@⁨Sahil Kaul⁩ - check this please"}, {"sender": "Dr. Apoorva", "is_team": false, "date": "31/05", "text": "Ummm so earlier I could go back and log in time and check my vitals at that point of time. But now it’s a live activity"}, {"sender": "Dr. Apoorva", "is_team": false, "date": "31/05", "text": "I feel this live activity is draining phone and temple battery"}, {"sender": "DG US", "is_team": true, "date": "31/05", "text": "Temple battery, yes."}, {"sender": "DG US", "is_team": true, "date": "31/05", "text": "Sahil - decrease the sampling rate for cognitive activities to save battery life"}, {"sender": "DG US", "is_team": true, "date": "31/05", "text": "Phone battery only if you keep the screen open. Else it doesn’t"}, {"sender": "Sahil Kaul", "is_team": true, "date": "31/05", "text": "Will do, Deepi.\nHey Dr Apoorva - Just checking - both flows still exist - to log an activity to timeline retrospectively or to start capturing a live activity as it happens. Which one were you finding an issue with? <This message was edited>"}, {"sender": "Dr. Apoorva", "is_team": false, "date": "31/05", "text": "I couldn’t log in activity retrospectively. Earlier there was option to do both but past few days I can do only live"}, {"sender": "Dr. Apoorva", "is_team": false, "date": "31/05", "text": "And while doing live, I am not able to do back to back two lives <This message was edited>"}, {"sender": "Dr. Apoorva", "is_team": false, "date": "31/05", "text": "Okay , got it"}, {"sender": "DG US", "is_team": true, "date": "31/05", "text": "<Media omitted>"}, {"sender": "DG US", "is_team": true, "date": "31/05", "text": "<Media omitted>"}, {"sender": "Dr. Apoorva", "is_team": false, "date": "31/05", "text": "Yes same , I tried. It didn’t show option to create new activity ( plus sign ➕) but il double check tomorrow for another surgery. May be I missed something"}, {"sender": "DG US", "is_team": true, "date": "31/05", "text": "We’ll also look into this"}, {"sender": "Dr. Apoorva", "is_team": false, "date": "31/05", "text": "Great 😌"}, {"sender": "Sahil Kaul", "is_team": true, "date": "01/06", "text": "Hello Dr. Apoorva - good evening.\nWe have checked your activity in detail and also corroborated with some inputs you shared last evening. Checked the timeline:\n1. The activity was started at 11:40 AM and was paused around 1:10 PM. Wasn't ended here - it was active in the background.\n2. This activity traversed a few states of hour long pauses and short resume cycles as well as a charging state in between. It was finally saved later at night.\n3. Time for activity was edited to 11:40AM - 1:35 PM Post.\nThis also explains the battery drop you'd have noticed. Since an activity was ongoing, you couldn't start a new one. Just checking if you resonate with this?\nFound some places of improvement in the flow that we will action here."}, {"sender": "Dr. Apoorva", "is_team": false, "date": "01/06", "text": "Yes makes sense. I asked my assistant to stop the activity. He must have closed the window and that’s why it was in background."}, {"sender": "Dr. Apoorva", "is_team": false, "date": "01/06", "text": "So the button next to activity is pause and not a stop button. The way to stop activity is clicking 3 dots on extreme right and choose end and save / discard etc. I think in reflex we pressed pause instead of ending it"}, {"sender": "Sahil Kaul", "is_team": true, "date": "01/06", "text": "Yes. This is accurate."}, {"sender": "Dr. Apoorva", "is_team": false, "date": "01/06", "text": "Yes , understood"}, {"sender": "Sahil Kaul", "is_team": true, "date": "08/06", "text": "Just update to the latest app and you should see this reflecting."}, {"sender": "Dr. Apoorva", "is_team": false, "date": "08/06", "text": "Hey ! Superb !!"}, {"sender": "Dr. Apoorva", "is_team": false, "date": "08/06", "text": "I am in Chennai lecturing in 3 different Universities Sat Sun Monday. Didn’t take off temple !! It’s been on my head. Some medical doctors tried telling me it’s going to destroy my brain and that I am part of an experiment 🤯😅\nNow I know what the resistance from medical guys is all about"}, {"sender": "Dr. Apoorva", "is_team": false, "date": "08/06", "text": "But the other dentists / students / faculty were very excited to know about temple ❤️"}, {"sender": "Dr. Apoorva", "is_team": false, "date": "08/06", "text": "Il check Surgery once I am back to Delhi tomorrow"}, {"sender": "Dr. Apoorva", "is_team": false, "date": "08/06", "text": "Would you guys recommend inversions/ head stand to increase brain flow ?"}, {"sender": "DG US", "is_team": true, "date": "08/06", "text": "100%"}, {"sender": "DG US", "is_team": true, "date": "08/06", "text": "Passive inversions more than head stands"}, {"sender": "Dr. Apoorva", "is_team": false, "date": "08/06", "text": "Okay 👌\nSo few important doctors in Chennai mentioned to me that inversions can lead to Brain Aneurysms so this is sensitive topic to consider\nFYI"}, {"sender": "DG US", "is_team": true, "date": "08/06", "text": "Statistically yes. But benefits far outweigh the risks. Especially at this age."}, {"sender": "Dr. Apoorva", "is_team": false, "date": "08/06", "text": "Ummm I said that only !! And ofcourse it’s individual based thing. Not a generic thing and I told them it is not a medical device. It’s a health/ lifestyle tracker and they still need to follow doctors advice. It’s not replacement of any tests which are advised. Is that right thing to say ? <This message was edited>"}, {"sender": "DG US", "is_team": true, "date": "08/06", "text": "Correct."}, {"sender": "DG US", "is_team": true, "date": "08/06", "text": "We did clinical trials (will publish soon), where hypertension went away after inversions"}, {"sender": "Dr. Apoorva", "is_team": false, "date": "08/06", "text": "Wow !! That would be very interesting!!"}, {"sender": "Dr. Apoorva", "is_team": false, "date": "12/06", "text": "Hello Sahil, So I logged in surgery today ( Not the live but the timeline one )It showed all vitals but not focus."}, {"sender": "Dr. Apoorva", "is_team": false, "date": "12/06", "text": "Do I have to choose live always ?"}, {"sender": "Sahil Kaul", "is_team": true, "date": "12/06", "text": "Hello Dr. Apoorva - you should be able to see Focus when logging surgery from the list.\nSending a video. I think I sense what would have happened. Since we didn't have surgery earlier in the list - it's a self created activity?"}, {"sender": "Sahil Kaul", "is_team": true, "date": "12/06", "text": "<Media omitted>"}, {"sender": "Dr. Apoorva", "is_team": false, "date": "12/06", "text": "I did log from the list, Exactly what you did"}, {"sender": "Dr. Apoorva", "is_team": false, "date": "12/06", "text": "But it didn’t show focus"}, {"sender": "Dr. Apoorva", "is_team": false, "date": "12/06", "text": "Btw what did you do when your focus reached 166 ? 😃"}, {"sender": "Sahil Kaul", "is_team": true, "date": "12/06", "text": "Oh. Shouldn't happen - Can you let me know what app version you're on? Or just update on Testflight to the latest version."}, {"sender": "Sahil Kaul", "is_team": true, "date": "12/06", "text": "Morning Focus hours. :)\nHeadphnes and some Focus music usually do the trick for me."}, {"sender": "Dr. Apoorva", "is_team": false, "date": "12/06", "text": "<Media omitted>"}, {"sender": "Dr. Apoorva", "is_team": false, "date": "12/06", "text": "Is that app version on the top ?"}, {"sender": "Sahil Kaul", "is_team": true, "date": "12/06", "text": "<Media omitted>"}, {"sender": "Sahil Kaul", "is_team": true, "date": "12/06", "text": "<Media omitted>"}, {"sender": "Sahil Kaul", "is_team": true, "date": "12/06", "text": "You'll find it in the side menu."}, {"sender": "Dr. Apoorva", "is_team": false, "date": "12/06", "text": "<Media omitted>"}, {"sender": "Sahil Kaul", "is_team": true, "date": "12/06", "text": "You're on the right app version there. It should be working for you, Dr. Apoorva. Let me get this checked for you."}, {"sender": "Dr. Apoorva", "is_team": false, "date": "12/06", "text": "Okay 👌"}, {"sender": "Dr. Apoorva", "is_team": false, "date": "12/06", "text": "Also cognitive work is Deep focus x Time ?\nIt’s not engaged focus x Time"}, {"sender": "Dr. Apoorva", "is_team": false, "date": "12/06", "text": "Basically Engaged focus in not considered mental activity, you are advising to achieve cognitive activity target for a good mental health but that only means deep focus for long periods ? <This message was edited>"}, {"sender": "Sahil Kaul", "is_team": true, "date": "12/06", "text": "Cognitive Work accumulates with all zones of Focus. Just much faster with Deep, then with Engaged and so on."}, {"sender": "Sahil Kaul", "is_team": true, "date": "12/06", "text": "Engaged and Deep both combined are considered for your Focus time accumulation and Focus Blocks."}, {"sender": "Dr. Apoorva", "is_team": false, "date": "12/06", "text": "I see ! I was wondering I am at work from 10:00 am-8:00 pm. As a surgeon, clinic owner and educator my mind is always preoccupied with tasks and deadlines and planning but I am not still able to achieve my target cognitive goal. I noticed deep focus only during surgery and reading but other times I am in engaged- diffuse focus but in I am doing lot of mental work in real."}, {"sender": "Dr. Apoorva", "is_team": false, "date": "12/06", "text": "An average human will be advised to achieve cognitive target but I doubt they stay in deep focus in their lives. How will they achieve their target of cognitive work? People don’t read / don’t engage / don’t communicate/ use their mind in general\nI don’t know if I am able to explain what I mean 😃"}, {"sender": "DG US", "is_team": true, "date": "12/06", "text": "Apoorva - ignore cognitive goal."}, {"sender": "DG US", "is_team": true, "date": "12/06", "text": "Just practice a better life to get better focus"}, {"sender": "DG US", "is_team": true, "date": "12/06", "text": "Cognitive goal is a figment of our imagination .. means nothing. We might even remove the cognitive goal from the app"}, {"sender": "Dr. Apoorva", "is_team": false, "date": "12/06", "text": "Okay"}, {"sender": "Dr. Apoorva", "is_team": false, "date": "12/06", "text": "Yes il be focusing on FOCUS ! Thats the plan"}, {"sender": "Dr. Apoorva", "is_team": false, "date": "15/06", "text": "Hey there is something with the app today"}, {"sender": "Dr. Apoorva", "is_team": false, "date": "15/06", "text": "It’s showing me eating detected whereas there was no activity"}, {"sender": "Dr. Apoorva", "is_team": false, "date": "15/06", "text": "I am sitting in my car on my way back to home, unwinding with closed eyes and doing nothing - it says eating detected"}, {"sender": "Dr. Apoorva", "is_team": false, "date": "15/06", "text": "This is the third time since morning it’s sent out this message when I was doing absolutely nothing"}, {"sender": "Dr. Apoorva", "is_team": false, "date": "15/06", "text": "<Media omitted>"}, {"sender": "Sahil Kaul", "is_team": true, "date": "15/06", "text": "@⁨Dr. Apoorva⁩ - Please mark them as \"I wasn't eating\" with activity and we'll have this checked."}, {"sender": "Dr. Apoorva", "is_team": false, "date": "15/06", "text": "Okay"}, {"sender": "Dr. Apoorva", "is_team": false, "date": "15/06", "text": "Its done, I just saw I had 5 reminders whereas eating happened just once"}, {"sender": "Dr. Apoorva", "is_team": false, "date": "15/06", "text": "I said “ I don’t remember “"}, {"sender": "Sahil Kaul", "is_team": true, "date": "15/06", "text": "Hello Dr. Apoorva - Sharing the response from the team here - “I reviewed her data and observed sustained signal patterns throughout the day that closely resemble chewing. Similar patterns can sometimes be caused by prolonged talking and laughing. Could we check with her if there was any such activity today?”"}, {"sender": "Dr. Apoorva", "is_team": false, "date": "15/06", "text": "None of this"}, {"sender": "Sahil Kaul", "is_team": true, "date": "15/06", "text": "Further, we’re working on a personalized chewing detection pattern that would have removed most of the false detections today. We will release the new algorithm after testing this out. Will let you know of when it’s released."}, {"sender": "Dr. Apoorva", "is_team": false, "date": "15/06", "text": "I was Infact under the weather and didn’t meet many people"}, {"sender": "Dr. Apoorva", "is_team": false, "date": "15/06", "text": "I was quiet mostly"}, {"sender": "Sahil Kaul", "is_team": true, "date": "15/06", "text": "Thank you. Will feedback this into the team."}, {"sender": "Sahil Kaul", "is_team": true, "date": "16/06", "text": "Good morning, Dr. Apoorva. Try logging a surgery now - you should be able to see Focus details going forward."}, {"sender": "Sahil Kaul", "is_team": true, "date": "16/06", "text": "There were a few duplicate entries for Surgery for you - we have corrected that. Please do check and let us know if it’s working."}, {"sender": "Dr. Apoorva", "is_team": false, "date": "16/06", "text": "Morning , Okay"}]}, {"name": "MG", "group": "MG", "thread": [{"sender": "DG US", "is_team": true, "date": "15/05", "text": "MG - this is your shipping, customer care, feedback, questions group for Temple."}, {"sender": "DG US", "is_team": true, "date": "15/05", "text": "Please drop us a message here when you want the Temple do be delivered to you. One of us will come and do the honors."}, {"sender": "Mohit Gupta", "is_team": false, "date": "15/05", "text": "Excited. Will ping tom."}, {"sender": "Sahil Kaul", "is_team": true, "date": "25/05", "text": "Hello MG - Good morning! Sahil this side from the Product team at Temple!\nGlad to have you here! Your feedback would be valuable for us going forward! Give us a shout and we’ll be happy to deliver your Temple across to you. ✌️"}, {"sender": "DG US", "is_team": true, "date": "25/05", "text": "We haven’t delivered Temple to MG yet, have we?"}, {"sender": "Sahil Kaul", "is_team": true, "date": "25/05", "text": "Not yet, Deepi."}, {"sender": "Mohit Gupta", "is_team": false, "date": "27/05", "text": "Hey Sahil, Deepi, sorry folks for the tardy response"}, {"sender": "Mohit Gupta", "is_team": false, "date": "27/05", "text": "Can we do this at office also or you prefer home. We can do this tomorrow morning if that works for the team"}, {"sender": "+91 95606 96837", "is_team": false, "date": "27/05", "text": "Hi Mohit, this is Veer from Temple. What time works for you tomorrow morning?"}, {"sender": "Mohit Gupta", "is_team": false, "date": "29/05", "text": "Hey Veer, sorry missed this.\nCan we do this at my residence anytime between 1-5p tomorrow. I stay in dlf phase 5"}, {"sender": "DG US", "is_team": true, "date": "30/05", "text": "I’ll come see you around 4 :)"}]}, {"name": "Mayur", "group": "Mayur", "thread": [{"sender": "Aman Kant", "is_team": true, "date": "23/05", "text": "Hi Mayur,  I’m Veer from the Temple team\nPlease send anything that comes up while using the app: bugs, ideas, screenshots, voice notes, confusing moments, things you like, and things that frustrate you.\nCheers."}, {"sender": "+91 98102 61828", "is_team": false, "date": "23/05", "text": "Yessir."}, {"sender": "+91 98102 61828", "is_team": false, "date": "23/05", "text": "Not via feedback on dashboard?"}, {"sender": "Aman Kant", "is_team": true, "date": "24/05", "text": "Yes, you can just share it here now <This message was edited>"}, {"sender": "+91 98102 61828", "is_team": false, "date": "25/05", "text": "Got it."}, {"sender": "+91 98102 61828", "is_team": false, "date": "25/05", "text": "IMG-20260525-WA0000.jpg (file attached)\nFrom yesterday"}, {"sender": "Aman Kant", "is_team": true, "date": "25/05", "text": "Will share it with team"}, {"sender": "+91 98102 61828", "is_team": false, "date": "26/05", "text": "IMG-20260526-WA0000.jpg (file attached)\nMy device died and it was 2 days of being dead before I got it to a charging pod. It’s inside and this is what it looks like. I tried connecting it to app but no luck."}, {"sender": "+91 98102 61828", "is_team": false, "date": "26/05", "text": "I don’t know yet what different colours of lights mean. Does this mean it’s charging?"}, {"sender": "Jalaj Temple Official", "is_team": true, "date": "26/05", "text": "@⁨~Mayur Sharma⁩ Looks like a problem in the charger or the device. Is this the new device and the old charger?"}, {"sender": "+91 98102 61828", "is_team": false, "date": "26/05", "text": "It’s the charger sent to Khambati"}, {"sender": "+91 98102 61828", "is_team": false, "date": "26/05", "text": "Mine was left behind 🙄 <This message was edited>"}, {"sender": "Veer New", "is_team": true, "date": "26/05", "text": "1. Remove the USB\n2. ⁠Open the lid of the charging case and close it again\nYour device should start working once it’s charged <This message was edited>"}, {"sender": "+91 98102 61828", "is_team": false, "date": "26/05", "text": "Gotcha. Trying this now"}, {"sender": "+91 98102 61828", "is_team": false, "date": "26/05", "text": "<Media omitted>\nUSB cable removed. Temple inside the case. No usual white charging light"}, {"sender": "Veer New", "is_team": true, "date": "26/05", "text": "Please put the USB C back - it’ll start charging"}, {"sender": "Veer New", "is_team": true, "date": "26/05", "text": "The device because of old firmware of the charger had gone into ship mode"}, {"sender": "+91 98102 61828", "is_team": false, "date": "26/05", "text": "<Media omitted>\nUSB connected. Temple not inside"}, {"sender": "Aman Kant", "is_team": true, "date": "26/05", "text": "Please put the temple as well"}, {"sender": "+91 98102 61828", "is_team": false, "date": "26/05", "text": "<Media omitted>\nTemple inside and USB connected"}, {"sender": "Aman Kant", "is_team": true, "date": "26/05", "text": "Give it 10-15 mins - once the device is charged a bit you should be able to connect"}, {"sender": "+91 98102 61828", "is_team": false, "date": "26/05", "text": "IMG-20260526-WA0001.jpg (file attached)\nYup. Finally connected and charging"}, {"sender": "+91 98102 61828", "is_team": false, "date": "27/05", "text": "An idea - what if we map the macros for all the Bistro menu items?\nThen we will get very accurate calorie counts and analysis when we log Bistro food. <This message was edited>"}, {"sender": "Jalaj Temple Official", "is_team": true, "date": "29/05", "text": "Yes, that's under consideration, even Zomato listed restaurants\n04/06/26, 1:29 pm - Veer New left"}, {"sender": "+91 98102 61828", "is_team": false, "date": "05/06", "text": "Morning :) <This message was edited>"}, {"sender": "+91 98102 61828", "is_team": false, "date": "05/06", "text": "My Temple failed to record -\nA nap last evening 6-930pm\nMy morning coffee with coconut milk this morning at 745am"}, {"sender": "Aaqib Ahmad", "is_team": true, "date": "05/06", "text": "Hi Mayur. How’s it going?\nThe nap should have gotten detected. Getting that checked.\nWe’re not doing liquids as of now - just chewing detection. So coffee will get missed"}, {"sender": "+91 98102 61828", "is_team": false, "date": "05/06", "text": "PTT-20260605-WA0003.opus (file attached)"}, {"sender": "Aaqib Ahmad", "is_team": true, "date": "05/06", "text": "Hey hey Mayur! It’s good to be back. Let’s speak soon"}, {"sender": "Aaqib Ahmad", "is_team": true, "date": "05/06", "text": "Mayur - we don’t track naps yet. Getting this picked.\nThanks for pointing it out"}, {"sender": "+91 98102 61828", "is_team": false, "date": "05/06", "text": "PTT-20260605-WA0004.opus (file attached)"}, {"sender": "+91 98102 61828", "is_team": false, "date": "08/06", "text": "Morning. Started a 10-hour ‘water only’ fast at 1am last night."}, {"sender": "+91 98102 61828", "is_team": false, "date": "08/06", "text": "Please let’s track and see how my body responds ;)"}, {"sender": "Aaqib Ahmad", "is_team": true, "date": "08/06", "text": "Will do, Mayur. Have you slept since then?"}, {"sender": "+91 98102 61828", "is_team": false, "date": "08/06", "text": "PTT-20260608-WA0000.opus (file attached)"}, {"sender": "Aaqib Ahmad", "is_team": true, "date": "08/06", "text": "Oh my god. You’re breaking the fast on Friday?!!"}, {"sender": "Aaqib Ahmad", "is_team": true, "date": "08/06", "text": "Man - that is impressive"}, {"sender": "Aaqib Ahmad", "is_team": true, "date": "08/06", "text": "Good luck! And yes, we will start monitoring your data.\nWill keep you posted as something interesting comes up"}, {"sender": "Aaqib Ahmad", "is_team": true, "date": "08/06", "text": "This is 10-day, right?"}, {"sender": "+91 98102 61828", "is_team": false, "date": "08/06", "text": "Sorry! 100-hr. 4 days 4 nights."}, {"sender": "+91 98102 61828", "is_team": false, "date": "09/06", "text": "Broke fast. Starting again from scratch tonight or tomorrow. Will advise."}, {"sender": "+91 98102 61828", "is_team": false, "date": "10/06", "text": "My Temple did not record my meal last night. Dinner between 9-1030pm."}, {"sender": "+91 98102 61828", "is_team": false, "date": "10/06", "text": "Sleep.- I closed my eyes at 12:35am and fell asleep almost instantly.  My Temple recorded sleep as starting 0125am."}, {"sender": "Aaqib Ahmad", "is_team": true, "date": "10/06", "text": "Getting this checked"}, {"sender": "Aaqib Ahmad", "is_team": true, "date": "10/06", "text": "This too"}, {"sender": "+91 98102 61828", "is_team": false, "date": "10/06", "text": "Thank you Aaqib. Have out it on the relevant Slack groups too."}, {"sender": "+91 98102 61828", "is_team": false, "date": "11/06", "text": "Morning. My device didn’t detect my meal at 8:15pm last night"}, {"sender": "Aaqib Ahmad", "is_team": true, "date": "11/06", "text": "Mayur - this was an edge case that our new algorithms have now captured. Thanks for pointing this out"}, {"sender": "Aaqib Ahmad", "is_team": true, "date": "11/06", "text": "Coming back on both the meals that got missed, Mayur"}, {"sender": "Aaqib Ahmad", "is_team": true, "date": "11/06", "text": "Mayur - pls re-install the app using this link:\nhttps://testflight.apple.com/join/sTC3a5aC"}, {"sender": "Aaqib Ahmad", "is_team": true, "date": "11/06", "text": "Mayur - both your dinners - on 9th and 10th - were recognised by your Temple, but missed being classified as a meal by our current algorithm.\nWe are releasing a newer, more personalised algorithm soon. These will be captured then"}, {"sender": "+91 98102 61828", "is_team": false, "date": "13/06", "text": "IMG-20260613-WA0005.jpg (file attached)\nI slept 9 hours. My device ran out of charge at some stage at night and this afternoon post charging here's what it said."}, {"sender": "Aaqib Ahmad", "is_team": true, "date": "13/06", "text": "Mayur - if the device loses charge mid-sleep, it won’t be able to identify what happened after.\nWe should be able to handle this better in the Morning Outlook though. Getting this checked."}, {"sender": "+91 98102 61828", "is_team": false, "date": "13/06", "text": "Yeah man. It’s better our device says ‘insufficient data’ instead of making us think we’re dying slowly 😛"}, {"sender": "+91 98102 61828", "is_team": false, "date": "16/06", "text": "Totallly missed detecting my lunch and 3 hour dinner yesterday. Also 2 small snacks went undetected."}, {"sender": "Aaqib Ahmad", "is_team": true, "date": "16/06", "text": "This is being picked, Mayur. Thanks for reporting"}, {"sender": "+91 98102 61828", "is_team": false, "date": "17/06", "text": "Late night snack last night for FIFA 2026 match"}, {"sender": "+91 98102 61828", "is_team": false, "date": "17/06", "text": "IMG-20260617-WA0000.jpg (file attached)\nPack said…\nApp said…\n🧐"}, {"sender": "+91 98102 61828", "is_team": false, "date": "17/06", "text": "IMG-20260617-WA0001.jpg (file attached)"}, {"sender": "Deepi US", "is_team": true, "date": "17/06", "text": "Did you have the entire packet"}, {"sender": "+91 98102 61828", "is_team": false, "date": "17/06", "text": "Of course you’re there when I was naughty 😁"}, {"sender": "+91 98102 61828", "is_team": false, "date": "17/06", "text": "Samai and I shared."}, {"sender": "Deepi US", "is_team": true, "date": "17/06", "text": "The pack is 5 servings. And the calories are per serving. So the app is right, and you over ate"}, {"sender": "+91 98102 61828", "is_team": false, "date": "17/06", "text": "Array! You’re right. My bad. Sleepy calculation."}, {"sender": "+91 98102 61828", "is_team": false, "date": "17/06", "text": "Nahin! Samai had most of it. I still put all 150gms down because I overstate a bit to keep me reminded of empty calories."}, {"sender": "+91 98102 61828", "is_team": false, "date": "17/06", "text": "I then stayed up most of the night because Samai has a nasty cold and cough so we were steaming and drinking ginger lemon tea."}, {"sender": "Deepi US", "is_team": true, "date": "17/06", "text": "Cool, pls edit the quantity to reflect your true intake"}]}, {"name": "Mohit", "group": "Mohit", "thread": [{"sender": "DG US", "is_team": true, "date": "13/05", "text": "Hi Mohit - Deepi here."}, {"sender": "DG US", "is_team": true, "date": "13/05", "text": "All feedback and queries on temple on this group please."}, {"sender": "DG US", "is_team": true, "date": "13/05", "text": "We see your 24x7 customer care, and product team."}, {"sender": "Mohit Bhatnagar", "is_team": false, "date": "13/05", "text": "thanks buddy."}, {"sender": "DG US", "is_team": true, "date": "13/05", "text": "If you need anything - tapes, replacement device, etc.. pls let us know here."}, {"sender": "Mohit Bhatnagar", "is_team": false, "date": "16/05", "text": "*people’s reactions:*\nmost ppl from our industry said ‘cool’, ‘what does it track’, ‘knew it was Temple’. some family members said ‘looks weird, why not put it on your neck’.  international Airport Security did not ask me to take it off interestingly.\nfeedback on device\nyou forget u r wearing it. love the fact it’s completely waterproof. sometimes feel the need to remove it to soap the area, given stickiness of adhesive. the battery life is 3 days… wish it was 7 days.\nfeedback on App\n- dynamic movement around entropy and blood flow are nice\n- ⁠the ‘we detected you are eating is very cool and really drives my engagement with app’…\n- ⁠wish that i could enter food allergies, and the co-relation of entropy / blood flow with greasy food and alcohol was analysed\n- ⁠wish the app did a more visible form of your battery is 10.% only, 5% only …, device tends to stop working ‘suddenly in the last 6 hours’"}, {"sender": "DG US", "is_team": true, "date": "16/05", "text": "Noted."}, {"sender": "DG US", "is_team": true, "date": "16/05", "text": "Whenever you come out of water, just drain any water stuck between  the device and the skin by gently pressing the device."}, {"sender": "Mohit Bhatnagar", "is_team": false, "date": "16/05", "text": "the eating detections are multiple times in the same meal … for the same meal it should detect once"}, {"sender": "DG US", "is_team": true, "date": "16/05", "text": "They are spaced at 30 mins right now. You are right, we can check for continuity. Sometimes, slow multi course meals get multiple notifications."}, {"sender": "DG US", "is_team": true, "date": "16/05", "text": "Overall, is temple driving some positive behavioural changes?"}, {"sender": "Mohit Bhatnagar", "is_team": false, "date": "16/05", "text": "yes.\n- tracking sleep and food more mindfully\n- i would like to see it impact my workouts more. given i train with an online coach… i cannot view the app while working out.. i don’t have a post workout synopsis… i think i need to ‘start a workout session’ … it does not detect?"}, {"sender": "DG US", "is_team": true, "date": "16/05", "text": "Auto detect workout feature is yet to go live."}, {"sender": "DG US", "is_team": true, "date": "16/05", "text": "But start an activity before starting to work out. You will want to keep the phone screen next to you while you work out :)"}, {"sender": "DG US", "is_team": true, "date": "16/05", "text": "Entropy is quite cool while working out. It goes up with strength sets, goes down during rest between sets. So rather than listening to someone’s 2 minute rest between sets, just wait for your entropy to come down to where it was pre-set, and then go again."}, {"sender": "DG US", "is_team": true, "date": "16/05", "text": "If your entropy settles meaningfully higher than where you started at, after working out, you clearly over trained."}, {"sender": "DG US", "is_team": true, "date": "16/05", "text": "We can detect over training as well. We will make that feature live in the next 2-3 days. Tightening the edge cases right now."}, {"sender": "Mohit Bhatnagar", "is_team": false, "date": "19/05", "text": "IMG-20260519-WA0005.jpg (file attached)"}, {"sender": "Mohit Bhatnagar", "is_team": false, "date": "19/05", "text": "charged my Temple device in the day.  put it back on … after 30-45 min the device had become hot and ended up burning my skin"}, {"sender": "DG US", "is_team": true, "date": "19/05", "text": "Oh shit."}, {"sender": "DG US", "is_team": true, "date": "19/05", "text": "@⁨Akriti⁩ - let’s retrieve the device and check what went wrong."}, {"sender": "DG US", "is_team": true, "date": "19/05", "text": "Sorry about this, Mohit. First time I am hearing this - will get to the bottom of this. Hope it’s not too bad."}, {"sender": "Mohit Bhatnagar", "is_team": false, "date": "19/05", "text": "no no not too bad … all in the pursuit of excellence\nlet’s trouble shoot the problem"}, {"sender": "DG US", "is_team": true, "date": "19/05", "text": "Yessir."}, {"sender": "Mohit Bhatnagar", "is_team": false, "date": "19/05", "text": "all good.  onwards …."}, {"sender": "Akriti", "is_team": true, "date": "19/05", "text": "Sorry about this, Mohit.\nGetting this picked up - coordinating with Rashi."}, {"sender": "Mohit Bhatnagar", "is_team": false, "date": "19/05", "text": "to help you trouble shoot.\nput it to charge in the case for 4 hours (case was not connected to charger).  45 min after i wore it, i felt a stinging sensation and pulled it off."}, {"sender": "Akriti", "is_team": true, "date": "19/05", "text": "This is helpful; thank you."}, {"sender": "DG US", "is_team": true, "date": "21/05", "text": "IMG-20260521-WA0000.jpg (file attached)"}, {"sender": "DG US", "is_team": true, "date": "21/05", "text": "Mohit’s device with the top shell abrasion. We want to know if the device experienced some excessive mechanical event."}, {"sender": "DG US", "is_team": true, "date": "21/05", "text": "Mohit, got this message from the team ^"}, {"sender": "Mohit Bhatnagar", "is_team": false, "date": "21/05", "text": "no.  it did not get hit or fall."}, {"sender": "Mohit Bhatnagar", "is_team": false, "date": "21/05", "text": "if device is ok, maybe the charger acted up ?"}, {"sender": "DG US", "is_team": true, "date": "21/05", "text": "RCA - there seems to be physical damage to the device from the inside. Could have been in the factory - we don’t know. Anyway, the fault in the device could have been detected automatically, and the device be switched off automatically. So far, that wasn’t happening - we are taking it live today. So for any issues whatsoever - battery issues, water ingress, short circuit, or other damage - the device will stop working, and we will ensure zero harm to the customer."}, {"sender": "DG US", "is_team": true, "date": "21/05", "text": "Bottomline - failsafes have been implemented, while we continue to improve quality of output."}, {"sender": "DG US", "is_team": true, "date": "25/05", "text": "Mohit - did you get a replacement device?"}, {"sender": "Mohit Bhatnagar", "is_team": false, "date": "25/05", "text": "no , not yet"}, {"sender": "DG US", "is_team": true, "date": "25/05", "text": "@⁨Karan Temple CS⁩ - let’s prioritise this delivery please"}, {"sender": "Karan Temple CS", "is_team": true, "date": "25/05", "text": "Hi @⁨Mohit Bhatnagar⁩ - your replacement device is on the way. Should reach you in 20 minutes."}, {"sender": "Mohit Bhatnagar", "is_team": false, "date": "25/05", "text": "at home or office ?"}, {"sender": "Karan Temple CS", "is_team": true, "date": "25/05", "text": "Device has reached your office. Had coordinated with Rashi for this."}, {"sender": "Karan Temple CS", "is_team": true, "date": "27/05", "text": "Hi @⁨Mohit Bhatnagar⁩ - we are doing away with Apple login. Please share an email address which we can update on your account. This will then be used for future logins.\nCurrently, you are logged in using a masked Apple ID."}, {"sender": "Mohit Bhatnagar", "is_team": false, "date": "27/05", "text": "mohit@peakxv.com"}, {"sender": "Karan Temple CS", "is_team": true, "date": "27/05", "text": "Thank you"}, {"sender": "Mohit Bhatnagar", "is_team": false, "date": "31/05", "text": "Lost Temple\nmy device fell off somewhere between waking up and the golf course … still looking but what’s the process to get a replacement"}, {"sender": "DG US", "is_team": true, "date": "31/05", "text": "This message is the process to get a replacement 😃"}, {"sender": "DG US", "is_team": true, "date": "31/05", "text": "@⁨Karan Temple CS⁩ - pls get this done"}, {"sender": "Mohit Bhatnagar", "is_team": false, "date": "31/05", "text": "sorry …"}, {"sender": "DG US", "is_team": true, "date": "31/05", "text": "Not at all"}, {"sender": "Karan Temple CS", "is_team": true, "date": "01/06", "text": "@⁨Mohit Bhatnagar⁩ Should we send the replacement device to your office address?"}, {"sender": "Mohit Bhatnagar", "is_team": false, "date": "01/06", "text": "yes please ."}, {"sender": "Karan Temple CS", "is_team": true, "date": "01/06", "text": "@⁨Mohit Bhatnagar⁩ Your device is on the way. Should reach you in half an hour."}, {"sender": "Mohit Bhatnagar", "is_team": false, "date": "01/06", "text": "hey the device hasn’t reached yet,  i guess it’s in its way\nwill take it from office tomm"}, {"sender": "Karan Temple CS", "is_team": true, "date": "01/06", "text": "Apologies here - device reached post you had left. It's with Rashi now."}, {"sender": "Karan Temple CS", "is_team": true, "date": "02/06", "text": "Hi Mohit - Hope you have received your device."}, {"sender": "Mohit Bhatnagar", "is_team": false, "date": "02/06", "text": "received it.  unfortunately not connecting.   will go home and charge it , in case that is the cause"}, {"sender": "Mohit Bhatnagar", "is_team": false, "date": "02/06", "text": "IMG-20260602-WA0000.jpg (file attached)"}, {"sender": "Mohit Bhatnagar", "is_team": false, "date": "02/06", "text": "connected!  i had to unlink and then it connected"}, {"sender": "Karan Temple CS", "is_team": true, "date": "02/06", "text": "Thanks for flagging this Mohit. You shouldn't have to unlink the old device manually to be able to connect a new one - this is on us to handle cleanly."}, {"sender": "Mohit Bhatnagar", "is_team": false, "date": "03/06", "text": "IMG-20260603-WA0000.jpg (file attached)"}, {"sender": "Mohit Bhatnagar", "is_team": false, "date": "03/06", "text": "should i reset the device … its connected and seems to be working"}, {"sender": "Karan Temple CS", "is_team": true, "date": "03/06", "text": "Sorry Mohit, didn't get the question. What issue are you facing with the device?"}, {"sender": "Mohit Bhatnagar", "is_team": false, "date": "03/06", "text": "no issue on device.  working fine.\nbut see the “reset xyz” msg above.  is it asking me to reset the device ?"}, {"sender": "Karan Temple CS", "is_team": true, "date": "03/06", "text": "This is for troubleshooting - in case of any connectivity issues with the device.\nYou don't need to take any action here."}]}, {"name": "Niharika", "group": "Niharika", "thread": [{"sender": "Ramni", "is_team": true, "date": "10/06", "text": "Hi Niharika,\nIt was great to catch up today!\nConsider this group your direct line to us.\nPlease feel free to use it for any feedback, queries, things you like as well as those you don't!\nCheers,\nRamni"}, {"sender": "Ramni", "is_team": true, "date": "16/06", "text": "Hi Niharika,\nHow is it going so far? Just checking in to see if you’
