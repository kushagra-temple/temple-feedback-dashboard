pecific you were wanting to known apart from these? ‎<This message was edited>"}, {"sender": "Jalaj", "is_team": true, "date": "14/06", "text": "We have an evening wind down feature in the works. You will be able to see your pre sleep Entropy and ways to optimise it (breath work, showers, meditation, postures). It will also show how those activities are affecting your sleep quality."}, {"sender": "Jyotiraditya Thakur Joy bhag Club", "is_team": false, "date": "14/06", "text": "Majorly for me in whoop I just ask the chat bot down below"}, {"sender": "Jyotiraditya Thakur Joy bhag Club", "is_team": false, "date": "14/06", "text": "Also"}, {"sender": "Jyotiraditya Thakur Joy bhag Club", "is_team": false, "date": "14/06", "text": "Trained quickly"}, {"sender": "Jyotiraditya Thakur Joy bhag Club", "is_team": false, "date": "14/06", "text": "By Eve"}, {"sender": "Jalaj", "is_team": true, "date": "14/06", "text": "Did you have a very active evening or a long workout today?"}, {"sender": "Jyotiraditya Thakur Joy bhag Club", "is_team": false, "date": "14/06", "text": "Just took a 3hr nap"}, {"sender": "Jyotiraditya Thakur Joy bhag Club", "is_team": false, "date": "14/06", "text": "And was working on laptop for an hour"}, {"sender": "Aaqib Temple", "is_team": true, "date": "14/06", "text": "Getting the battery issue looked into, Joy."}, {"sender": "Aaqib Temple", "is_team": true, "date": "14/06", "text": "We’re soon building a chat bot on the app to serve this and other needs"}, {"sender": "Aaqib Temple", "is_team": true, "date": "15/06", "text": "Joy, we looked into this - your battery was 58% on 13th June around 6pm. Morning of the 14th, it was around 40%. So, it drained as expected. We are launching battery trends on the app soon"}, {"sender": "Jyotiraditya Thakur Joy bhag Club", "is_team": false, "date": "15/06", "text": "Game changer"}]}, {"name": "Kees", "group": "Kees", "thread": [{"sender": "Temple x Kees", "is_team": true, "date": "28/05", "text": "‎Messages and calls are end-to-end encrypted. Only people in this chat can read, listen to, or share them."}, {"sender": "Temple x Kees", "is_team": true, "date": "28/05", "text": "‎‎‎Disappearing messages were turned on. ‎New messages will disappear from this chat ‎90 days after they're sent, except when kept. ‎Change timer"}, {"sender": "Veer Temple", "is_team": true, "date": "28/05", "text": "Hi Kees, this is Veer from the Temple team.\nGreat meeting you. This group is your direct line to us. Please use this group for anything that comes up while using the app: bugs, ideas, things you like, and things that you don’t.\nCheers."}, {"sender": "Kees", "is_team": false, "date": "28/05", "text": "Great tx!"}, {"sender": "Deepi New", "is_team": true, "date": "29/05", "text": "Hi Kees - Deepinder here.\nThe actual range for Entropy is 1-200. We only show up to 120 on the scale, as that’s where everyone mostly lies in. 120+ (overloaded) is almost always achieved in workouts, so we let that “bleed” the scale beyond 120.\nHaving said that, we have received this feedback a bit too many times that this is non-obvious. We will change the range of the Entropy dial to 1-200 on the home page in the next couple of days."}, {"sender": "Kees", "is_team": false, "date": "29/05", "text": "Great. Tx."}, {"sender": "Deepi New", "is_team": true, "date": "30/05", "text": "Hey Kees - takes about 7 days before we generate any insights. Having said that, feedback noted / will work on making sure nobody says that again.\nHi Madhu - welcome aboard! @⁨Veer Temple⁩ - can you pls get on a call with Madhu to get him started?"}, {"sender": "Kees", "is_team": false, "date": "30/05", "text": "Tx deepinder. Appreciated."}, {"sender": "~ Temple", "is_team": false, "date": "06/06", "text": "‎Your security code with ‪+91 87962 02569‬ changed."}, {"sender": "~ Temple", "is_team": false, "date": "06/06", "text": "‎Your security code with ‪+91 87962 02569‬ changed."}, {"sender": "Kees", "is_team": false, "date": "12/06", "text": "‎Your security code with Kees changed."}]}, {"name": "Kunal Khambhati", "group": "Kunal Khambhati", "thread": [{"sender": "Temple x Kunal Khambhati", "is_team": true, "date": "23/05", "text": "‎Messages and calls are end-to-end encrypted. Only people in this chat can read, listen to, or share them."}, {"sender": "Jalaj", "is_team": true, "date": "23/05", "text": "Hi Kunal, it was great to meet! Do share any thoughts, feedback, suggestions, concerns here"}, {"sender": "Kunal Khambhati", "is_team": false, "date": "23/05", "text": "Thank you guys! U as well\nSo excited 🏄‍♂️\nTemple on - been a couple of hours wearing it so far so has Payal\nAlso I’m a first time user for any health monitoring device so expect super basic feedback for now\nFirst reaction -\nWell done with the in person demo and installation guide, you were able to answer or clarify all of my level 1 queries and concerns so far - download of installation was super easy\nPackaging for early access/beta mode - understand it is due improvement - brown box was underwhelming even for early access 😬\nMetal case and device - felt really good in the hand and felt rich - device was super easy to apply stick on and place on temple by myself\nMetal case - random suggestion, maybe grooves on either side of the upper case would be useful for open and close support for the fingers over the front slit, my instinct was to use nails for now\nI’ll browse thru features and play around with data inputs to learn more over the week\nPersonal concerns with temple on my face - not a fan of bringing attention to myself 😅\n‎[25/05/26, 9:09:29 AM] Kunal Khambhati: Good morning! On since 48 hours now - woke up this morning with a lil discomfort or stress on the temple area - felt like removing the device to feel relief (didn’t though)"}, {"sender": "Deepi New", "is_team": true, "date": "25/05", "text": "Haven’t seen this ever"}, {"sender": "Deepi New", "is_team": true, "date": "25/05", "text": "Doesn’t seem like related to temple"}, {"sender": "Kunal Khambhati", "is_team": false, "date": "25/05", "text": "FYI My veins pop when I’m angry or stressed on the forehead in general 😛"}, {"sender": "Deepi New", "is_team": true, "date": "25/05", "text": "But remove it and charge it anyway and wear it again"}, {"sender": "Kunal Khambhati", "is_team": false, "date": "25/05", "text": "Cool it’s on low batt I’ll do that"}, {"sender": "Kunal Khambhati", "is_team": false, "date": "25/05", "text": "Payal has had it on for the same time no such feedback from her ‎<This message was edited>"}, {"sender": "Deepi New", "is_team": true, "date": "03/06", "text": "How’s it going? Hope you are enjoying using Temple."}, {"sender": "Kunal Khambhati", "is_team": false, "date": "04/06", "text": "Please let Deepi know temple has been a game changer for me. Haven’t felt more fitter. -Keeps me calm with the kids (the spikes in entropy when I flip out have got me to take a chill pill ), I’m more aware ..\n-the constant tracking of what I eat is just fab tracking of macros has upped the protein intake game for sure.\nKiller that I can keep track of my period last cycle so I’m not lost as always.\nIt’s amazing how my sleep patterns recorded are actually how I feel when I wake up immediately I can tell that temple will show me my recovery has been good / bad.\nMy resting heart rate has been 50 that gets me more pumped to keep going with the workouts\nOnly question is the other day did not track my 40 min nap , coz that changes how one feels after that nap and the rest of the day !\nIn short feeling weirdly more fitter these last 2 weeks probably a gain in some muscle thanks to the protein awareness which clearly the body was lacking and amazing in general.\nPls also let him know I’ve given a demo to over 100 peeps in Lodha 🤪"}, {"sender": "Kunal Khambhati", "is_team": false, "date": "04/06", "text": "From Payal 👆🏻"}, {"sender": "Temple Care", "is_team": true, "date": "04/06", "text": "Amazing to see it's making a change! We are adding auto nap detections and that should be live soon."}, {"sender": "Temple Care", "is_team": true, "date": "04/06", "text": "How is it going for you @⁨Kunal Khambhati⁩?"}, {"sender": "Deepi New", "is_team": true, "date": "04/06", "text": "Who is this? Let’s not use Temple for whatsapp. Personal names only. Don’t be impersonal."}, {"sender": "Temple Care", "is_team": true, "date": "04/06", "text": "This is Jalaj (using the Temple number). Will keep the profiles personal, sorting this out."}, {"sender": "Kunal Khambhati", "is_team": false, "date": "04/06", "text": "To be honest I am pleasantly surprised at myself, I did not expect myself to be this comfortable with the temple from day 1\nI have had it on daily for 24 hours besides the 3/4 charging cycles - no real interference with any part of daily routine so far\nFirst few days were slightly uncomfortable specially with the attention it gathers and discomfort with adding something on my face but it’s like a part of my body now, don’t even realise it’s on all day anymore until someone points it out\nPointers -\nHigh levels of intrigue from ppl, around 50% asked abt pricing and when it will be available\nAirport security was curious about the product and asked if it can be removed thru security all four times but didn’t insist even once\nMade me conscious abt my sleep routine and I have been more observant and with that since day 1 - helps me understand why my body is behaving differently with irregular sleep patterns\nMorning outlook (my fav) read is always inspiring and positive\nSome goals for myself -\nLearn how to achieve zen mode while awake :)\nLearn abt brain flow markers and how to improve\nRepeat activity with focus peaks\nLearn about cognitive work /\nspike triggers and follow suggested timings more diligently"}, {"sender": "Temple Care", "is_team": true, "date": "05/06", "text": "‎Your security code with Temple Care changed."}, {"sender": "~ Temple", "is_team": false, "date": "06/06", "text": "‎Your security code with ‪+91 87962 02569‬ changed."}, {"sender": "~ Temple", "is_team": false, "date": "06/06", "text": "‎Your security code with ‪+91 87962 02569‬ changed."}, {"sender": "Aaqib Temple", "is_team": true, "date": "16/06", "text": "Hi Kunal — this is Aaqib from Temple. Really happy to see the goals you have set for yourself.\nHow is it going so far? Anything we can help you understand better on the app?"}, {"sender": "Kunal Khambhati", "is_team": false, "date": "17/06", "text": "Hey Aaqib so far so good! Getting pretty used to explaining temple to folks now 😛 really enjoying the experience myself"}, {"sender": "Kunal Khambhati", "is_team": false, "date": "17/06", "text": "Payal was complaining abt the temple tape coming off last few days, Randomly spoke to Sumeet from reliance the other day he was saying the same thing too\nNo such issue for me but wanted to know if others are experiencing similar issues? Any suggestions"}, {"sender": "Jalaj", "is_team": true, "date": "17/06", "text": "Around <10% people are facing issues with tapes/grips. The root cause identified is either not wiping the temple region with a tissue/cloth before wearing the device, or not pressing the device for 4-5 seconds post wearing the device.\nMost of the cases are getting solved by correct application."}, {"sender": "Jalaj", "is_team": true, "date": "17/06", "text": "Will be amazing if you can ask Payal to follow these steps during application and update us how it works for her"}, {"sender": "Kunal Khambhati", "is_team": false, "date": "17/06", "text": "She works out like a beast every morning and profusely sweats it out maybe that’s an influence?"}, {"sender": "Deepi New", "is_team": true, "date": "17/06", "text": "Jalaj - let’s make a video for this please"}, {"sender": "Jalaj", "is_team": true, "date": "17/06", "text": "Sure, will share with already onboarded people. And will get it put on the app as well."}, {"sender": "Kunal Khambhati", "is_team": false, "date": "17/06", "text": "This could be helpful.. last 2 times it came off for Payal was during her morning run not right after application"}, {"sender": "Jalaj", "is_team": true, "date": "17/06", "text": "Many of us do that and don’t face challenge. PV Sindhu has been wearing in all her matches, and she has a bit of oily skin as well. It’s coming down to the right application."}, {"sender": "Kunal Khambhati", "is_team": false, "date": "17/06", "text": "That’s a good sign .. I’ll ask her to try your reco"}, {"sender": "Kunal Khambhati", "is_team": false, "date": "18/06", "text": "Cannot use any more"}, {"sender": "Jalaj", "is_team": true, "date": "18/06", "text": "We will ship a replacement today."}, {"sender": "Jalaj", "is_team": true, "date": "18/06", "text": "Also, would try to get this one picked up from your residence."}, {"sender": "Jalaj", "is_team": true, "date": "18/06", "text": "Want to understand a bit more on any stressor the device went through?"}, {"sender": "Kunal Khambhati", "is_team": false, "date": "18/06", "text": "Nothing out of the ordinary to be honest. Daily runs in open heat for an hour is the only extreme I know"}, {"sender": "Kunal Khambhati", "is_team": false, "date": "18/06", "text": "Cool"}]}, {"name": "Merani", "group": "Merani", "thread": [{"sender": "Temple x Merani", "is_team": true, "date": "07/06", "text": "‎Messages and calls are end-to-end encrypted. Only people in this chat can read, listen to, or share them."}, {"sender": "Deepi New", "is_team": true, "date": "07/06", "text": "Vishal - connecting you to Jalaj and Aaqib from my team. They will be in Bangalore soon, and will get you on Temple. Looking forward 🤗"}, {"sender": "Vishal Merani Sri Sri Ravishankar", "is_team": false, "date": "07/06", "text": "Cool 👍🏼"}, {"sender": "Jalaj", "is_team": true, "date": "07/06", "text": "Hi Vishal, great to connect!\nWe are in Bangalore on Monday (tomorrow). Does around 2PM work for onboarding? Will explain how to use the product and metrics. Should take around an hour."}, {"sender": "Vishal Merani Sri Sri Ravishankar", "is_team": false, "date": "07/06", "text": "2 pm is good Jalaj"}, {"sender": "Jalaj", "is_team": true, "date": "07/06", "text": "Great let’s confirm that. Please send the location also if possible."}, {"sender": "Vishal Merani Sri Sri Ravishankar", "is_team": false, "date": "07/06", "text": "Art of Living International Center (Ved Vignan Maha Vidya Peeth, Bengaluru, 560082, KA, IN): http://www.artofliving.org/bangalore-ashram"}, {"sender": "Jalaj", "is_team": true, "date": "07/06", "text": "Cool. See you at the Center at 2pm tomorrow 🙂"}, {"sender": "Vishal Merani Sri Sri Ravishankar", "is_team": false, "date": "07/06", "text": "If U can come a little earlier can have lunch here 🙂"}, {"sender": "Vishal Merani Sri Sri Ravishankar", "is_team": false, "date": "07/06", "text": "Prasad from ashram"}, {"sender": "Vishal Merani Sri Sri Ravishankar", "is_team": false, "date": "07/06", "text": "Also if you keep a little more time, you can have a tour of the ashram"}, {"sender": "Jalaj", "is_team": true, "date": "07/06", "text": "Given the flights we will mostly reach the Center by 1pm. Will be lovely to have Prasad lunch. 🙏 ‎<This message was edited>"}, {"sender": "Vishal Merani Sri Sri Ravishankar", "is_team": false, "date": "10/06", "text": "Successfully changed the temple after charging it... Have changed the side this time ( changed from right side to left side )... Noticed that the monitoring area is at the bottom in this case... Its been so far so good"}, {"sender": "Jalaj", "is_team": true, "date": "10/06", "text": "It automatically calibrates for the new location and orientation."}, {"sender": "Vishal Merani Sri Sri Ravishankar", "is_team": false, "date": "10/06", "text": "cool"}, {"sender": "Jalaj", "is_team": true, "date": "10/06", "text": "How is it going? :)"}, {"sender": "Vishal Merani Sri Sri Ravishankar", "is_team": false, "date": "10/06", "text": "Very cool"}, {"sender": "Vishal Merani Sri Sri Ravishankar", "is_team": false, "date": "10/06", "text": "so far so good"}, {"sender": "Vishal Merani Sri Sri Ravishankar", "is_team": false, "date": "10/06", "text": "Had a question, If the phone is not near by...how long can the temple store data ?"}, {"sender": "Jalaj", "is_team": true, "date": "10/06", "text": "More than a full day, around 33-36 hours of data"}, {"sender": "Vishal Merani Sri Sri Ravishankar", "is_team": false, "date": "10/06", "text": "oh cool.."}, {"sender": "Aman Kant Temple", "is_team": true, "date": "15/06", "text": "Hi Vishal, hope all is well. How is your experience with Temple going? Any questions/feedback or observations with regards to inversions/meditation (as discussed)?"}, {"sender": "Vishal Merani Sri Sri Ravishankar", "is_team": false, "date": "15/06", "text": "Hey Aman... So far so good...\nthe logging food thing is very useful... I wanted to understand a little more on Entropy and Focus... ‎<This message was edited>"}, {"sender": "Vishal Merani Sri Sri Ravishankar", "is_team": false, "date": "15/06", "text": "My entropy changes a lot while having a cold shower... But doesn't change as much during meditation.... But the focus changes a lot during meditation but not much during the shower"}, {"sender": "Jalaj", "is_team": true, "date": "15/06", "text": "Let me call you @⁨Vishal Merani Sri Sri Ravishankar⁩. Will discuss live :)"}, {"sender": "Vishal Merani Sri Sri Ravishankar", "is_team": false, "date": "15/06", "text": "Cool..."}, {"sender": "Vishal Merani Sri Sri Ravishankar", "is_team": false, "date": "15/06", "text": "Also, the biggest problem with the device is that you have to explain each person you meet 😅.... Infact strangers come upto me and start conversations just to know what i'm wearing 😅"}]}, {"name": "Nicco", "group": "Nicco", "thread": [{"sender": "Temple x Nicco", "is_team": true, "date": "28/05", "text": "‎Messages and calls are end-to-end encrypted. Only people in this chat can read, listen to, or share them."}, {"sender": "Temple x Nicco", "is_team": true, "date": "28/05", "text": "‎‎‎Disappearing messages were turned on. ‎New messages will disappear from this chat ‎90 days after they're sent, except when kept. ‎Change timer"}, {"sender": "Veer Temple", "is_team": true, "date": "28/05", "text": "Hi Nicco, this is Veer from the Temple team.\nGreat meeting you. This group is your direct line to us, so please use it for anything that comes up while using the app: bugs, ideas, confusing moments, things you like, and things you don’t.\nAlso looking forward to your insights on the metrics and how they map to your recovery protocol.\nCheers"}, {"sender": "Dr. Niccolo Stefani", "is_team": false, "date": "28/05", "text": "Hi Veer👍🏻"}, {"sender": "Dr. Niccolo Stefani", "is_team": false, "date": "28/05", "text": "I’m really excited to be part of the group thank you again"}, {"sender": "Dr. Niccolo Stefani", "is_team": false, "date": "30/05", "text": "Good morning"}, {"sender": "Dr. Niccolo Stefani", "is_team": false, "date": "30/05", "text": "Entropy in the night was low as 3"}, {"sender": "Dr. Niccolo Stefani", "is_team": false, "date": "30/05", "text": "But up and down"}, {"sender": "Jalaj", "is_team": true, "date": "30/05", "text": "Looks related to your sleep cycles, Deep and REM.."}, {"sender": "Jalaj", "is_team": true, "date": "30/05", "text": "Peak of ~100 during 1:15am looks interesting.. check it with respect to sleep cycles, or movement during sleep. ‎<This message was edited>"}, {"sender": "Dr. Niccolo Stefani", "is_team": false, "date": "30/05", "text": "Ok 👍🏻"}, {"sender": "Dr. Niccolo Stefani", "is_team": false, "date": "02/06", "text": "Good morning ☀️ quick question last night I sleep let’s say 6 hours but i woke up like 5 min to drink at night so I stand up and fall asleep again the tracker only see 3 hours of sleep"}, {"sender": "Dr. Niccolo Stefani", "is_team": false, "date": "02/06", "text": "So it is not like merging basically"}, {"sender": "Jalaj", "is_team": true, "date": "02/06", "text": "We will check in the back end"}, {"sender": "Jalaj", "is_team": true, "date": "02/06", "text": "If you give it sometime, ideally it should merge, but still checking the backend"}, {"sender": "Jalaj", "is_team": true, "date": "02/06", "text": "Can we look at your sleep data to debug this? We take explicit permission before accessing this data."}, {"sender": "Dr. Niccolo Stefani", "is_team": false, "date": "02/06", "text": "Yes please I authorize you no issue"}, {"sender": "Jalaj", "is_team": true, "date": "02/06", "text": "Your second half of the sleep (after you got up to drink) looks very disturbed with high motion. Thanks for reporting, we are updating our algos to capture these types of disturbed sleep better. You should see your sleep report getting updated soon today."}, {"sender": "Dr. Niccolo Stefani", "is_team": false, "date": "02/06", "text": "I was in a plane so could be turbulence"}, {"sender": "Dr. Niccolo Stefani", "is_team": false, "date": "02/06", "text": "I was on flat bed but still on a plane"}, {"sender": "Dr. Niccolo Stefani", "is_team": false, "date": "02/06", "text": "Also I’ll try some peptide  for sleep soon I’ll tell\nYou when I do"}, {"sender": "Dr. Niccolo Stefani", "is_team": false, "date": "02/06", "text": "I knew you guys has lots of demand but my wife that she is fitness crazy would like one can I borrow mine or it is possible to have a beta for her sorry for the request you already did a lot"}, {"sender": "Dr. Niccolo Stefani", "is_team": false, "date": "02/06", "text": "I’ll use this peptide DSIP"}, {"sender": "Jalaj", "is_team": true, "date": "02/06", "text": "Yes, we could see the turbulennce and constant low grade motion"}, {"sender": "Jalaj", "is_team": true, "date": "02/06", "text": "Great, let us know when you do it. You can also record in the app."}, {"sender": "Jalaj", "is_team": true, "date": "02/06", "text": "Would this need shipping to EU? we are currently sorting out cross-border shipments with the ing it"}, {"sender": "Dr. Niccolo Stefani", "is_team": false, "date": "11/06", "text": "Average entropy is for me usually on the 32/36 range"}, {"sender": "Jalaj", "is_team": true, "date": "11/06", "text": "That’s a good zone, lower would be even better :)\nAre you able to take it down through some recovery activities?"}, {"sender": "Dr. Niccolo Stefani", "is_team": false, "date": "11/06", "text": "Yes actually for me if I stop and kind of relax /phase out my brain it go down like linearly"}, {"sender": "Dr. Niccolo Stefani", "is_team": false, "date": "11/06", "text": "We can chat in couple of weeks"}, {"sender": "Dr. Niccolo Stefani", "is_team": false, "date": "11/06", "text": "Let me know when you have the tracker ;)"}, {"sender": "Jalaj", "is_team": true, "date": "11/06", "text": "Done 👍"}, {"sender": "Jalaj", "is_team": true, "date": "11/06", "text": "All done, shipping today, should reach by Tuesday"}, {"sender": "Dr. Niccolo Stefani", "is_team": false, "date": "11/06", "text": "Ok 👌🏻 awesome"}]}, {"name": "RP", "group": "RP", "thread": [{"sender": "Temple x RP", "is_team": true, "date": "04/06", "text": "‎Messages and calls are end-to-end encrypted. Only people in this chat can read, listen to, or share them."}, {"sender": "Meta Temple", "is_team": true, "date": "04/06", "text": "@⁨~Varun Gandhi⁩ - we spoke, it would make sense for RP to start using Temple after our team does onboarding with him in-person.\nCan we try again if this is doable before the match on 6th?"}, {"sender": "Meta Temple", "is_team": true, "date": "04/06", "text": "Our team can come over and get this done."}, {"sender": "Meta Temple", "is_team": true, "date": "04/06", "text": "Let us know either ways."}, {"sender": "Meta Temple", "is_team": true, "date": "05/06", "text": "@⁨~Varun Gandhi⁩ - let us know how we should plan for tomorrow. Looking forward."}, {"sender": "~ Varun Gandhi", "is_team": false, "date": "05/06", "text": "Hi Akriti and team!\nApologies for the delay, we’re just trying  "Sagar & Sahil", "group": "Sagar & Sahil", "thread": [{"sender": "Temple x Sagar/Sahil (Empower Sleep)", "is_team": true, "date": "27/05", "text": "‎Messages and calls are end-to-end encrypted. Only people in this chat can read, listen to, or share them."}, {"sender": "Veer Temple", "is_team": true, "date": "27/05", "text": "Hi Sagar, This is Veer from the Temple team.\nGreat chatting with you. This group is your direct line to us. Please use this group for anything that comes up while using the app: bugs, ideas, things you like, and things that you don’t.\nCheers."}, {"sender": "Sagar Chopra EmpowerSleep", "is_team": false, "date": "28/05", "text": "‎Sagar Chopra EmpowerSleep changed the group name to “Temple x Sagar/Sahil (Empower Sleep)”"}, {"sender": "Sagar Chopra EmpowerSleep", "is_team": false, "date": "28/05", "text": "Thanks a lot guys. I’m looping in Sahil as well. He will get the device soon.\nDeepi/Jalaj - great to reconnect and jam on leveraging temple for sleep protocols"}, {"sender": "Sagar Chopra EmpowerSleep", "is_team": false, "date": "28/05", "text": "I find myself opening the app so frequently, wish there was a widget!"}, {"sender": "Jalaj", "is_team": true, "date": "28/05", "text": "It’s in the works! What would you like to see in the widget?"}, {"sender": "Sagar Chopra EmpowerSleep", "is_team": false, "date": "28/05", "text": "When I usually open the app I’m looking at entropy and brain flow to see how a current or recent activity is impacting it.\nHaving a quick way to add to timeline would be helpful, directly from widget (food, record activity). Just less taps."}, {"sender": "Sagar Chopra EmpowerSleep", "is_team": false, "date": "29/05", "text": "‎This message was deleted."}, {"sender": "Sagar Chopra EmpowerSleep", "is_team": false, "date": "29/05", "text": "Joining the movement 🤖"}, {"sender": "Deepi New", "is_team": true, "date": "29/05", "text": "Aligned with the eyebrow"}, {"sender": "~ Sahil Chopra", "is_team": false, "date": "29/05", "text": "Noted.  Will do next time."}, {"sender": "~ Sahil Chopra", "is_team": false, "date": "29/05", "text": "Thanks man."}, {"sender": "Deepi New", "is_team": true, "date": "03/06", "text": "Gentlemen - how’s it going? ‎<This message was edited>"}, {"sender": "~ Sahil Chopra", "is_team": false, "date": "03/06", "text": "Deepi.\nThis is very interesting biosignal.\nI can see why you’re so passionate about it.\nI need more days of data and some correlations with sleep testing data to start drawing better relationships.\nI forget I’m even wearing it."}, {"sender": "~ Sahil Chopra", "is_team": false, "date": "03/06", "text": "The app dashboard style is cool as well."}, {"sender": "Deepi New", "is_team": true, "date": "03/06", "text": "Let us know if you need a raw data dump of any sort - we will share it here"}, {"sender": "Deepi New", "is_team": true, "date": "03/06", "text": "How did your kids react to seeing Temple on you? @⁨~Sahil Chopra ⁩"}, {"sender": "Sagar Chopra EmpowerSleep", "is_team": false, "date": "03/06", "text": "I did one night of data with a home sleep test. Can share the edf if it’s helpful.\nDittoing Sahils message. Really neat signal. I have it charging and will put it back on today."}, {"sender": "~ Sahil Chopra", "is_team": false, "date": "03/06", "text": "My middle son (7 year old) wants one. lol. He’s into all these gizmos."}, {"sender": "~ Sahil Chopra", "is_team": false, "date": "03/06", "text": "I started sleep testing last night. I’ll have some more data in a few days."}, {"sender": "Deepi New", "is_team": true, "date": "03/06", "text": "Btw, I didn’t mention – Temple emits zero radiation towards the body side. And we use a custom ultra low powered bluetooth to communicate with the phone. So this is safe for kids too. But too early to learn entropy at 7 years of age 😀"}, {"sender": "~ Temple", "is_team": false, "date": "06/06", "text": "‎Your security code with ‪+91 87962 02569‬ changed."}, {"sender": "~ Temple", "is_team": false, "date": "06/06", "text": "‎Your security code with ‪+91 87962 02569‬ changed.\n‎[10/06/26, 3:25:45 PM] Sagar Chopra EmpowerSleep: Hey guys, qq. Wasn’t wearing my device for a week since I forgot adhesives.\n1/ just recharged the device for 15 mins. Charger is blinking purplish light\n2/ device no longer connecting to app\n3/ disconnected the device and trying to reconnect, not working\n4/ tapped “forget device” in Bluetooth setting. Still not able to find device\n5/ using iOS\n‎[10/06/26, 3:25:46 PM] Sagar Chopra EmpowerSleep: Hey guys, qq. Wasn’t wearing my device for a week since I forgot adhesives.\n1/ just recharged the device for 15 mins. Charger is blinking purplish light\n2/ device no longer connecting to app\n3/ disconnected the device and trying to reconnect, not working\n4/ tapped “forget device” in Bluetooth setting. Still not able to find device\n5/ using iOS"}, {"sender": "Sagar Chopra EmpowerSleep", "is_team": false, "date": "10/06", "text": "Also when I put my finger over Temple sensor, not seeing the red light"}, {"sender": "Jalaj", "is_team": true, "date": "10/06", "text": "Are you seeing the green light flicker?"}, {"sender": "Sagar Chopra EmpowerSleep", "is_team": false, "date": "10/06", "text": "No light on the temple device"}, {"sender": "Jalaj", "is_team": true, "date": "10/06", "text": "The charger seems fine. Can you try placing the device again on the charger, move it up and down a bit. Might be a contact point issue. Also, remove tape if there is any on the device."}, {"sender": "Jalaj", "is_team": true, "date": "10/06", "text": "The dot will light up white if the device gets power from the charger."}, {"sender": "Sagar Chopra EmpowerSleep", "is_team": false, "date": "10/06", "text": "No tape on device. Tried moving it around. Charge has this light purplish when I open it, otherwise it shuts off.\nI can try Sahils charger and see if I get a different response"}, {"sender": "Jalaj", "is_team": true, "date": "10/06", "text": "Yeah try on Sahil’s charger if that’s handy."}, {"sender": "Jalaj", "is_team": true, "date": "11/06", "text": "Did it work on the other charger?"}, {"sender": "Sagar Chopra EmpowerSleep", "is_team": false, "date": "11/06", "text": "Unfortunately no response from Sahils charger either. Likely the device isn’t picking up charge"}, {"sender": "Deepi New", "is_team": true, "date": "11/06", "text": "Shit. Jalaj – lets send two new devices; one for backup. I would love Sagar and Sahil to have continous usage."}, {"sender": "Sagar Chopra EmpowerSleep", "is_team": false, "date": "11/06", "text": "Happy to send this device back of its helpful to diagnose"}, {"sender": "Deepi New", "is_team": true, "date": "11/06", "text": "Yessir – that would be lovely."}, {"sender": "Deepi New", "is_team": true, "date": "11/06", "text": "Also, we have an updated understanding of our Entropy metric – sharing an internal note with you.\n—\nTopic: what Entropy actually measures (and what it doesn't)\nLast few days, we have had an updated understanding of our Entropy metric which explain a lot of our observations about how the metric behaves.\nOur latest understanding of Entropy is that it is your metabolic rate (amount of calories being burnt by your body real time). We are even contemplating renaming it to Burn Rate (pending some work before we switch to this name).\nWe are going to validate this updated understanding using calorimeters and publish white-papers on this metric before we go public with the device in a few weeks from now, as establishing trust is of paramount importance here.\nEvery other wearable calculates calories from heart rate, which is a known-bad proxy. We think we are measuring the thing they guess at, and we can now show that the same person spends different calories on different days depending on their state, not just their weight and age.\nThe mission follows directly: spend less to live longer.\nLower resting Entropy/Burn means a body that is cheap to run, which evidence links to longevity. A wide range between your resting floor and your peak means you can still surge and recover when you need to. Low floor, wide range, that's the goal.\nWhat ENTROPY is NOT\nEntropy (Burn Rate) is not a stress meter, a mood meter, or a drama meter. It does not measure how intense a moment feels. It measures what that moment costs your body in energy. These are different things, and they come apart exactly when you'd least expect it. Three real examples from our own data:\nOne, an anxiety attack. Feels like a 10 out of 10. Entropy (Burn Rate) moved about 10 points up from 30 to 40. Real, but modest, because panic costs the body far less energy than it costs the mind.\nTwo, a hard head strike in the pool this week. Violent event, the kind of thing you'd assume spikes everything. Burn Rate dropped, from 120 to 75. Why? The person was swimming, and most of that 120 was the physical work of swimming. The impact triggered a freeze response, the body went still for a few seconds, and the moment movement stopped, the biggest part of the number fell away. The drop was the activity disappearing, not the body calming down. It recovered within minutes.\nHold these two cases side by side and you've got the whole lesson: a dramatic feeling barely moved the number, and a dramatic event moved it down. Burn Rate tracks metabolic spend, not how big the moment feels.\nWe are going to test this new understanding rigorously, and we will share more once we learn more. But for now, this new understanding explains almost all the unexplained patterns in Entropy which we have observed. I request you to dogfood Entropy with this new lens, and I look forward to learning more about this with you. ‎<This message was edited>"}, {"sender": "Jalaj", "is_team": true, "date": "12/06", "text": "@⁨Sagar Chopra EmpowerSleep⁩ : In the meantime, can you try cleaning the contact points of the device and trying charging again? Sometimes the skin residue/oils can prevent the pins on the device to make a contact with the charger pins."}, {"sender": "Sagar Chopra EmpowerSleep", "is_team": false, "date": "13/06", "text": "Lmk the right address to ship to ‎<This message was edited>"}, {"sender": "Sagar Chopra EmpowerSleep", "is_team": false, "date": "13/06", "text": "I did try this, no luck."}, {"sender": "~ Sahil Chopra", "is_team": false, "date": "13/06", "text": "I have some thoughts about this.\nTo me this makes sense because when I look at the processed data. I see a real time highly sampled signal within a narrow sampling window. it has a dynamic nature that can be very formative about metabolic/ ANS activity.\nI think the issues with “stress” in traditional thinking is it’s a volumetric average across the day-night window and summated into a composite score.\nI’ll keep wearing and share thoughts.\nLet me know if I can do anything to help.\nWhat’s the sampling rate of data?"}, {"sender": "~ Sahil Chopra", "is_team": false, "date": "13/06", "text": "What I don’t completely understand is why this has to be a PPG signal measure over the Temple region versus a PPG signal coming from anywhere else.\nOther than mastication now and presumably EEG/EOG/EMG in the future, is there any additional benefit of being over the temple region?"}, {"sender": "Jalaj", "is_team": true, "date": "13/06", "text": "Sampling rate is continuous, and 30 second windows are used for Entropy analysis. ‎<This message was edited>"}, {"sender": "Jalaj", "is_team": true, "date": "13/06", "text": "Temple region has a very unique physiology compared to other areas.\n1. Temple region stays at core body temperature even in colder/hotter environments, while fingers or wrists become colder/hotter\n2.  the vasodilation of Temporal Artery is an indicator of effort body is putting to achieve homeostasis\n3. ⁠additionally, special nerves (trigeminal nerves) surround the arteries in this region and their activity is a signal for autonomic nervous system balance."}, {"sender": "Jalaj", "is_team": true, "date": "13/06", "text": "It’s impossible to get this signal from any other body part. Temple region is super unique in this regard."}, {"sender": "Jalaj", "is_team": true, "date": "13/06", "text": "You can ship it to:\nTEMPLE PRIVATE LIMITED\n6th Floor, Towers A, B, & C, Grand Canyon\n(B3) Building, ASF Insignia SEZ Near Faridabad,\nGurugram Road, Gwal Pahari,\nGurugram - 122003"}, {"sender": "Sagar Chopra EmpowerSleep", "is_team": false, "date": "13/06", "text": "Also an interesting angle from sleep standpoint. It almost reframes sleep from architecture (what state, duration) to nighttime energy expenditure (metabolic spend at night)."}, {"sender": "Sagar Chopra EmpowerSleep", "is_team": false, "date": "13/06", "text": "Also would be really insightful to understand this along people who have underlying sleep disorders. For example two people are labeled with “moderate sleep apnea”…but the cost of those apneic events might be different from person A to person B. Therefore they’ll require different protocols"}, {"sender": "Sagar Chopra EmpowerSleep", "is_team": false, "date": "13/06", "text": "Basically another way to phenotype/endotype"}, {"sender": "Jalaj", "is_team": true, "date": "13/06", "text": "That could be a very useful result."}, {"sender": "Jalaj", "is_team": true, "date": "13/06", "text": "@⁨Sagar Chopra EmpowerSleep⁩ btw, if you prefer we can arrange for a pickup from your place. You just need to put it in an envelope with the address ‎<This message was edited>"}, {"sender": "Sagar Chopra EmpowerSleep", "is_team": false, "date": "13/06", "text": "That would actually be great 🙏🏽\nSagar Chopra\n159 W 53rd St, Apartment 31F\nNew York, NY 10019, USA ‎<This message was edited>"}, {"sender": "~ Sahil Chopra", "is_team": false, "date": "14/06", "text": "That’s very interesting. I did not know that."}, {"sender": "~ Sahil Chopra", "is_team": false, "date": "14/06", "text": "I wonder if putting a sensor over the neck would have unique implications (the common carotid artery, and the vagus nerve) could be an extremely rich source of whole body data."}, {"sender": "Jalaj", "is_team": true, "date": "14/06", "text": "All those signals uniquely surface back on Temple as well. Lot of features and metrics in the pipeline :)"}, {"sender": "~ Sahil Chopra", "is_team": false, "date": "14/06", "text": "That’s amazing.\nLet me know if I can be helpful.\nWe are onto something."}]}, {"name": "Sahil", "group": "Sahil", "thread": [{"sender": "Temple x Sahil", "is_team": true, "date": "10/06", "text": "‎Messages and calls are end-to-end encrypted. Only people in this chat can read, listen to, or share them."}, {"sender": "Aaqib Temple", "is_team": true, "date": "10/06", "text": "Hi Sahil - this is your customer care group for Temple. Any feedback, suggestions, questions — please throw them here without any hesitation please. Look forward!"}, {"sender": "Aaqib Temple", "is_team": true, "date": "10/06", "text": "We are looking into the tapes issue you’re facing"}, {"sender": "Deepi New", "is_team": true, "date": "10/06", "text": "Sahil, Deepi here."}, {"sender": "Deepi New", "is_team": true, "date": "10/06", "text": "Pls wipe off skin properly before using the tape. The tapes are skin friendly; so no skincare routine required under it."}, {"sender": "~ Sahil", "is_team": false, "date": "10/06", "text": "Hey Deepi- Figured the issue"}, {"sender": "~ Sahil", "is_team": false, "date": "10/06", "text": "I use wax-"}, {"sender": "~ Sahil", "is_team": false, "date": "10/06", "text": "So it’s the sweat and wax- I guess"}, {"sender": "Deepi New", "is_team": true, "date": "10/06", "text": "Ok got it."}, {"sender": "Deepi New", "is_team": true, "date": "10/06", "text": "Maybe. Use wax around it. Women also do skincare and make up around the Temple. ‎<This message was edited>"}, {"sender": "~ Sahil", "is_team": false, "date": "10/06", "text": "Had cleaned the skin before applying."}, {"sender": "Deepi New", "is_team": true, "date": "10/06", "text": "Understood." orks which will persist on Home Screen once temple is fully charged.\nIn addition to this we send off body reminders at regular intervals if device is not on charge."}, {"sender": "Eshaan Gupta", "is_team": true, "date": "23/05", "text": "Did you get the 100% charged notification?"}, {"sender": "Vatsal Singhal Ultrahuman", "is_team": false, "date": "23/05", "text": "Somehow didn’t get it. It could be the device was in the bag in the charging case and wasn’t near the phone"}, {"sender": "Eshaan Gupta", "is_team": true, "date": "23/05", "text": "Ah ok. Even in that case it should have got triggered once the phone was near the device. Will get this checked."}, {"sender": "Vatsal Singhal Ultrahuman", "is_team": false, "date": "23/05", "text": "Nice view haha!"}, {"sender": "Deepi New", "is_team": true, "date": "23/05", "text": "Temple is the most accurate I am telling you"}, {"sender": "Deepi New", "is_team": true, "date": "23/05", "text": "Beat to beat with polar"}, {"sender": "Vatsal Singhal Ultrahuman", "is_team": false, "date": "23/05", "text": "I am sure! Super accurate till now"}, {"sender": "Deepi New", "is_team": true, "date": "24/05", "text": "Auto activity in the background is screwing up battery life"}, {"sender": "Vatsal Singhal Ultrahuman", "is_team": false, "date": "24/05", "text": "Got it"}, {"sender": "Deepi New", "is_team": true, "date": "25/05", "text": "How’s it going with temple? Any new observations?"}, {"sender": "Vatsal Singhal Ultrahuman", "is_team": false, "date": "25/05", "text": "Still not able to figure how to use Brain flow - basically its at 80 now how do a control it or move it"}, {"sender": "Vatsal Singhal Ultrahuman", "is_team": false, "date": "25/05", "text": "Like how is it trending right now"}, {"sender": "Vatsal Singhal Ultrahuman", "is_team": false, "date": "13/06", "text": "‎Your security code with Vatsal Singhal Ultrahuman changed."}]}, {"name": "Vidur", "group": "Vidur", "thread": [{"sender": "Temple x Vidur", "is_team": true, "d opening the app. Getting it checked."}, {"sender": "Jalaj", "is_team": true, "date": "05/06", "text": "The calibration was getting completed as soon as you were putting it on, but the banner didn’t get cleared. Have fixed that. Thanks for reporting!"}, {"sender": "Vidur Mahajan from CARPL", "is_team": false, "date": "05/06", "text": "Yes noticed it today!"}, {"sender": "~ Temple", "is_team": false, "date": "06/06", "text": "‎Your security code with ‪+91 87962 02569‬ changed."}, {"sender": "~ Temple", "is_team": false, "date": "06/06", "text": "‎Your security code with ‪+91 87962 02569‬ changed."}]}], "taxonomy": {"Hardware/Firmware": ["Battery", "Device Body", "Charger", "Connectivity", "Sensor", "Heating"], "Manufacturing": ["Color/Finish", "Breakage", "Packaging"], "Adhesion": ["Tapes", "Skin Issues", "Residue"], "Data Science": ["Accuracy", "Chewing Detection", "Sleep Tracking", "Auto Workout", "Calorie Tracking", "GPS/Distance"], "Science Team": ["Entropy", "Brain Flow", "Focus", "Cognitive Work", "Recovery Score"], "Tech": ["App Crashes", "Sync & Data", "Notifications", "UI/UX", "Android Bugs"], "Product Team": ["Feature Requests", "Women's Health", "Activity Logging"], "Support": ["Onboarding", "Device Replacement", "Logistics"]}, "faq": {"Hardware/Firmware": [{"question": "How long does the device take to charge, and how do I know when it's done?", "customers": ["RG", "Sanjeev", "Vatsal"], "answer": "A full charge takes about 1 hour 15 minutes (80% in ~30 mins). You'll get a notification on the app when it's complete. The LED on the charger will breathe 4 times and stop — that's normal, not a fault.", "count": 3}, {"question": "Why does battery drain faster than expected, or not last the advertised duration?", "customers": ["Mohit", "Ragini", "Joel & Joy", "Vatsal"], "answer": "Battery life averages 3–3.5 days. Leaving an activity running in the background significantly drains it faster. Check that no activity is paused/running when not in use. Battery life is intentionally matched to tape change rhythm (every 3–4 days).", "count": 4}, {"question": "What do the different LED light colours and blink patterns on the charger mean?", "customers": ["Mayur", "RG"], "answer": "White blinking = charging in progress. Breathing 4 times then stopping = fully charged (this is normal). No light = device not seated properly on charger, adjust placement. Purple/unusual colours may indicate a firmware or hardware issue — contact support.", "count": 2}, {"question": "Is the device safe to use near water, during sweaty workouts, or in a sauna?", "customers": ["Vatsal", "Dr Apoorva"], "answer": "The device is fully waterproof — face washing, showering, and sweating are all fine. Sauna is also safe; the temple area naturally stays at core body temperature, capping device heat around 40–45°C even at 70°C ambient. Max rated temp is around 55°C.", "count": 2}, {"question": "The device keeps disconnecting or won't reconnect to the app — what should I do?", "customers": ["Sandeep", "Himanshu", "Mohit"], "answer": "First try restarting your phone's Bluetooth. If that doesn't work, unlink the device in the app and re-scan. For new/replacement devices, you will need to unlink the old device first before connecting the new one — we're working on making this automatic.", "count": 3}], "Adhesion": [{"question": "Why does the tape fall off during heavy workouts or after a few days?", "customers": ["Prerna", "Pulkit", "Sumeet", "Kunal Khambhati", "Sahil"], "answer": "The most common cause is oil or residue on the skin before application. Wipe the temple area with a dry tissue first, then press the device firmly for 4–5 seconds after placing. For high-sweat activities, use Athlete tapes instead of Comfort tapes. Tape is designed to last 3–4 days.", "count": 5}, {"question": "Is it normal for skin to feel irritated or show marks after removing the tape?", "customers": ["Dr Apoorva", "Ankush", "Ragini"], "answer": "Mild marks or slight redness on removal is common, especially in early weeks. Skin typically adapts within 1–2 tape cycles. Avoid reapplying to the exact same spot — rotate slightly. If irritation persists beyond 3–4 days, switch sides or contact us.", "count": 3}, {"question": "Does residue build up on the device sensor, and how should I clean it?", "customers": ["Ankush"], "answer": "Some glue residue on the device after removal is normal. Use a dry cloth or damp wipe to gently clean the contact points and sensor area. Avoid submerging the device specifically for cleaning. Keeping the sensor area clean ensures accurate readings.", "count": 1}], "Data Science": [{"question": "Why did the device miss detecting a meal, or flag a false eating detection?", "customers": ["Mayur", "Mohit", "Dr Apoorva", "Shivam", "Niharika"], "answer": "Chewing detection works on jaw movement patterns and is still being personalised per user. False positives (e.g. chewing gum, talking) can be dismissed and tagged as 'not eating' — this data trains your personal model. Liquids and small sips are not detected yet. Late notifications are being improved.", "count": 5}, {"question": "Why does the sleep tracking seem inaccurate — wrong start time, missed naps, or split sessions?", "customers": ["Mayur", "Nicco", "Rob Mohr", "Akshant"], "answer": "Sleep detection improves over the first 7 days as the device calibrates to your patterns. Brief wake-ups (under 10 mins) should now merge as one session. Nap detection is not yet live. If sleep data is missing, check battery didn't die mid-sleep — that causes a gap. You can manually edit sleep times in the app.", "count": 4}, {"question": "Calorie counts seem off — too high for food logged, or too low for workouts. Why?", "customers": ["Akshant", "Pulkit", "Rob Mohr"], "answer": "Food calorie estimates are AI-generated and occasionally inaccurate — flag these so we improve them. For workouts, Temple uses entropy-based calorie calculation rather than heart rate, which is more accurate for strength training but still being refined for high-intensity cardio (HIIT, cycling at threshold). Improvements are actively in progress.", "count": 3}, {"question": "Can the device detect drinks, liquids, or fluid intake?", "customers": ["Ragini", "Shagun"], "answer": "Not currently — detection is based on jaw chewing movements, so liquids (smoothies, coffee, water) are not picked up. This is on the roadmap.", "count": 2}], "Science Team": [{"question": "What does Entropy actually measure, and what brings it down?", "customers": ["Ajit", "Akanksha", "Kees", "Vatsal", "Merani"], "answer": "Entropy is your body's real-time metabolic rate — the total energy cost of what you're doing (physical activity + nervous system activity + baseline organ function). To lower it: meditation, breathwork, cold exposure, head-down tilt, and sleep. It naturally spikes during exercise, eating, and stress — and drops during rest and recovery.", "count": 5}, {"question": "Why does Entropy go above the 120/160 shown on the dial during workouts?", "customers": ["Kees", "Akshant"], "answer": "The dial shows up to 120 (or 160 on some versions) because that's where most users sit day-to-day. During intense workouts, entropy can reach 180–200+, which is normal and means your body is working hard. The full scale goes to 200 — the display will be updated to reflect this.", "count": 2}, {"question": "How is Focus measured, and why does it show low even during focused work?", "customers": ["Dr Apoorva", "Vatsal"], "answer": "Focus is a physiological signal measured from cerebral blood flow patterns — it reflects your brain's readiness state, not effort or concentration per se. Always log an activity when doing focused work (surgery, coding, meetings) so we can study and calibrate your personal focus signature.", "count": 2}, {"question": "What is Cognitive Work and how do I increase it?", "customers": ["Dr Apoorva", "Kunal Khambhati"], "answer": "Cognitive Work = Focus × hours. It's the total productive brain output over a period. To increase it: maintain high focus states for longer durations by keeping Entropy low before deep work sessions, sleeping well, and timing focused work during your natural Brain Flow peaks.", "count": 2}], "Tech": [{"question": "Data isn't loading, or the app is showing outdated/missing metrics — what's happening?", "customers": ["Ragini", "Vatsal", "Akshant"], "answer": "This is usually a sync delay. Try killing the app and reopening. Charts update on 5-minute intervals, so the last data point shown will be the last 5-minute mark — live data catches up within seconds of opening. If sleep data is missing after waking, wait a few minutes for backend processing to complete.", "count": 3}, {"question": "Notifications are either too frequent, delayed, or not firing at all — is this normal?", "customers": ["Ragini", "Vatsal", "Sumeet", "Niharika"], "answer": "Off-body reminders fire at regular intervals. Charge-complete notifications trigger once at 100% — if missed, a persistent banner is being added. Eating detection notifications are being tuned for timing. Push every 5 minutes after full charge is a bug — being fixed. Bluetooth-off notifications are on the roadmap.", "count": 4}, {"question": "The UI feels confusing in certain spots — ending an activity, calorie display, or chart readability.", "customers": ["Akshant", "Akanksha", "Vatsal"], "answer": "Known areas being improved: ending an activity requires 3-dot menu (intentional to keep screen clean, will be made clearer); calorie surplus/burned label can be confusing (fix in progress); chart data intervals are 5 minutes (not real-time by design). Feedback on specific screens is always welcome — send a screenshot.", "count": 3}], "Product Team": [{"question": "Is there or will there be a way to locate the device if it's lost or falls off?", "customers": ["Aakash", "Niharika", "Sumeet"], "answer": "Find My Temple is now live on app version v1.1.0. Update your app to access it. We also replace devices under Temple Care if they're lost or damaged.", "count": 3}, {"question": "Are third-party integrations like Strava, Apple Health, or Garmin planned?", "customers": ["Sumeet", "Avi & Rob", "Dhruv B"], "answer": "Apple Health integration is already live — go to Menu > Integrations > Apple Health. Strava is in active development (2–3 weeks). Automated Set Detection for workouts is also coming soon. More integrations are being prioritised based on demand.", "count": 3}, {"question": "Will there be a widget or quicker way to log food and check metrics without opening the app?", "customers": ["Sagar & Sahil", "Vatsal"], "answer": "A home screen widget is in development. It will show live Entropy and Brain Flow, and allow quick food logging and activity starts directly from the widget — no need to open the full app.", "count": 2}, {"question": "Can the device be shared between two people or used by someone else temporarily?", "customers": ["Dr Apoorva", "Nicco"], "answer": "Not currently — the device calibrates to one person's physiology and profile. Sharing without resetting produces inaccurate readings. A reset/share flow is on the roadmap. For now, contact support if you need a second device.", "count": 2}], "Manufacturing": [{"question": "Will there be more colour options, including options suited for women?", "customers": ["Dr Apoorva"], "answer": "Yes — three more colours are coming: Reflective Silver, True Gold, and Matte Titanium. Rose Gold for women is also being developed. Current users will be informed when new colours are available.", "count": 1}], "Support": [{"question": "How does device replacement work if the device is lost, damaged, or malfunctioning?", "customers": ["Mohit", "Sumeet", "RG", "Sagar & Sahil"], "answer": "All devices are covered under Temple Care — our in-house replacement programme. Contact your support group and we'll ship a replacement right away, no questions asked. For damaged devices, we may ask to collect the old unit for diagnosis. Replacements typically arrive within 1–2 business days (India).", "count": 4}]}};
const CLASSES=["Problem","Negative","Suggestion","Question","Positive"];
const ORDER={Problem:0,Negative:1,Suggestion:2,Question:3,Positive:4};
const RKEY="temple_v3";
let REMARKS={};
try{REMARKS=JSON.parse(localStorage.getItem(RKEY)||"{}");}catch(e){}
function saveR(id,v){if(v&&v.trim())REMARKS[id]=v;else delete REMARKS[id];try{localStorage.setItem(RKEY,JSON.stringify(REMARKS));}catch(e){}}
function onR(id,el){saveR(id,el.value);el.classList.toggle("saved",!!(el.value&&el.value.trim()));}
function esc(s){return String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
function eA(s){return esc(s).replace(/"/g,"&quot;").replace(/'/g,"\'");}

function renderChart(cid,recs,dim,vals,av,fn){
  const rows=vals.map(v=>{
    const c={v,total:0};CLASSES.forEach(cl=>c[cl]=0);
    recs.filter(r=>r[dim]===v).forEach(r=>{c[r.classification]++;c.total++;});
    return c;
  }).filter(c=>c.total>0).sort((a,b)=>b.total-a.total);
  const mx=rows.length?Math.max(...rows.map(r=>r.total)):1;
  let h=rows.map(c=>{
    const segs=CLASSES.map(cl=>c[cl]?`<div class="cseg ${cl}" style="width:${(c[cl]/c.total)*100}%"></div>`:"").join("");
    const act=av===c.v?" act":"";
    return `<div class="crow${act}${fn?" clk":""}" ${fn?`onclick="${fn}('${eA(c.v)}')"`:""}>
      <div class="clbl" title="${eA(c.v)}">${esc(c.v)}</div>
      <div class="ctrk" style="width:${(c.total/mx)*100}%">${segs}</div>
      <div class="ccnt">${c.total}</div></div>`;
  }).join("");
  h+=`<div class="lgnd">${CLASSES.map(cl=>`<span><i class="sw ${cl}"></i>${cl}</span>`).join("")}</div>`;
  document.getElementById(cid).innerHTML=h||'<div class="empty">No feedback yet.</div>';
}

function chips(cid,lbl,vals,cts,av,fn){
  const c=[`<span class="fblbl">${lbl}:</span>`,
    `<button class="chip${av==="all"?" on":""}" onclick="${fn}('all')">All</button>`
  ].concat(vals.map(v=>`<button class="chip${av===v?" on":""}" onclick="${fn}('${eA(v)}')">${esc(v)}${cts[v]!=null?` (${cts[v]})`:""}</button>`));
  document.getElementById(cid).innerHTML=c.join("");
}

function renderTable(cid,recs,opts){
  recs=recs.slice().sort((a,b)=>
    (opts.showTeam?a.area.localeCompare(b.area):0)||
    a.subcategory.localeCompare(b.subcategory)||
    ORDER[a.classification]-ORDER[b.classification]);
  const t=document.getElementById(cid);
  if(!recs.length){t.innerHTML='<tbody><tr><td><div class="empty">No messages match this filter.</div></td></tr></tbody>';return;}
  let h='<thead><tr>'+(opts.showTeam?'<th>Team</th>':'')+'<th>Subcategory</th><th>Type</th><th>Feedback</th><th>Member</th><th>Date</th><th class="colr">Answer / Remark</th></tr></thead><tbody>';
  h+=recs.map(r=>{
    const rv=REMARKS[r.id]?eA(REMARKS[r.id]):"";
    const av=r.answer?eA(r.answer):rv;
    return '<tr>'+(opts.showTeam?`<td class="sub">${esc(r.area)}</td>`:'')+
      `<td class="sub">${esc(r.subcategory)}</td>`+
      `<td><span class="pill ${r.classification}">${r.classification}</span></td>`+
      `<td class="fbtx">${esc(r.text)}</td>`+
      `<td class="who">${esc(r.customer)}</td>`+
      `<td class="who">${esc(r.date)}</td>`+
      `<td class="colr"><textarea class="ri${av?" saved":""}" placeholder="Add answer or remark…" oninput="onR('${r.id}',this)">${av}</textarea></td></tr>`;
  }).join("");
  t.innerHTML=h+"</tbody>";
}

function renderFAQ(area){
  const faqs=(DATA.faq[area]||[]).slice().sort((a,b)=>b.count-a.count);
  const hot=faqs.filter(f=>f.count>1);
  const rest=faqs.filter(f=>f.count<=1);
  let h='<div class="faq-wrap">';
  if(hot.length){
    h+=`<div class="faq-divider">Asked by multiple customers</div>`;
    hot.forEach(f=>{
      h+=`<div class="faq-item hot">
        <div class="faq-q">${esc(f.question)}</div>
        <div class="faq-meta">
          <span class="faq-badge hot">${f.count} customers</span>
          <span class="faq-custs">${esc(f.customers.join(", "))}</span>
        </div>
        <div class="faq-ans-lbl">Answer</div>
        <div class="faq-ans">${esc(f.answer)}</div>
      </div>`;
    });
  }
  if(rest.length){
    if(hot.length) h+=`<div class="faq-divider" style="margin-top:16px;">Other questions</div>`;
    rest.forEach(f=>{
      h+=`<div class="faq-item">
        <div class="faq-q">${esc(f.question)}</div>
        <div class="faq-meta">
          <span class="faq-badge single">1 customer</span>
          <span class="faq-custs">${esc(f.customers.join(", "))}</span>
        </div>
        <div class="faq-ans-lbl">Answer</div>
        ${f.answer?`<div class="faq-ans">${esc(f.answer)}</div>`:`<div class="faq-empty">No answer recorded yet.</div>`}
      </div>`;
    });
  }
  if(!faqs.length) h+=`<div class="empty">No FAQ available for this team yet.</div>`;
  h+='</div>';
  document.getElementById("tv-faq").innerHTML=h;
}

function renderTeamGrid(){
  document.getElementById("team-grid").innerHTML=Object.keys(DATA.taxonomy).map(a=>{
    const r=DATA.records.filter(x=>x.area===a);
    const prob=r.filter(x=>x.classification==="Problem").length;
    const neg=r.filter(x=>x.classification==="Negative").length;
    const bs={};r.filter(x=>x.classification==="Problem").forEach(x=>bs[x.subcategory]=(bs[x.subcategory]||0)+1);
    const top=Object.entries(bs).sort((a,b)=>b[1]-a[1])[0];
    const ft=top?`<div class="cf"><span>Top issue:</span> <b>${esc(top[0])}</b> (${top[1]})</div>`:`<div class="cf" style="color:var(--ink3)">No problems yet</div>`;
    return `<div class="card" onclick="openTeam('${eA(a)}')">
      <div class="ctop"><div>
        <div class="cn">${esc(a)}</div>
        <div class="cm">${prob} problems &middot; ${neg} negatives &middot; ${r.length} total</div>
      </div><div class="ct">${r.length}</div></div>
      ${ft}<div class="cgo">Open team &rarr;</div></div>`;
  }).join("");
}

function renderMemberGrid(){
  document.getElementById("member-grid").innerHTML=DATA.members.map(m=>{
    const r=DATA.records.filter(x=>x.customer===m.name);
    const prob=r.filter(x=>x.classification==="Problem").length;
    const neg=r.filter(x=>x.classification==="Negative").length;
    const ba={};r.forEach(x=>ba[x.area]=(ba[x.area]||0)+1);
    const top=Object.entries(ba).sort((a,b)=>b[1]-a[1])[0];
    const ft=top?`<div class="cf"><span>Most about:</span> <b>${esc(top[0])}</b></div>`:`<div class="cf" style="color:var(--ink3)">No feedback tagged yet</div>`;
    return `<div class="card" onclick="openMember('${eA(m.name)}')">
      <div class="ctop"><div>
        <div class="cn">${esc(m.name)}</div>
        <div class="cm">${r.length} tagged &middot; ${prob} problems &middot; ${neg} negatives</div>
      </div><div class="ct">${r.length}</div></div>
      ${ft}<div class="cgo">Open member &rarr;</div></div>`;
  }).join("");
}

function goTeams(){location.hash="";}
function goMembers(){location.hash="members";}
function openTeam(a){location.hash="team/"+encodeURIComponent(a);}
function openMember(n){location.hash="member/"+encodeURIComponent(n);}
function showOnly(id){["home-view","team-view","member-view"].forEach(v=>document.getElementById(v).hidden=(v!==id));}
function setHomeTab(w){["teams","members"].forEach(t=>{document.getElementById("tab-"+t).classList.toggle("on",t===w);document.getElementById(t+"-panel").hidden=t!==w;});}

function route(){
  const h=location.hash.replace(/^#/,"");
  if(h.startsWith("team/")){const a=decodeURIComponent(h.slice(5));if(DATA.taxonomy[a]){showOnly("team-view");renderTeam(a);window.scrollTo(0,0);return;}}
  if(h.startsWith("member/")){const n=decodeURIComponent(h.slice(7));showOnly("member-view");renderMember(n);window.scrollTo(0,0);return;}
  showOnly("home-view");setHomeTab(h==="members"?"members":"teams");window.scrollTo(0,0);
}
window.addEventListener("hashchange",route);

function renderTeam(area){
  TV={area,sub:"all",type:"all"};
  const r=DATA.records.filter(x=>x.area===area);
  document.getElementById("tv-title").textContent=area;
  document.getElementById("tv-sub").textContent=DATA.taxonomy[area].length+" subcategories · "+r.length+" messages";
  document.getElementById("tv-cnt").textContent=r.filter(x=>x.classification==="Problem").length+" problems · "+r.filter(x=>x.classification==="Negative").length+" negatives";
  tvTab("ov");refreshTeam();
}
function tvTab(t){
  document.getElementById("tv-ov").hidden=t!=="ov";
  document.getElementById("tv-faq").hidden=t!=="faq";
  document.getElementById("tv-tab-ov").classList.toggle("on",t==="ov");
  document.getElementById("tv-tab-faq").classList.toggle("on",t==="faq");
  if(t==="faq")renderFAQ(TV.area);
}
function refreshTeam(){
  const r=DATA.records.filter(x=>x.area===TV.area);
  renderChart("tv-chart",r,"subcategory",DATA.taxonomy[TV.area],TV.sub==="all"?null:TV.sub,"tvSub");
  const sv=DATA.taxonomy[TV.area].filter(s=>r.some(x=>x.subcategory===s));
  const sc={};sv.forEach(s=>sc[s]=r.filter(x=>x.subcategory===s).length);
  chips("tv-sf","Subcategory",sv,sc,TV.sub,"tvSub");
  const tc={};CLASSES.forEach(c=>tc[c]=r.filter(x=>x.classification===c).length);
  chips("tv-tf","Type",CLASSES,tc,TV.type,"tvType");
  let f=r;
  if(TV.sub!=="all")f=f.filter(x=>x.subcategory===TV.sub);
  if(TV.type!=="all")f=f.filter(x=>x.classification===TV.type);
  renderTable("tv-table",f,{showTeam:false});
}
function tvSub(v){TV.sub=(v!=="all"&&TV.sub===v)?"all":v;refreshTeam();}
function tvType(v){TV.type=(v!=="all"&&TV.type===v)?"all":v;refreshTeam();}

function renderMember(name){
  MV={name,area:"all",type:"all"};
  const r=DATA.records.filter(x=>x.customer===name);
  const m=DATA.members.find(x=>x.name===name)||{name,group:name,thread:[]};
  document.getElementById("mv-title").textContent=name;
  document.getElementById("mv-sub").textContent=r.length+" tagged · "+m.thread.length+" total messages";
  document.getElementById("mv-cnt").textContent=r.filter(x=>x.classification==="Problem").length+" problems · "+r.filter(x=>x.classification==="Negative").length+" negatives";
  document.getElementById("mv-chat-title").textContent="Full conversation · "+m.group;
  renderThread(m.thread);mvTab("sum");refreshMember();
}
function mvTab(t){
  document.getElementById("mv-sum").hidden=t!=="sum";
  document.getElementById("mv-chat").hidden=t!=="chat";
  document.getElementById("mv-tab-sum").classList.toggle("on",t==="sum");
  document.getElementById("mv-tab-chat").classList.toggle("on",t==="chat");
}
function renderThread(thread){
  let ld="",h="";
  thread.forEach(m=>{
    if(m.date!==ld){h+=`<div class="dsep">${esc(m.date)}</div>`;ld=m.date;}
    const ini=m.sender.split(" ").map(w=>w[0]||"").join("").slice(0,2).toUpperCase();
    h+=`<div class="brow${m.is_team?" team":""}">
      <div class="bav">${ini}</div>
      <div class="bubble">
        <div class="bsndr">${esc(m.sender)}</div>
        <div class="btxt">${esc(m.text)}</div>
      </div></div>`;
  });
  document.getElementById("mv-thread").innerHTML=h||'<div style="color:var(--ink3);font-style:italic;padding:14px">No messages found.</div>';
}
function refreshMember(){
  const r=DATA.records.filter(x=>x.customer===MV.name);
  const av=Object.keys(DATA.taxonomy).filter(a=>r.some(x=>x.area===a));
  renderChart("mv-chart",r,"area",av,MV.area==="all"?null:MV.area,"mvArea");
  const ac={};av.forEach(a=>ac[a]=r.filter(x=>x.area===a).length);
  chips("mv-af","Team",av,ac,MV.area,"mvArea");
  const tc={};CLASSES.forEach(c=>tc[c]=r.filter(x=>x.classification===c).length);
  chips("mv-tf","Type",CLASSES,tc,MV.type,"mvType");
  let f=r;
  if(MV.area!=="all")f=f.filter(x=>x.area===MV.area);
  if(MV.type!=="all")f=f.filter(x=>x.classification===MV.type);
  renderTable("mv-table",f,{showTeam:true});
}
function mvArea(v){MV.area=(v!=="all"&&MV.area===v)?"all":v;refreshMember();}
function mvType(v){MV.type=(v!=="all"&&MV.type===v)?"all":v;refreshMember();}

renderKpis();renderTeamGrid();renderMemberGrid();route();
</script>
</body>
</html>
