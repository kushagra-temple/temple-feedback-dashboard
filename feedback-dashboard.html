ve been enjoying Temple."}, {"sender": "Ramni", "is_team": true, "date": "16/06", "text": "Let me know if there is anything I can walk you through, in terms of understanding the App better!"}, {"sender": "+91 97110 98608", "is_team": false, "date": "16/06", "text": "Hi Ramni,\nThank you! Yes, all is well.\nTruly enjoyed the onboarding experience and special kudos for the design (product outside = inside), one of those rare design choices that makes you pause and think, 'someone really cared'.\nI had a few questions and wanted to understand if these features are available:\n- Is there a way to log fever or general symptoms (hot flushes) on the app?\n- I sometimes forget to put the device back on after a shower. Is there a way to enable a more prominent reminder or stronger vibration/notification?\n- Is there a 'Find My Temple' feature or another way to locate it if I misplace it?\n- The eating detection trigger usually comes in very late, often towards the end of my meal. Is there a setting I should adjust to improve this?\nThanks in advance!"}, {"sender": "Ramni", "is_team": true, "date": "16/06", "text": "Hey Niharika,\nGreat to hear all the positive as well as constructive feedback!\n1. You can log fever and symptoms using the ‘Journal’ feature, which can be accessed by the “+” Activity button on the bottom right side of the Home Screen. Also specifically during your menstruation cycle, you can add symptoms under the Period tracker.\n2. Feedback noted on the notification, have relayed this to the team - currently we prompt once the device is completely charged. Will keep you posted on updates!\n3. Find My Temple is now live - on version v1.1.0 (1016). If you’re not able to locate it, please let me know.\n4. Thank you for your inputs regarding chewing detection - this is being worked on by the team!"}]}, {"name": "Prerna", "group": "Prerna", "thread": [{"sender": "Aaqib Ahmad", "is_team": true, "date": "06/06", "text": "Hi PP. Aaqib here. Joined Temple recently. How’s it going?"}, {"sender": "Aaqib Ahmad", "is_team": true, "date": "06/06", "text": "PP - was speaking to Chandan earlier today. He mentioned the device disconnecting issue you’re facing. We also observed some funny activity at the back-end, so need it back for debugging.\nWe are sending you a replacement device soon - this time in True Gold. For now, can you keep your existing Temple aside?"}, {"sender": "+91 99350 99458", "is_team": false, "date": "06/06", "text": "Great to hear!"}, {"sender": "+91 99350 99458", "is_team": false, "date": "06/06", "text": "Sounds good"}, {"sender": "+91 99350 99458", "is_team": false, "date": "06/06", "text": "Keep existing Temple aside as in?"}, {"sender": "Aaqib Ahmad", "is_team": true, "date": "06/06", "text": "Keep it off body"}, {"sender": "+91 99350 99458", "is_team": false, "date": "06/06", "text": "It is off body right now"}, {"sender": "+91 99350 99458", "is_team": false, "date": "06/06", "text": "Havent worn it after it slipped and fell off during the morning workout today."}, {"sender": "Aaqib Ahmad", "is_team": true, "date": "06/06", "text": "Ok. It slipped and fell? Sweat?"}, {"sender": "+91 99350 99458", "is_team": false, "date": "06/06", "text": "Yeah"}, {"sender": "Aaqib Ahmad", "is_team": true, "date": "06/06", "text": "Itna kitna workout kar rahe ho 🙂"}, {"sender": "+91 99350 99458", "is_team": false, "date": "06/06", "text": "Happens often with me during very heavy workouts"}, {"sender": "Aaqib Ahmad", "is_team": true, "date": "06/06", "text": "Tell me a little about your workouts"}, {"sender": "+91 99350 99458", "is_team": false, "date": "06/06", "text": "Aaj Murph tha if you know the crossfit wala workout"}, {"sender": "+91 99350 99458", "is_team": false, "date": "06/06", "text": "IMG-20260606-WA0000.jpg (file attached)"}, {"sender": "Aaqib Ahmad", "is_team": true, "date": "06/06", "text": "Yikes. Let me look into this. You’re using Athlete tapes / Comfort tapes while working out?"}, {"sender": "+91 99350 99458", "is_team": false, "date": "06/06", "text": "Comfort tapes"}, {"sender": "+91 99350 99458", "is_team": false, "date": "06/06", "text": "Had shared the tape feedback with Chandan. He has given me some new tapes tpday."}, {"sender": "Aaqib Ahmad", "is_team": true, "date": "06/06", "text": "Ok. You’re yet to use these new ones?"}, {"sender": "+91 99350 99458", "is_team": false, "date": "06/06", "text": "Yes, yet to use."}, {"sender": "Aaqib Ahmad", "is_team": true, "date": "06/06", "text": "Gotcha - use the new ones then on the True Gold device we’ll send. I’ll speak with Chandan once"}, {"sender": "+91 99350 99458", "is_team": false, "date": "06/06", "text": "I am wearing the device now. Hope that is cool."}, {"sender": "Aaqib Ahmad", "is_team": true, "date": "06/06", "text": "Cool. Let us know if you face any connectivity issues"}, {"sender": "+91 99350 99458", "is_team": false, "date": "08/06", "text": "When do you plan to change the device?"}, {"sender": "+91 99350 99458", "is_team": false, "date": "08/06", "text": "It didnt work last night as well. Post that haven't worn it."}, {"sender": "Aaqib Ahmad", "is_team": true, "date": "08/06", "text": "Sorry about this experience, PP. Sending a device tomorrow"}, {"sender": "+91 98213 18079", "is_team": false, "date": "09/06", "text": "Hey Prerna, hope you’re doing well! Sending somebody to replace your device and charger right now to your office. Also sending you 10 tapes to use and we will send more in a couple days so you will have plenty.\nPossible to give the current device and charger you’re using to the same guy so he could bring it back?"}, {"sender": "+91 99350 99458", "is_team": false, "date": "09/06", "text": "Yes. Can you pls send this person in the sec half."}, {"sender": "+91 99350 99458", "is_team": false, "date": "09/06", "text": "I have external meetings right now, so wont be able to step out/take calls. <This message was edited>"}, {"sender": "+91 98213 18079", "is_team": false, "date": "09/06", "text": "Yes absolutely. Feel free to drop me a text once you’re done and I’ll send someone over."}, {"sender": "Aaqib Ahmad", "is_team": true, "date": "09/06", "text": "@⁨~Prerna Parija⁩ - should we send the device and charger now?"}, {"sender": "+91 99350 99458", "is_team": false, "date": "09/06", "text": "I am relatively free now"}, {"sender": "+91 98213 18079", "is_team": false, "date": "09/06", "text": "Sounds good. Just getting you an update"}, {"sender": "+91 98213 18079", "is_team": false, "date": "09/06", "text": "Hey Prerna, getting it sent to you now. For the device and charger that you have we can either get that picked up tomorrow or if you could give that to Akanksha from your office? Whatever is easier for you :)"}, {"sender": "+91 99350 99458", "is_team": false, "date": "09/06", "text": "This person coming here can't collect  the old device?"}, {"sender": "+91 98213 18079", "is_team": false, "date": "09/06", "text": "Sending it through a porter cause our usual runner isn’t around. Would have to book a second porter from your office to us and it would just be an extra headache for you."}, {"sender": "+91 99350 99458", "is_team": false, "date": "09/06", "text": "Cool cool"}, {"sender": "+91 98213 18079", "is_team": false, "date": "09/06", "text": "Thanks Prerna! You can let me know if you’d like for us to get it picked tomorrow or it’s easier for you to give to Akanksha today"}, {"sender": "+91 99350 99458", "is_team": false, "date": "09/06", "text": "Will give it to Akanksha"}, {"sender": "+91 98213 18079", "is_team": false, "date": "09/06", "text": "Great. Thanks Prerna"}, {"sender": "+91 98213 18079", "is_team": false, "date": "09/06", "text": "Here if you need anything. Keep killing the training 🫡"}, {"sender": "+91 99350 99458", "is_team": false, "date": "11/06", "text": "If I record an outdoor running, it doesnt show the distance covered."}, {"sender": "Aaqib Ahmad", "is_team": true, "date": "11/06", "text": "We’re shipping this soon, PP."}, {"sender": "Aaqib Ahmad", "is_team": true, "date": "11/06", "text": "Will have GPS integration with phone"}, {"sender": "Aaqib Ahmad", "is_team": true, "date": "16/06", "text": "Hey @⁨~Prerna Parija⁩ - let's speak whenever you have 30min. Want to pick up on our conversation from yesterday. Really want to build a product that you love every single day"}]}, {"name": "Pulkit", "group": "Pulkit", "thread": [{"sender": "Ramni", "is_team": true, "date": "10/06", "text": "Hi Pulkit,\nIt was great to catch up today!\nConsider this group your direct line to us.\nPlease feel free to use it for any feedback, queries, things you like as well as those you don't!\nCheers,\nRamni"}, {"sender": "+91 98107 19471", "is_team": false, "date": "10/06", "text": "Hi Ramni, thanks for your time today."}, {"sender": "+91 98107 19471", "is_team": false, "date": "10/06", "text": "Will get back. Excited to use the product"}, {"sender": "Ramni", "is_team": true, "date": "10/06", "text": "Yes please!"}, {"sender": "Ramni", "is_team": true, "date": "10/06", "text": "I am sure as someone who's intently been tracking your own body signals,\nyou'll be able to share great insights :)"}, {"sender": "+91 98107 19471", "is_team": false, "date": "11/06", "text": "Couple of feedback/questions\n1. More for optics. The paper bag that that I got had a golden temple outside. The temple box is silver. We should keep this consistent with the device colour.\n2. ⁠I am assuming this doesn’t give me the count of steps?"}, {"sender": "+91 98107 19471", "is_team": false, "date": "11/06", "text": "Also, can I push the device date to apple health?"}, {"sender": "Deepi US", "is_team": true, "date": "11/06", "text": "Yes, absolutely"}, {"sender": "Deepi US", "is_team": true, "date": "11/06", "text": "1. Will happen\n2. ⁠in BioMonitor on top right"}, {"sender": "+91 98107 19471", "is_team": false, "date": "11/06", "text": "Got it. Thanks.\nBio monitor section is nice. Wasn’t opening up in the afternoon. Works now"}, {"sender": "+91 98107 19471", "is_team": false, "date": "13/06", "text": "IMG-20260613-WA0000.jpg (file attached)\nHi guys,\nWhile playing Padel today for ~1.5 hours, the calorie burn count seems low. It’s usually 2x on whoop"}, {"sender": "+91 98107 19471", "is_team": false, "date": "13/06", "text": "Also, the tape was 1 day old but the device fell off while playing, maybe because of too much sweat or loose placement."}, {"sender": "+91 98107 19471", "is_team": false, "date": "13/06", "text": "Will observe this again tomorrow and come back on this"}, {"sender": "+91 98107 19471", "is_team": false, "date": "13/06", "text": "This is from Whoop"}, {"sender": "+91 98107 19471", "is_team": false, "date": "13/06", "text": "IMG-20260613-WA0001.jpg (file attached)"}, {"sender": "+91 98107 19471", "is_team": false, "date": "13/06", "text": "IMG-20260613-WA0002.jpg (file attached)"}, {"sender": "+91 98107 19471", "is_team": false, "date": "13/06", "text": "IMG-20260613-WA0003.jpg (file attached)"}, {"sender": "+91 98107 19471", "is_team": false, "date": "13/06", "text": "IMG-20260613-WA0004.jpg (file attached)"}, {"sender": "+91 98107 19471", "is_team": false, "date": "13/06", "text": "These two snapshots are from a friend who played along with me today."}, {"sender": "Ramni", "is_team": true, "date": "13/06", "text": "Hi Pulkit !\nLet me get back to you on this\nFor the tape, I would recommend just before placing it on your temple wipe your skin there with a tissue to remove any residue oil and press gently for 3-5 seconds. This should ensure good adhesiveness!"}, {"sender": "+91 98107 19471", "is_team": false, "date": "13/06", "text": "I will keep sharing such snapshots. U take your time on this"}, {"sender": "Ramni", "is_team": true, "date": "13/06", "text": "Incase it still doesn’t stick while playing/gymming let me know"}, {"sender": "+91 98107 19471", "is_team": false, "date": "13/06", "text": "Also, most likely, the tape was loose. Will observe this tomorrow again and come back"}, {"sender": "Ramni", "is_team": true, "date": "13/06", "text": "Yes, please. Thank you!"}, {"sender": "Ramni", "is_team": true, "date": "13/06", "text": "Hi Pulkit\n- I checked with the team and the HR numbers for your activity today are accurate for the duration of the workout logged in Temple.\n- You would in many cases find a difference in Whoop numbers with regard to Temple. This is because of cadence lock for Whoop wherein the device confuses rapid arm movements with your actual pulse, or poor sensor contact caused by a loose band, sweat, or wrist bone placement.\n- This could further lead to higher Calories being recorded on it."}]}, {"name": "RG", "group": "RG", "thread": [{"sender": "Aman Kant", "is_team": true, "date": "22/05", "text": "Hi Rahul, it was great meeting you. I’m Veer from the Temple team, along with Eshaan (@⁨Eshaan Temple⁩).  Excited to have you as one of our first 100 founding users.\nThis group is your direct line to us. Please send anything that comes up while using the app — bugs, ideas, screenshots, voice notes, confusing moments, things you like, and things that frustrate you.\nThe more honest you are, the more useful it is for us.\nCheers."}, {"sender": "Deepi US", "is_team": true, "date": "22/05", "text": "Welcome to Temple, RG!"}, {"sender": "Rahul Gangoo", "is_team": false, "date": "22/05", "text": "Device looks slick now and onboarding was a breeze! 🚀"}, {"sender": "Rahul Gangoo", "is_team": false, "date": "22/05", "text": "Tapes etc much better"}, {"sender": "Deepi US", "is_team": true, "date": "22/05", "text": "Tapes about to get much better"}, {"sender": "Deepi US", "is_team": true, "date": "22/05", "text": "Would love to hear about the main game design"}, {"sender": "Deepi US", "is_team": true, "date": "22/05", "text": "Hit your lowest entropy every day, and highest BF every day"}, {"sender": "Deepi US", "is_team": true, "date": "22/05", "text": "Converting “Best” to dynamic recovery based goals soon"}, {"sender": "Rahul Gangoo", "is_team": false, "date": "23/05", "text": "How long does the device take to charge? I think the low battery notif should include that (esp for the first few times) - “…it only takes xx mins before you can use the device again” - some shorter version of this"}, {"sender": "Deepi US", "is_team": true, "date": "23/05", "text": "To fully charge - about an hour and fifteen. 80% in 30 mins or so"}, {"sender": "Deepi US", "is_team": true, "date": "23/05", "text": "Cool - will do this"}, {"sender": "Rahul Gangoo", "is_team": false, "date": "23/05", "text": "IMG-20260523-WA0000.jpg (file attached)\nI would make this box bigger and add time to charging info - may even consider a big countdown here for time to use again- basically to reduce drop off/off body times"}, {"sender": "Rahul Gangoo", "is_team": false, "date": "23/05", "text": "(basis my last exp at this step)"}, {"sender": "Eshaan Temple", "is_team": true, "date": "23/05", "text": "IMG-20260523-WA0001.jpg (file attached)\nRG - we are also working on a live notification for charging states. This essentially captures exactly what you are saying."}, {"sender": "Deepi US", "is_team": true, "date": "25/05", "text": "How’s it going with temple? Any new observations?"}, {"sender": "Rahul Gangoo", "is_team": false, "date": "25/05", "text": "Entropy was lower on Friday and kept going up since Friday evening and all of weekend which also coincided with illness - wasn't sure its picking up that or is a calibration thing.."}, {"sender": "Deepi US", "is_team": true, "date": "25/05", "text": "Entropy picks up illness"}, {"sender": "Rahul Gangoo", "is_team": false, "date": "25/05", "text": "got it... makes sense then"}, {"sender": "Deepi US", "is_team": true, "date": "25/05", "text": "In fact, it starts picking up a day before illness really becomes symptomatic"}, {"sender": "Rahul Gangoo", "is_team": false, "date": "25/05", "text": "I was in the middle of it on Friday - so maybe some of it was baked in"}, {"sender": "Rahul Gangoo", "is_team": false, "date": "25/05", "text": "IMG-20260525-WA0002.jpg (file attached)\nThis maybe a stupid question - target here is baseline or actual target beyond which this score shouldn’t go"}, {"sender": "Deepi US", "is_team": true, "date": "25/05", "text": "Its like if you hit this you have done great for the day. Going more is even better."}, {"sender": "Deepi US", "is_team": true, "date": "25/05", "text": "On physical work, going more _may_ lead to overtraining"}, {"sender": "Rahul Gangoo", "is_team": false, "date": "25/05", "text": "Ok got it - should it be a range than a specific target then?"}, {"sender": "Deepi US", "is_team": true, "date": "25/05", "text": "Range will have the same problem, right?"}, {"sender": "Deepi US", "is_team": true, "date": "25/05", "text": "we were trying to avoid too many numbers."}, {"sender": "Deepi US", "is_team": true, "date": "25/05", "text": "Maybe we can explain the targets somewhere during onboarding"}, {"sender": "Rahul Gangoo", "is_team": false, "date": "25/05", "text": "Yes - I think in general onboarding should address top 5 metrics before we land users on the App HP"}, {"sender": "Rahul Gangoo", "is_team": false, "date": "02/06", "text": "<Media omitted>\nUnable to close the charging case"}, {"sender": "Eshaan Temple", "is_team": true, "date": "02/06", "text": "RG - checking this with the team. Will schedule a replacement if needed."}, {"sender": "Eshaan Temple", "is_team": true, "date": "02/06", "text": "This is likely due to the holding magnet coming out. We are sending a replacement here.\nQuick question: Do you recall charger falling of / having any mechanical impact that might have caused this?"}, {"sender": "Rahul Gangoo", "is_team": false, "date": "02/06", "text": "No don’t recall it falling but it was in a bag on a flight"}, {"sender": "Deepi US", "is_team": true, "date": "03/06", "text": "Let’s get a replacement done and get the faulty charger back to inspect"}, {"sender": "Rahul Gangoo", "is_team": false, "date": "14/06", "text": "IMG-20260614-WA0001.jpg (file attached)"}, {"sender": "Rahul Gangoo", "is_team": false, "date": "14/06", "text": "IMG-20260614-WA0002.jpg (file attached)\nNo blinking light on the case for charging indication"}, {"sender": "+91 99868 15965", "is_team": false, "date": "14/06", "text": "Hey RG,\nThis is intentional.  When you put the device on charge, the small LED will breathe 4 times and then stop. Same goes for the charger LED too when you plug in the charger."}]}, {"name": "Ragini", "group": "Ragini", "thread": [{"sender": "Karan Temple CS", "is_team": true, "date": "13/05", "text": "Hi Ragini - will use this group for all your future feedback, so that we don't end up missing anything.\nI have Akriti (@⁨Akriti⁩ ) as well with me here."}, {"sender": "+91 98496 76407", "is_team": false, "date": "13/05", "text": "Noticed one more thing:\n- when I skip adding my meal input from the previous day and eat today, then my last evenings “enter food” notification doesn’t show - only today’s does\n- ⁠after I update it, the notif goes away"}, {"sender": "Karan Temple CS", "is_team": true, "date": "13/05", "text": "<Media omitted>"}, {"sender": "Karan Temple CS", "is_team": true, "date": "13/05", "text": "Ragini - to check your missed food logs, you can scroll down to the previous days on the home page itself.\nUn-actioned food logs will appear as shown in the screenshot."}, {"sender": "+91 98496 76407", "is_team": false, "date": "13/05", "text": "ooh gotcha"}, {"sender": "+91 98496 76407", "is_team": false, "date": "14/05", "text": "<Media omitted>"}, {"sender": "+91 98496 76407", "is_team": false, "date": "14/05", "text": "<Media omitted>"}, {"sender": "+91 98496 76407", "is_team": false, "date": "14/05", "text": "<Media omitted>"}, {"sender": "+91 98496 76407", "is_team": false, "date": "14/05", "text": "Gm! Same thing again this morning. But is it cause of the update"}, {"sender": "+91 98496 76407", "is_team": false, "date": "14/05", "text": "<Media omitted>"}, {"sender": "DG US", "is_team": true, "date": "14/05", "text": "<Media omitted>"}, {"sender": "DG US", "is_team": true, "date": "14/05", "text": "<Media omitted>"}, {"sender": "DG US", "is_team": true, "date": "14/05", "text": "Same here. First time. Something is off."}, {"sender": "DG US", "is_team": true, "date": "14/05", "text": "I was connected to the wrong temple."}, {"sender": "DG US", "is_team": true, "date": "14/05", "text": "@⁨Karan Temple CS⁩ - check what’s wrong with Ragini’s temple please and report back"}, {"sender": "+91 98496 76407", "is_team": false, "date": "14/05", "text": "Mine reflects some stats now"}, {"sender": "+91 98496 76407", "is_team": false, "date": "14/05", "text": "<Media omitted>"}, {"sender": "+91 98496 76407", "is_team": false, "date": "14/05", "text": "My guess is post update it shows nothing cause the day before too this happened post update"}, {"sender": "+91 98496 76407", "is_team": false, "date": "14/05", "text": "That time it didn’t reflect at all till we spoke tho"}, {"sender": "Karan Temple CS", "is_team": true, "date": "14/05", "text": "Checking this, Ragini."}, {"sender": "+91 98496 76407", "is_team": false, "date": "14/05", "text": "I should someday make a reel of everyone’s reaction when they see me - “is that temple”\nToday it was my office canteen server!?"}, {"sender": "+91 98496 76407", "is_team": false, "date": "14/05", "text": "Suggestion - if my Bluetooth is off, maybe I should get a push notif (similar to what I now get when I close my app by mistake)"}, {"sender": "DG US", "is_team": true, "date": "15/05", "text": "Noted"}, {"sender": "Karan Temple CS", "is_team": true, "date": "15/05", "text": "Hi Ragini - regarding connection issues, all good on the device side.\nHave made changes which will eliminate all connection issues. Expecting to ship this change early next week."}, {"sender": "+91 98496 76407", "is_team": false, "date": "15/05", "text": "Also confirming that I charged it last night and faced no issues this time"}, {"sender": "+91 98496 76407", "is_team": false, "date": "15/05", "text": "Question: my fav feature is the eating detection. I have really double thought what I’m putting into my body last one week 🫡\nHowever - it doesn’t detect drinking. By design? Should that not be recorded?"}, {"sender": "DG US", "is_team": true, "date": "15/05", "text": "Haven’t been able to detect drinking so far 😕"}, {"sender": "+91 98496 76407", "is_team": false, "date": "15/05", "text": "A girl can hope 🍕"}, {"sender": "+91 98496 76407", "is_team": false, "date": "15/05", "text": "Cause I would drop the random soda for sure"}, {"sender": "DG US", "is_team": true, "date": "15/05", "text": "It’s part of our list of things to solve – maybe we will get there"}, {"sender": "DG US", "is_team": true, "date": "25/05", "text": "How’s it going with temple? Any new observations?"}, {"sender": "+91 98496 76407", "is_team": false, "date": "25/05", "text": "No bugs as such - BUT:\n- i am lagging behind on logging food on workdays as a user - this is on me tho\n- i feel like temperature is an imp one we're missing (realised during my menstrual cycle)\n- im also wearing the ultra ring so numbers are more or less similar\n- i wish the battery lasted a little longer\n- also, i have extremely sensitive skin so when i remove the tape to charge my device its leaving a (very slight) mark\n- even when my app is open - sometimes data sync takes about a min or so (wasnt happ earlier) <This message was edited>"}, {"sender": "+91 98496 76407", "is_team": false, "date": "28/05", "text": "<Media omitted>"}, {"sender": "+91 98496 76407", "is_team": false, "date": "28/05", "text": "<Media omitted>"}, {"sender": "+91 98496 76407", "is_team": false, "date": "28/05", "text": "<Media omitted>"}, {"sender": "+91 98496 76407", "is_team": false, "date": "28/05", "text": "Gm! Morning 4-4:15 it kept saying connecting. I’d already done the update and seen the last stats around 10 pm. Had also fully charged it"}, {"sender": "DG US", "is_team": true, "date": "28/05", "text": "Getting this looked into"}, {"sender": "+91 98496 76407", "is_team": false, "date": "28/05", "text": "Live and working now tho after another update"}, {"sender": "DG US", "is_team": true, "date": "28/05", "text": "Ok got it."}, {"sender": "+91 98496 76407", "is_team": false, "date": "28/05", "text": "Didn’t wanna flag at 4 am"}, {"sender": "DG US", "is_team": true, "date": "28/05", "text": "From a couple of days onwards, all updates will be in the background"}, {"sender": "DG US", "is_team": true, "date": "28/05", "text": "The frequency of updates is a bit too much"}, {"sender": "+91 98496 76407", "is_team": false, "date": "28/05", "text": "<Media omitted>"}, {"sender": "DG US", "is_team": true, "date": "28/05", "text": "Same with me last night"}, {"sender": "+91 95606 96837", "is_team": false, "date": "28/05", "text": "Hi Ragini, this is Veer from the Temple team. Just wanted to let you know that instead of daily updates, you’ll now be receiving them once a week"}, {"sender": "+91 98496 76407", "is_team": false, "date": "28/05", "text": "Hi Veer! This maybe WIP, but just sharing:"}, {"sender": "+91 98496 76407", "is_team": false, "date": "28/05", "text": "<Media omitted>"}, {"sender": "+91 98496 76407", "is_team": false, "date": "28/05", "text": "<Media omitted>"}, {"sender": "+91 98496 76407", "is_team": false, "date": "28/05", "text": "<Media omitted>"}, {"sender": "DG US", "is_team": true, "date": "28/05", "text": "This is firmware update failed."}, {"sender": "DG US", "is_team": true, "date": "28/05", "text": "Which firmware are you on Ragini?"}, {"sender": "+91 98496 76407", "is_team": false, "date": "28/05", "text": "iOS 26.4.2 (23E261)"}, {"sender": "+91 98496 76407", "is_team": false, "date": "02/06", "text": "Quick one - when my temple has fully charged and I don’t immediately wear it back, I get a push every 5 mins"}, {"sender": "+91 98496 76407", "is_team": false, "date": "02/06", "text": "Is that by design"}, {"sender": "+91 98496 76407", "is_team": false, "date": "02/06", "text": "<Media omitted>"}, {"sender": "DG US", "is_team": true, "date": "02/06", "text": "Not at all"}, {"sender": "DG US", "is_team": true, "date": "02/06", "text": "Getting this looked into"}, {"sender": "+91 98496 76407", "is_team": false, "date": "02/06", "text": "Happened to me last one week; never before <This message was edited>"}, {"sender": "+91 98496 76407", "is_team": false, "date": "09/06", "text": "<Media omitted>"}, {"sender": "+91 98496 76407", "is_team": false, "date": "09/06", "text": "<Media omitted>"}, {"sender": "DG US", "is_team": true, "date": "09/06", "text": "Weird."}, {"sender": "DG US", "is_team": true, "date": "09/06", "text": "Checking"}, {"sender": "+91 98496 76407", "is_team": false, "date": "09/06", "text": "Sorry I also checked only now since yesterday"}, {"sender": "DG US", "is_team": true, "date": "09/06", "text": "https://testflight.apple.com/join/sTC3a5aC"}, {"sender": "DG US", "is_team": true, "date": "09/06", "text": "This should work"}, {"sender": "+91 98496 76407", "is_team": false, "date": "09/06", "text": "<Media omitted>"}, {"sender": "DG US", "is_team": true, "date": "09/06", "text": "Unpair and try pairing again"}, {"sender": "+91 98496 76407", "is_team": false, "date": "09/06", "text": "Tried a few times"}, {"sender": "+91 98496 76407", "is_team": false, "date": "09/06", "text": "Even on killing the app I see this"}, {"sender": "+91 98496 76407", "is_team": false, "date": "09/06", "text": "<Media omitted>"}, {"sender": "+91 98496 76407", "is_team": false, "date": "09/06", "text": "Lemme unlink and see"}, {"sender": "+91 98496 76407", "is_team": false, "date": "09/06", "text": "Ok nvm it’s not clickable for me."}, {"sender": "DG US", "is_team": true, "date": "09/06", "text": "Checking this"}, {"sender": "+91 98496 76407", "is_team": false, "date": "09/06", "text": "<Media omitted>"}, {"sender": "Karan Temple CS", "is_team": true, "date": "09/06", "text": "@⁨~Ragini Das⁩ Can you see the green light under the device flashing when you put your finger on it and then remove it?"}, {"sender": "+91 98496 76407", "is_team": false, "date": "09/06", "text": "Nope I don’t!"}, {"sender": "Karan Temple CS", "is_team": true, "date": "09/06", "text": "Got it. Means your device is out of charge - hence the app isn't able to discover it. Please keep it in the charger - the smaller light should start breathing in white to signify it's charging.\nLet me know if this still doesn't help."}, {"sender": "+91 98496 76407", "is_team": false, "date": "09/06", "text": "Yep lemme land and kyp once I charge and re wear it! I’m pretty sure it was fully charged when I put it on on Monday tho"}]}, {"name": "Sandeep", "group": "Sandeep", "thread": [{"sender": "Karan Temple CS", "is_team": true, "date": "13/05", "text": "Hi Sandeep - your Temple is on the way to you. Excited to have you as one of our first 100 Founding Users.\nThis group is your direct line to us (Karan and Akriti). Please send across anything that comes up while using Temple - questions, bugs, ideas, screenshots, voice notes, things you like, things that frustrate you.\nWe look forward to building Temple with you, for you.\nCheers"}, {"sender": "Sandeep AdOnMo", "is_team": false, "date": "13/05", "text": "Sounds good"}, {"sender": "Sandeep AdOnMo", "is_team": false, "date": "16/05", "text": "IMG-20260516-WA0000.jpg (file attached)\nUI not optimised for the resolution of my One Plus 13s."}, {"sender": "Sandeep AdOnMo", "is_team": false, "date": "16/05", "text": "My wife feels it would be ideal if the device could be placed in the temple region but concealed within the hair. She believes this location may be a better option for people who find the current placement aesthetically challenging. She’s not a big fan of how the temple placement looks on me."}, {"sender": "Sandeep AdOnMo", "is_team": false, "date": "16/05", "text": "Will also be nice to get a quick tutorial on how to understand the metrics and why they matter."}, {"sender": "Karan Temple CS", "is_team": true, "date": "16/05", "text": "Hi Sandeep - sure, let us know a good time to help onboard you onto Temple. Will set up a virtual call for the same."}, {"sender": "Sandeep AdOnMo", "is_team": false, "date": "16/05", "text": "A pre recorded video is also ok"}, {"sender": "Sandeep AdOnMo", "is_team": false, "date": "16/05", "text": "Else we can do a call tomorrow sometime"}, {"sender": "DG US", "is_team": true, "date": "16/05", "text": "In person will be best, Sandeep. Temple has a bit of learning curve, best done over zoom. That’s why we are not doing online sales – only retail, and 1:1 private onboarding. We don’t have anyone in Bangalore yet, else would have done this in person.\n(Deepi here, new number)"}, {"sender": "Karan Temple CS", "is_team": true, "date": "16/05", "text": "Does 10AM tomorrow work? I will share a zoom invite."}, {"sender": "Sandeep AdOnMo", "is_team": false, "date": "16/05", "text": "Hi Deepi! Sure."}, {"sender": "Sandeep AdOnMo", "is_team": false, "date": "16/05", "text": "10am works."}, {"sender": "Karan Temple CS", "is_team": true, "date": "16/05", "text": "Great. Invite sent."}, {"sender": "Sandeep AdOnMo", "is_team": false, "date": "16/05", "text": "IMG-20260516-WA0004.jpg (file attached)"}, {"sender": "Sandeep AdOnMo", "is_team": false, "date": "16/05", "text": "IMG-20260516-WA0005.jpg (file attached)"}, {"sender": "Sandeep AdOnMo", "is_team": false, "date": "16/05", "text": "Whoop auto captured my workout. Temple recorded the elevated HR but couldn't auto capture. Also HR zones recording we're not matching. Not sure which one's right though."}, {"sender": "Sandeep AdOnMo", "is_team": false, "date": "16/05", "text": "IMG-20260516-WA0006.jpg (file attached)\nI'm assuming my workout didn't reflect in the physical work as well."}, {"sender": "DG US", "is_team": true, "date": "16/05", "text": "Our auto activity detection is going live this upcoming week."}, {"sender": "DG US", "is_team": true, "date": "16/05", "text": "The HR zone view is for the entire day, which is useless. This will be removed soon. Specific activity based views are available when you log an activity."}, {"sender": "Sandeep AdOnMo", "is_team": false, "date": "16/05", "text": "Understood. Created my activity. Physical work is still at 3.2 though."}, {"sender": "Sandeep AdOnMo", "is_team": false, "date": "16/05", "text": "For reference the strain on whoop is 12.5."}, {"sender": "DG US", "is_team": true, "date": "16/05", "text": "Doesn’t work post activity"}, {"sender": "DG US", "is_team": true, "date": "16/05", "text": "Was this a strength training activity?"}, {"sender": "DG US", "is_team": true, "date": "16/05", "text": "Got it. Try logging the activity on temple next you strength train. Entropy really moves up and down nicely with sets."}, {"sender": "DG US", "is_team": true, "date": "16/05", "text": "You can time breaks between sets based on whether entropy has come down."}, {"sender": "DG US", "is_team": true, "date": "16/05", "text": "We track strength training calories and muscular load really well due to entropy. Whoop is super inaccurate there."}, {"sender": "Sandeep AdOnMo", "is_team": false, "date": "16/05", "text": "Got it. You mean I'll need to start activity first and then workout. Right?"}, {"sender": "Sandeep AdOnMo", "is_team": false, "date": "16/05", "text": "This is great"}, {"sender": "DG US", "is_team": true, "date": "16/05", "text": "And keep the screen with you and observe how entropy moves between sets"}, {"sender": "Sandeep AdOnMo", "is_team": false, "date": "16/05", "text": "Will give it a shot tomorrow. I think once I understand these concepts better. I'll be able to use it better"}, {"sender": "Sandeep AdOnMo", "is_team": false, "date": "16/05", "text": "Understood"}, {"sender": "DG US", "is_team": true, "date": "16/05", "text": "Yes .. need onboarding for this 😃"}, {"sender": "DG US", "is_team": true, "date": "16/05", "text": "This is a pro user device - so a bit of learning curve. Not for the masses."}, {"sender": "DG US", "is_team": true, "date": "16/05", "text": "Learning curve is totally worth it though."}, {"sender": "Sandeep AdOnMo", "is_team": false, "date": "16/05", "text": "Look forward to my tutorial tomorrow 😃"}, {"sender": "Sandeep AdOnMo", "is_team": false, "date": "16/05", "text": "Yeah, I'm super excited"}, {"sender": "Sandeep AdOnMo", "is_team": false, "date": "17/05", "text": "IMG-20260517-WA0000.jpg (file attached)"}, {"sender": "Sandeep AdOnMo", "is_team": false, "date": "17/05", "text": "IMG-20260517-WA0001.jpg (file attached)"}, {"sender": "Sandeep AdOnMo", "is_team": false, "date": "17/05", "text": "Sleep is captured but weirdly not showing up on the Bio monitor dashboard."}, {"sender": "Sandeep AdOnMo", "is_team": false, "date": "18/05", "text": "Same issue today. Seems to be a bug on Android."}, {"sender": "Karan Temple CS", "is_team": true, "date": "18/05", "text": "Noted Sandeep. Will have this fixed in the next 2-3 days."}, {"sender": "Sandeep AdOnMo", "is_team": false, "date": "20/05", "text": "IMG-20260520-WA0000.jpg (file attached)\nMy Temple disconnected in the morning are around 9:15 and is not reconnecting."}, {"sender": "Sandeep AdOnMo", "is_team": false, "date": "20/05", "text": "IMG-20260520-WA0001.jpg (file attached)\nI tried unlinking it. Not discovering the device now."}, {"sender": "Sandeep AdOnMo", "is_team": false, "date": "20/05", "text": "Had 12% charge at 9:15am. At 10am green light was still flashing."}, {"sender": "Karan Temple CS", "is_team": true, "date": "20/05", "text": "Checking this Sandeep."}, {"sender": "Karan Temple CS", "is_team": true, "date": "20/05", "text": "@⁨Sandeep AdOnMo⁩ Request you to put the device on charge while we debug the issue"}, {"sender": "Sandeep AdOnMo", "is_team": false, "date": "20/05", "text": "Will be able to charge the device later in the evening."}, {"sender": "Sandeep AdOnMo", "is_team": false, "date": "20/05", "text": "It worked once I restarted my phone Bluetooth."}, {"sender": "Sandeep AdOnMo", "is_team": false, "date": "20/05", "text": "Not sure what was the issue earlier"}, {"sender": "Sandeep AdOnMo", "is_team": false, "date": "23/05", "text": "@⁨DG US⁩ curious question, on strength days between sets should I want for the entropy to come down or pushing hard with 15-20 sec set breaks and eventually to failure would give better results?"}, {"sender": "DG US", "is_team": true, "date": "23/05", "text": "Depends what kind of workout you are doing."}, {"sender": "DG US", "is_team": true, "date": "23/05", "text": "Pushing to failure without rest doesn’t solve any purpose in my opinion. Taking breaks is strength and hypertrophy both."}, {"sender": "Sandeep AdOnMo", "is_team": false, "date": "23/05", "text": "Got it."}, {"sender": "Sandeep AdOnMo", "is_team": false, "date": "23/05", "text": "Also, an interesting observation. During weight training my entropy was almost moving in tandem with my heart rate. But during my mobility routine my entropy was quite high even though my HR was only 90-110. Not sure why. I guess I'll need more time to get a hang of Entropy."}, {"sender": "DG US", "is_team": true, "date": "23/05", "text": "Was mobility after weight training?"}, {"sender": "Sandeep AdOnMo", "is_team": false, "date": "23/05", "text": "No before. I do as my warm up"}, {"sender": "Sandeep AdOnMo", "is_team": false, "date": "23/05", "text": "Will keep an eye for few more sessions"}, {"sender": "Sandeep AdOnMo", "is_team": false, "date": "27/05", "text": "IMG-20260527-WA0000.jpg (file attached)\nInteresting observation. Today I played leather ball cricket and scored 80(47). I was fully engrossed while batting (1.5hrs) not thinking about anything else. Surprisingly, my focus through my innings was at 5 and my focus peaked like never before right after the game ended. My highest focus every recorded before today was probably around 40. Not sure how to comprehend this."}, {"sender": "Karan Temple CS", "is_team": true, "date": "03/06", "text": "Hi Sandeep - how is it going with Temple? Would love to hear about any other observations/ feedback from your end"}, {"sender": "Sandeep AdOnMo", "is_team": false, "date": "03/06", "text": "Hey, I was traveling and left the charger back home. Ran out of charge. Got back today and will start using it again. Otherwise great so far."}, {"sender": "Sandeep AdOnMo", "is_team": false, "date": "03/06", "text": "Curious to know about this"}, {"sender": "Karan Temple CS", "is_team": true, "date": "03/06", "text": "Solving for Focus during physical activities is WIP. Our current algo over-indexes on stationary cognitive work."}, {"sender": "Karan Temple CS", "is_team": true, "date": "03/06", "text": "Next time when you have the device on, please upgrade to the latest Firmware and app versions. You should start seeing a new Focus metric - have solved for over indexation on stationary cognitive work already."}, {"sender": "Sandeep AdOnMo", "is_team": false, "date": "03/06", "text": "Got it. Thanks"}, {"sender": "Sandeep AdOnMo", "is_team": false, "date": "05/06", "text": "Hi team, quick feedback and potentially a feature idea.\nI’ve noticed that with the comfort tape, the device tends to start falling off around the 4th day. This has happened a couple of times now. Nothing extreme from my side, just regular workouts and two showers a day.\nThe bigger issue is that I didn’t realise the device had actually fallen off. Luckily, I was able to retrieve it both times.\nI was wondering if there’s a way to notify the user on the phone when this happens. Ideally, if we can differentiate between a regular intentional peel-off and an unintended peel-off, that would be great. But even if that’s not possible, an immediate ringer-style alert, similar to a MyGate notification, could be very helpful as an optional feature.\nI feel this could prevent people from losing the device, especially in real-world usage."}, {"sender": "DG US", "is_team": true, "date": "05/06", "text": "Shipping something soon for situations like this."}, {"sender": "DG US", "is_team": true, "date": "05/06", "text": "Also, how is your battery lasting 4 days 😁"}, {"sender": "Sandeep AdOnMo", "is_team": false, "date": "05/06", "text": "Not sure, may be because I'm missing explicitly recording activities."}, {"sender": "Sandeep AdOnMo", "is_team": false, "date": "05/06", "text": "But usually it it's 3.5/4 days"}, {"sender": "DG US", "is_team": true, "date": "05/06", "text": "@⁨Arjun Madhusudhan⁩ - check this too while you check Rohin’s battery."}, {"sender": "DG US", "is_team": true, "date": "05/06", "text": "Now we have auto detection which is passably good already. So that shouldn’t be an issue. Unless you are on older firmware"}, {"sender": "DG US", "is_team": true, "date": "05/06", "text": "Also, do you have oily skin"}, {"sender": "Sandeep AdOnMo", "is_team": false, "date": "05/06", "text": "IMG-20260605-WA0000.jpg (file attached)\nJust tried to check. It's currently updating i guess"}, {"sender": "Sandeep AdOnMo", "is_team": false, "date": "05/06", "text": "Yeah very oily skin 😅"}, {"sender": "DG US", "is_team": true, "date": "05/06", "text": "Ok, 20% of our users are facing these odd users with tapes. We have a new version coming up to solve this. Will send some samples to try soon."}, {"sender": "Sandeep AdOnMo", "is_team": false, "date": "05/06", "text": "Done."}, {"sender": "DG US", "is_team": true, "date": "05/06", "text": "Will only scale these samples if they work for you"}, {"sender": "Sandeep AdOnMo", "is_team": false, "date": "05/06", "text": "Also, if I leave my Temple in it's charging case for a few days. Over time will it affect the battery life?"}, {"sender": "DG US", "is_team": true, "date": "05/06", "text": "No it won’t"}, {"sender": "Sandeep AdOnMo", "is_team": false, "date": "05/06", "text": "Ok so over charging is not a thing."}, {"sender": "DG US", "is_team": true, "date": "05/06", "text": "@⁨Arjun Madhusudhan⁩ - check if Sandeep’s charger has the new firmware."}, {"sender": "DG US", "is_team": true, "date": "05/06", "text": "Old firmware keeps draining the charge on charger while the device is on it for longer"}, {"sender": "Sandeep AdOnMo", "is_team": false, "date": "05/06", "text": "Ah ok."}, {"sender": "DG US", "is_team": true, "date": "05/06", "text": "But no damage otherwise"}, {"sender": "Sandeep AdOnMo", "is_team": false, "date": "05/06", "text": "IMG-20260605-WA0001.jpg (file attached)\nIs this now the latest firmware?"}, {"sender": "Sandeep AdOnMo", "is_team": false, "date": "05/06", "text": "Got it."}, {"sender": "DG US", "is_team": true, "date": "05/06", "text": "Yes, the device"}, {"sender": "DG US", "is_team": true, "date": "05/06", "text": "Not the charger. Can’t update charger firmware OTA. We will replace it"}, {"sender": "Sandeep AdOnMo", "is_team": false, "date": "05/06", "text": "Got it."}, {"sender": "DG US", "is_team": true, "date": "05/06", "text": "Old charger will go to factory - and then we will put it to use in clinical trials where free devices are being given out"}, {"sender": "Sandeep AdOnMo", "is_team": false, "date": "05/06", "text": "Makes sense."}, {"sender": "Sandeep AdOnMo", "is_team": false, "date": "05/06", "text": "Great looking case though. Full points to the designer. Feels really premium."}, {"sender": "DG US", "is_team": true, "date": "05/06", "text": "IMG-20260605-WA0002.jpg (file attached)"}, {"sender": "DG US", "is_team": true, "date": "05/06", "text": "IMG-20260605-WA0003.jpg (file attached)"}, {"sender": "DG US", "is_team": true, "date": "05/06", "text": "Just saw this. Thank you for the shout out ❤️ <This message was edited>"}, {"sender": "DG US", "is_team": true, "date": "05/06", "text": "Pls don’t disclose features and app screenshots on social media"}, {"sender": "Sandeep AdOnMo", "is_team": false, "date": "05/06", "text": "Of course."}, {"sender": "Sandeep AdOnMo", "is_team": false, "date": "05/06", "text": "Yeah yeah. Not going to"}, {"sender": "Sandeep AdOnMo", "is_team": false, "date": "05/06", "text": "Lot of people are super curious to know 😂😅"}, {"sender": "DG US", "is_team": true, "date": "05/06", "text": "Curiosity is half the product right now hahahaha"}, {"sender": "Sandeep AdOnMo", "is_team": false, "date": "05/06", "text": "Haha yeah, I realised the device instantly makes you more interesting to strangers. Great ice breaking tool. Good social incentive for early adopters. 😄"}, {"sender": "Arjun Madhusudhan", "is_team": true, "date": "05/06", "text": "Hey Sandeep,\nThis is Arjun from Temple. Pleased to e-meet you :)"}, {"sender": "Arjun Madhusudhan", "is_team": true, "date": "05/06", "text": "As checked, the charger has the old firmware and we will replace it."}, {"sender": "Sandeep AdOnMo", "is_team": false, "date": "05/06", "text": "Nice to meet you Arjun"}, {"sender": "Sandeep AdOnMo", "is_team": false, "date": "13/06", "text": "IMG-20260613-WA0000.jpg (file attached)\nI'm in HK, had super broken sleep last night. Woke up feeling like shit. My Whoop gave me a crazy recovery score. Temple was much closer to how I was actually feeling."}, {"sender": "Sandeep AdOnMo", "is_team": false, "date": "13/06", "text": "IMG-20260613-WA0001.jpg (file attached)"}, {"sender": "Sandeep AdOnMo", "is_team": false, "date": "13/06", "text": "My RHR was 42 and Hrv was 111 on whoop last night.\nRHR was 43 and HRV was 71 on Temple."}]}, {"name": "Sanjeev", "group": "Sanjeev", "thread": [{"sender": "DG US", "is_team": true, "date": "14/05", "text": "Hi Sanjeev – when can we send someone to you to onboard you on Temple?"}, {"sender": "DG US", "is_team": true, "date": "14/05", "text": "Also, this group serves as your customer care, product feedback, or friendly help for any questions you might have. Feel free to ask for replacement devices/tapes in case you lose your Temple and so on…"}, {"sender": "+91 70421 54629", "is_team": false, "date": "06/06", "text": "Hi Sanjeev. This is Aaqib from Temple.\nVeer mentioned you’d like to meet on Tuesday instead. We can do that.\nI’ll be coming to meet you. See you then."}, {"sender": "+91 98110 20189", "is_team": false, "date": "06/06", "text": "Ok 1pm"}, {"sender": "+91 98110 20189", "is_team": false, "date": "06/06", "text": "Thanks"}, {"sender": "+91 98110 20189", "is_team": false, "date": "06/06", "text": "Tuesday"}, {"sender": "+91 70421 54629", "is_team": false, "date": "09/06", "text": "Hi Sanjeev. Look forward to our meeting at 1pm.\nThis will be at the Infoedge office in Paras Twin Towers, Sector 54, Gurgaon?"}, {"sender": "+91 98110 20189", "is_team": false, "date": "09/06", "text": "location: https://maps.google.com/?q=28.434389114379883,77.1053695678711"}, {"sender": "+91 70421 54629", "is_team": false, "date": "09/06", "text": "Great. Thank you"}, {"sender": "+91 98110 20189", "is_team": false, "date": "10/06", "text": "IMG-20260610-WA0000.jpg (file attached)"}, {"sender": "Karan Temple CS", "is_team": true, "date": "10/06", "text": "Good morning Sanjeev - please press continue here.\nYou are seeing this because app has updated to the latest version automatically."}, {"sender": "+91 98110 20189", "is_team": false, "date": "13/06", "text": "O am charging my Temple"}, {"sender": "+91 98110 20189", "is_team": false, "date": "13/06", "text": "O have connected it into my laptop"}, {"sender": "+91 98110 20189", "is_team": false, "date": "13/06", "text": "How long do I need to charge it for"}, {"sender": "+91 70421 54629", "is_team": false, "date": "13/06", "text": "Around 1h15m should be fine, Sanjeev. You will get a notification on your app when it charges completely"}]}, {"name": "Shagun", "group": "Shagun", "thread": [{"sender": "Aman Kant", "is_team": true, "date": "15/06", "text": "Hey Shagun, excited to have you join the Temple family!\nI’ll check back in with you after a couple of days to see how it’s going, but in the meantime, as Aaqib mentioned, please let us know if you have any questions or feedback 😊"}, {"sender": "Shagun Saxena", "is_team": false, "date": "15/06", "text": "Absolutely. Thank you."}, {"sender": "Shagun Saxena", "is_team": false, "date": "16/06", "text": "Team, my Temple app isn’t detecting any fluids I’m consuming - smoothies, protein shakes etc. Ideally, I’d like these to be included in my calorie count. Is there a setting I need to adjust to ensure they’re tracked correctly or just add them manually?"}, {"sender": "Aaqib Ahmad", "is_team": true, "date": "16/06", "text": "Hi Shagun - we do not currently detect fluid intake. Just chewing-related activities. Let me come back on if this can be done though. In the meantime, do add them manually"}, {"sender": "Shagun Saxena", "is_team": false, "date": "16/06", "text": "Got it. Thanks."}]}, {"name": "Shivam", "group": "Shivam", "thread": [{"sender": "Karan Temple CS", "is_team": true, "date": "13/05", "text": "Hi Shivam - hope you have received your Temple. Excited to have you as one of our first 100 Founding Users.\nThis group is your direct line to us. Please send across anything that comes up while using Temple - questions, bugs, ideas, screenshots, voice notes, things you like, things that frustrate you.\nWe look forward to building Temple with you, for you.\nCheers"}, {"sender": "DG US", "is_team": true, "date": "14/05", "text": "Shivam - hows it going?"}, {"sender": "Shivam Blue Tokai", "is_team": false, "date": "14/05", "text": "Hi Team Temple,\nThank you so much for sending this over — really appreciate the effort that has gone into getting this to me.\nI am assuming this is still a prototype stage, so please take everything I share as my personal observation and unfiltered feedback\nFirst impressions — the packaging feels a little busy with the stickers, and I think simplifying that will go a long way in making the unboxing feel more premium. The device casing itself also has some room to feel a little more refined, and the finish on the main device could be elevated slightly. I am hopeful all of this is something we can address in the next phase as part of the cosmetic and superficial improvements — these feel very fixable.\nI will be honest — the setup felt slightly more involved than I had expected at first glance, so I have decided to save the full hands-on experience for my vacation when I have the time and headspace to really go through it properly. I think a product like this deserves that kind of attention rather than a rushed first look.\nI am travelling with the device starting tomorrow and will be sending across observations as they come to me over the next few days. Please do not treat these as exhaustive feedback — just real-time thoughts as I am slightly straightforward in giving feedback and even go to an extent that the box should have 6 plies instead of 4.\nLooking forward to getting deeper into the technical side of things shortly and am super excited to using it soon."}, {"sender": "Shivam Blue Tokai", "is_team": false, "date": "16/05", "text": "It’s difficult to eat chewing gum with the device, it keeps on detecting it as a meal time . Maybe it would be difficult to crack the difference. 😀"}, {"sender": "DG US", "is_team": true, "date": "16/05", "text": "Can you tag it as “not eating” and then “chewing gum”"}, {"sender": "DG US", "is_team": true, "date": "16/05", "text": "With enough data we can crack anything"}, {"sender": "DG US", "is_team": true, "date": "25/05", "text": "How’s it going with temple?"}]}, {"name": "Adit", "group": "Adit", "thread": [{"sender": "Temple x Adit", "is_team": true, "date": "17/06", "text": "‎Messages and calls are end-to-end encrypted. Only people in this chat can read, listen to, or share them."}, {"sender": "Aman Kant Temple", "is_team": true, "date": "17/06", "text": "Hi Adit, thanks for your time today. This is your customer care group for Temple. Any feedback, suggestions, questions — please throw them here without any hesitation"}, {"sender": "~ Adit Harchandani", "is_team": false, "date": "17/06", "text": "Great, thank you"}, {"sender": "~ Adit Harchandani", "is_team": false, "date": "17/06", "text": "All good so far, just that I wear eye glasses, each time I adjust them even a bit, it does clink with temple device"}, {"sender": "Aman Kant Temple", "is_team": true, "date": "17/06", "text": "Hey Adit, are you feeling any discomfort?"}, {"sender": "Aman Kant Temple", "is_team": true, "date": "17/06", "text": "The metrics/readings normally don’t get affected by contact with reading glasses"}, {"sender": "~ Adit Harchandani", "is_team": false, "date": "17/06", "text": "No discomfort, but I become aware of the device each time. A whoop or a ring is something that becomes invisible to me."}, {"sender": "Aman Kant Temple", "is_team": true, "date": "17/06", "text": "Got it. Calling you right now ‎<This message was edited>"}, {"sender": "Aman Kant Temple", "is_team": true, "date": "17/06", "text": "Let me know when you have a couple minutes to chat"}]}, {"name": "Avi & Rob", "group": "Avi & Rob", "thread": [{"sender": "Temple x Avi & Rob", "is_team": true, "date": "03/06", "text": "‎Messages and calls are end-to-end encrypted. Only people in this chat can read, listen to, or share them."}, {"sender": "Deepi New", "is_team": true, "date": "03/06", "text": "‎Deepi New created this group"}, {"sender": "~ Rob Mohr", "is_team": false, "date": "03/06", "text": "Happy to annoy and investigate!"}, {"sender": "~ Rob Mohr", "is_team": false, "date": "03/06", "text": "So far I really love the interface.  I must say it has a very techy aesthetic.  Will wait until I get enough data for it to be predictive enough to provide feedback"}, {"sender": "Deepi New", "is_team": true, "date": "03/06", "text": "Thank you! This is maybe our 100th iteration of the interface 😭"}, {"sender": "~ Rob Mohr", "is_team": false, "date": "03/06", "text": "Ok first day’s insights.\nTemple hasn’t yet learned my sleep pattern and missed 5 hours of my night.\nIs there a way to nudge the software into looking at a longer period of time?\nI’ll share my Oura and Garmin data as a comparison."}, {"sender": "Deepi New", "is_team": true, "date": "03/06", "text": "“Is there a way to nudge the software into looking at a longer period of time?” - releasing this feature by Friday."}, {"sender": "~ Avi Roy", "is_team": false, "date": "03/06", "text": "‎This message was deleted."}, {"sender": "~ Avi Roy", "is_team": false, "date": "03/06", "text": "‎This message was deleted."}, {"sender": "~ Avi Roy", "is_team": false, "date": "03/06", "text": "‎This message was deleted."}, {"sender": "~ Avi Roy", "is_team": false, "date": "03/06", "text": "Avi Oura 3rd June, 2026"}, {"sender": "~ Avi Roy", "is_team": false, "date": "03/06", "text": "3rd June, 2026"}, {"sender": "Deepi New", "is_team": true, "date": "03/06", "text": "The data pipeline had a bug. Resolved. You should see updated sleep on your Temple app now."}, {"sender": "Deepi New", "is_team": true, "date": "03/06", "text": "Any other feedback, please do let us know here."}, {"sender": "Deepi New", "is_team": true, "date": "03/06", "text": "Btw, I didn’t mention – Temple emits zero radiation towards the body side. And we use a custom ultra low powered bluetooth to communicate with the phone."}, {"sender": "~ Rob Mohr", "is_team": false, "date": "03/06", "text": "Would you mind sending any public facing info on the technology and what it is benchmarking against?"}, {"sender": "Deepi New", "is_team": true, "date": "03/06", "text": "Sending the draft papers for brain flow benchmarking"}, {"sender": "Deepi New", "is_team": true, "date": "03/06", "text": "Will make a cleaner version of these public next week"}, {"sender": "~ Avi Roy", "is_team": false, "date": "03/06", "text": "That's awesome! Thanks @⁨Deepi New⁩"}, {"sender": "Deepi New", "is_team": true, "date": "04/06", "text": "Gentlemen – good morning! Did we get your sleep right today?\n‎[04/06/26, 3:35:11 PM] ~ Avi Roy: Good morning, @⁨Deepi New⁩\nSharing last night’s sleep data here. Now that I know my nights are being quietly audited by the most popular person in India and his entire tech team, I suspect I’m going to start treating this far more like a performance sport and less like a casual experiment."}, {"sender": "~ Avi Roy", "is_team": false, "date": "04/06", "text": "Also, @⁨Deepi New⁩ and team. I’m very happy to link/sync my Apple Health data with Temple. If one of your bots sends me a friend request on Apple Health, you should then have a clean, automatic feed of all my health metrics every day."}, {"sender": "Deepi New", "is_team": true, "date": "04/06", "text": "Seems accurate/okay to me. Please let us know if there’s any “this doesn’t sound right” in the sleep data."}, {"sender": "Deepi New", "is_team": true, "date": "04/06", "text": "Avi – you can share Apple Health data from within the Temple app. Menu -> Integrations -> Apple Health"}, {"sender": "~ Avi Roy", "is_team": false, "date": "04/06", "text": "Yes, already done, and I set that up for @⁨~Rob Mohr⁩ as well."}, {"sender": "~ Avi Roy", "is_team": false, "date": "04/06", "text": "Yes, so far it looks good on my side. In about 12–15 days, I’ll run a proper statistical comparison across Temple, Oura, and Apple Watch, and share a full analysis of where they align and where they diverge."}, {"sender": "Deepi New", "is_team": true, "date": "04/06", "text": "You could sync calendar as well - we will eventually tell you the people who take your entropy up/down 🙂"}, {"sender": "Deepi New", "is_team": true, "date": "04/06", "text": "Wow! Perks of scientist beta testers 😀"}, {"sender": "~ Avi Roy", "is_team": false, "date": "04/06", "text": "@⁨Deepi New⁩, if you (or your team) haven’t already, I’d strongly suggest reaching out to Rob ter Horst: https://www.robterhorst.com/\nHe has a very strong grasp of consumer wearables, approaches the data with real rigor, and comes across as both thoughtful and intellectually honest. I think there could be a genuinely interesting collaboration between Temple and him.\nWhat I especially like is that he seems willing to be direct and critical in a constructive way, which I think would be valuable."}, {"sender": "Deepi New", "is_team": true, "date": "04/06", "text": "We haven’t so far. Do you know him directly?"}, {"sender": "~ Avi Roy", "is_team": false, "date": "04/06", "text": "Already done. 😊\nNow the scientist in me is very curious what my entropy score was when I/we were hanging out with you. Part of me thinks I don’t want to know… but of course I absolutely do."}, {"sender": "~ Avi Roy", "is_team": false, "date": "04/06", "text": "No, I don’t. I’ve interacted with him on Twitter a few times, mostly around his statistical methods. But if you watch even a couple of his videos, you’ll see why I’m so bullish on him putting Temple through its paces. I’m happy to reach out and connect you if that would be helpful.\nGood example: https://youtu.be/tGD9CS2YOiY?si=CkieiM4k8mjqdzdC ‎<This message was edited>"}, {"sender": "Deepi New", "is_team": true, "date": "04/06", "text": "Yes, he’s been on top of our list to approach at the right time. So if we can get in touch with him as a beta tester, rather than a reviewer, that would be awesome. And yes, a reach out from you would really help. If we reach out, it would become a bit transactional."}, {"sender": "~ Rob Mohr", "is_team": false, "date": "04/06", "text": "The data is much closer to Oura  now. Duration is very similar but the sleep analysis differs significantly.\nThough which one is “correct” is up for debate.\nThe most important thing is it didn’t flag my single 10 minute awakening as the end of my sleep.\nIt has been interesting watching my entropy through out the day and it cluing me in to stress that i don’t recognize independently. Once recognized I only then “felt it” and was able to slow my breathing and watch the entropy fall with a resultant anecdotal resolution of the previously unrealized stress.\nStill need to play with all the features to fully understand."}, {"sender": "Deepi New", "is_team": true, "date": "04/06", "text": "“it didn’t flag my single 10 minute awakening” – checking"}, {"sender": "Deepi New", "is_team": true, "date": "04/06", "text": "Interesting anecdote on entropy. Will go to our testimonials one day 😀 ‎<This message was edited>"}, {"sender": "~ Rob Mohr", "is_team": false, "date": "04/06", "text": "No I’m saying that was a good thing…I woke up briefly last night and it didnt “end my sleep” like it did the previous night.\nThat is an improvement"}, {"sender": "Deepi New", "is_team": true, "date": "04/06", "text": "Ah, got it. Thank you."}, {"sender": "~ Rob Mohr", "is_team": false, "date": "05/06", "text": "I think we have a charging issue. I tried charging the temple yesterday afternoon and it came out of the charger lower than when I put it in.\nWhen I plug the charger in it flashes white a few times.\nIf I put the temple in the charger it flashes white a few times.\nI’m going to try Avi’s charger to determine if it’s the charger or the temple device.\nAny suggestions would be appreciated"}, {"sender": "Deepi New", "is_team": true, "date": "05/06", "text": "@⁨Arjun Madhusudhan Temple⁩ - pls check the error code with the hardware team and take appropriate action please"}, {"sender": "Deepi New", "is_team": true, "date": "05/06", "text": "Rob - pls send us your shipping address anyway. Sending a replacement right away as we figure this out."}, {"sender": "~ Rob Mohr", "is_team": false, "date": "05/06", "text": "I’m happy to help troubleshoot to help you make a product improvement. Happy to get on a call with your engineer and describe the issue if needed\n1007 Fladgate house\nSW11-8EX London UK"}, {"sender": "Arjun Madhusudhan Temple", "is_team": true, "date": "05/06", "text": "Hey Avi and Rob,\nThis is Arjun from Temple. Nice to meet you guys here :)"}, {"sender": "Arjun Madhusudhan Temple", "is_team": true, "date": "05/06", "text": "Checking"}, {"sender": "Arjun Madhusudhan Temple", "is_team": true, "date": "05/06", "text": "Thank you for this, allow me to get back to you"}, {"sender": "~ Rob Mohr", "is_team": false, "date": "05/06", "text": "Yes if we can trouble shoot it before you send out a new one I am certainly willing to help a startup not expend unnecessary capital"}, {"sender": "Arjun Madhusudhan Temple", "is_team": true, "date": "05/06", "text": "Hi Rob,\nThere are two LEDs on the charger; a small dot and a semi-circular light beneath it.\nCould you please plug the charger in, place the Temple on the charger, and confirm whether both LEDs flash white a few times? I've attached a video for reference."}, {"sender": "~ Rob Mohr", "is_team": false, "date": "05/06", "text": "No.  Only the bottom LED flashes…the top one does not"}, {"sender": "Aaqib Temple", "is_team": true, "date": "05/06", "text": "Got it, Rob. Is this happening when you put your device on Avi’s charger as well?"}, {"sender": "~ Rob Mohr", "is_team": false, "date": "05/06", "text": "I havent tried yet"}, {"sender": "Aaqib Temple", "is_team": true, "date": "05/06", "text": "Ok - we’ll get your device and charger, both replaced. ‎<This message was edited>"}, {"sender": "Deepi New", "is_team": true, "date": "05/06", "text": "Address is here @⁨Aaqib Temple⁩"}, {"sender": "~ Rob Mohr", "is_team": false, "date": "05/06", "text": "Thank you both.  I am excited to keep experimenting! It has been a conversation starter for sure"}, {"sender": "Deepi New", "is_team": true, "date": "05/06", "text": "Rob - just making sure - did you take the tape off the device before you put it to charge? ‎<This message was edited>\n‎[06/06/26, 12:50:24 AM] ~ Rob Mohr: I tried putting it in the charger a dozen or so times and occasionally I can get the two lights to come on."}, {"sender": "~ Rob Mohr", "is_team": false, "date": "06/06", "text": "That screen recording was with it sitting in the charger without me touching it"}, {"sender": "~ Rob Mohr", "is_team": false, "date": "06/06", "text": "I took it out and tried again and now it’s charging continuously."}, {"sender": "~ Rob Mohr", "is_team": false, "date": "06/06", "text": "Perhaps American sweat is too corrosive?"}, {"sender": "~ Rob Mohr", "is_team": false, "date": "06/06", "text": "The freedom gets into the cracks and breaks down the circuitry"}, {"sender": "Deepi New", "is_team": true, "date": "06/06", "text": "Glad that it’s working for now. We will replace the device asap. Will also find a way to get this one back and inspect it to see what went wrong."}, {"sender": "~ Avi Roy", "is_team": false, "date": "06/06", "text": "@⁨Deepi New⁩, I hope it's going well with Bhavin and that you've managed to get him wearing it, hopefully consistently. Feel free to add him to this group as well. It would be great for all of us to support each other, compare notes, and stay accountable."}, {"sender": "Sahil Kaul", "is_team": true, "date": "06/06", "text": "Hello @⁨~Rob Mohr⁩ and  @⁨~Avi Roy⁩ - hope it's going well.\nQuick update - the Edit Sleep option is live for you both. ✌️\nJust update to the latest app using this link: https://testflight.apple.com/join/eRBpbEtf\nGive me a shout in case you have any questions around this."}, {"sender": "Deepi New", "is_team": true, "date": "06/06", "text": "Thanks for the suggestion to build this, Rob. In hindsight, feels quite dumb that we didn’t think of this before."}, {"sender": "~ Avi Roy", "is_team": false, "date": "07/06", "text": "Thank you, @⁨Sahil Kaul⁩\nCould we schedule a call for the week of June 15th? I am currently gathering notes on my experience with the app and device, considering both initial impressions and ongoing observations. Some feedback stems from acclimatization, while others highlight genuine issues with data collection, presentation, or usability.\nI prefer to avoid real-time feedback, as it can be emotionally charged. Instead, I plan to use the device and app for two weeks, then text": "Someone asked me if it was the Neuralink device and if it is directly connected to my brain. 🧠"}, {"sender": "Deepi New", "is_team": true, "date": "07/06", "text": "Gareth Edwards 😍.. I will come to London again to onboard him if he’s keen. And maybe we can get a collab in the movies. That will be 🤯🤯🥳"}, {"sender": "Deepi New", "is_team": true, "date": "07/06", "text": "We get that a lot."}, {"sender": "Deepi New", "is_team": true, "date": "07/06", "text": "We are trying to get a collab in the new James Bond movie"}, {"sender": "~ Rob Mohr", "is_team": false, "date": "07/06", "text": "That would be the ultimate placement"}, {"sender": "~ Rob Mohr", "is_team": false, "date": "10/06", "text": "\n‎[10/06/26, 3:37:37 PM] ~ Rob Mohr: Team,\nI’d love to discuss ways of fine tuning the performance analysis during activities.\nI did a HIIT workout today and it tracked the average heart rate and missed the fact that my intervals were 650+ watts."}, {"sender": "Sahil Kaul", "is_team": true, "date": "10/06", "text": "Hello Rob, happy to chat here at an appropriate time for you.\nJust checking - you tracked the workout on the Temple app as well? We'll check the data for that one."}, {"sender": "Deepi New", "is_team": true, "date": "11/06", "text": "Gentlemen - we have an updated (tentative) view of the Entropy metric. Sharing an internal note here –\nTopic: what Entropy actually measures (and what it doesn't)\nLast few days, we have had an updated understanding of our Entropy metric which explain a lot of our observations about how the metric behaves.\nOur latest understanding of Entropy is that it is a strong correlate of your metabolic rate (amount of calories being burnt by your body real time). We are even contemplating renaming it to Burn Rate (pending some validation work before we switch to this name).\nWe are going to validate this updated understanding using calorimeters and publish white-papers on this metric before we go public with the device in a few weeks from now, as establishing trust is of paramount importance here.\nEveryone other wearable calculates calories from heart rate, which is a known-bad proxy. We think we are measuring the thing they guess at, and we can now show that the same person spends different calories on different days depending on their state, not just their weight and age.\nThe mission follows directly: spend less to live longer.\nLower resting Entropy/Burn means a body that is cheap to run, which evidence links to longevity. A wide range between your resting floor and your peak means you can still surge and recover when you need to. Low floor, wide range, that's the goal.\nWhat ENTROPY is NOT\nEntropy (Burn Rate) is not a stress meter, a mood meter, or a drama meter. It does not measure how intense a moment feels. It measures what that moment costs your body in energy. These are different things, and they come apart exactly when you'd least expect it. Three real examples from our own data:\nOne, an anxiety attack. Feels like a 10 out of 10. Entropy (Burn Rate) moved about 10 points up from 30 to 40. Real, but modest, because panic costs the body far less energy than it costs the mind.\nTwo, a hard head strike in the pool this week. Violent event, the kind of thing you'd assume spikes everything. Burn Rate dropped, from 120 to 75. Why? The person was swimming, and most of that 120 was the physical work of swimming. The impact triggered a freeze response, the body went still for a few seconds, and the moment movement stopped, the biggest part of the number fell away. The drop was the activity disappearing, not the body calming down. It recovered within minutes.\nHold these two cases side by side and you've got the whole lesson: a dramatic feeling barely moved the number, and a dramatic event moved it down. Burn Rate tracks metabolic spend, not how big the moment feels.\nWe are gonig to test this new understanding rigorously, and we will share more once we learn more. But for now, this new understanding explains almost all the unexplained patterns in Entropy which we have observed, but could not explain. I request you to dogfood entropy with this new lens, and I look forward to learning more about this with all of you."}, {"sender": "~ Rob Mohr", "is_team": false, "date": "12/06", "text": "I assumed it was an inverse correlate of realtime HRV. This is an interesting explanation."}, {"sender": "~ Rob Mohr", "is_team": false, "date": "12/06", "text": "I am still finding that it’s underestimating my calories by 40% or more on hard workouts. I’d love to work with the team to unpack this.\nI try and keep lots of metrics for my rides."}, {"sender": "~ Rob Mohr", "is_team": false, "date": "13/06", "text": "Team,\nWe received the new temple today.\nHow would you like me to return the old one?\nI’d love to learn more about the tech and the metrics behind it."}, {"sender": "Sahil Kaul", "is_team": true, "date": "13/06", "text": "Hey Rob, noted this.\nWe're working on improving the calories logic which should make the hard workout calories far more relatable. More on this soon.\nHappy to get on a call with you to understand this better. Meanwhile, how are you comparing calories?"}, {"sender": "Arjun Madhusudhan Temple", "is_team": true, "date": "13/06", "text": "Great!\nLet me get back to you on returning the old one."}, {"sender": "~ Rob Mohr", "is_team": false, "date": "13/06", "text": "I’m using the bike output from Technogym which is measuring watts and heart rate"}, {"sender": "Deepi New", "is_team": true, "date": "13/06", "text": "Entropy → Calorie estimation results\nWe tested whether the Temple Entropy can estimate calories burned, by comparing it (and heart rate) against a metabolic cart (VO2 machine).\nWe checked how tightly each signal moves with VO2 and VCO2 moment-to-moment (r = 1.0 is a perfect match):\nCorrelations — point-by-point vs VO2/VCO2:\nsignal                     r vs VO2    r vs VCO2\nEntropy EMA            0.83             0.89\nCost of Curvature    0.82            0.88\nHeart Rate                0.81            0.82\nObservations:\n• Entropy tracks VO2 and VCO2 closely, slightly higher against VCO2 than VO2.\n• Entropy rises with effort and plateaus at peak once VCO2 rises above VO2 (RER > 1). It stays elevated even after the person stops and HR begins to fall - holding until VCO2 drops back below VO2.\n• HR mis-times effort - max effort decouples from VO2 in both directions:  HR based calories under-counts when HR hits its ceiling while VO2 keeps climbing (Samyak 92%, Vidushi 2 66%), and over-counts when HR runs high vs VO2 (Saurabh 108% - he vaped before the run, which likely elevated his HR independent of effort).\nEntropy Calories - still in progress. These numbers come from a rough MET-based estimate (mapping entropy to METs) just to see how well entropy can model calories ; we will refine it next.\nTotals vs the VO2 machine (Δ = signed kcal error):\nHR (Δ) - Current Temple Calories\nparticipant      VO2 machine    Entropy (Δ)    HR (Δ)\nNitish                     122               117 (−5)     114 (−8)\nSamyak                  149               147 (−2)     137 (−12)\nVidushi run 1        22.5               22 (−0.5)    22 (−0.5)\nVidushi run 2        150               145 (−5)     100 (−50)\nChirag                    130               127 (−3)     119 (−11)\nSaurabh                 133               130 (−3)     144 (+11)\n--------------------------------------------------------\nmean |error|                               ~3 kcal      ~15 kcal\nrange (% of truth)                     96–99%       66–108%\nCurve correlation - cumulative calorie curve vs VO2 machine over time (whether the running calorie total builds up in the same shape over time as the VO2 machine):\nEntropy-based    r = 0.93\nHR-based            r = 0.61"}, {"sender": "Deepi New", "is_team": true, "date": "13/06", "text": "Initial results ^ - lots more work to be done."}, {"sender": "Deepi New", "is_team": true, "date": "13/06", "text": "The entropy to calorie estimation used here is very primitive, so this looks immensely promising as it develops."}, {"sender": "Deepi New", "is_team": true, "date": "13/06", "text": "Would love to know your take :)"}, {"sender": "~ Rob Mohr", "is_team": false, "date": "14/06", "text": "Ok so my take:\nCerebral perfusion likely plateaus decently before maximal exertion and more expenditure is happening peripherally than is reflected on the device\nAlso: above threshold, VCO₂ becomes confounded by bicarbonate buffering of metabolic acidosis (lactate accumulation) so the correlation falls off above VT2/LT2.\nI THINK based on what I’m finding when searching Technogym’s algorithms is that it uses watts expended (work) and weight to calculate calories."}, {"sender": "~ Rob Mohr", "is_team": false, "date": "14/06", "text": "API with peloton/texhnogym/wattbike/major manufacturers to look at the actual work done: compare it with what is seen in cerebral measurement\nLook for the point of decoupling…\nCall it a decoupling index.\nIt may actually prove to be predictive of a physiologic or pathologic process.\nIt’s plausible that during high-intensity exercise, prefrontal oxygenation may decline and executive function could be impaired. I know when I’m working out at high intensity I feel pretty simple minded…\nMaybe this exposes a trainable target"}, {"sender": "~ Rob Mohr", "is_team": false, "date": "14/06", "text": "Just spitballing"}]}, {"name": "Greg", "group": "Greg", "thread": [{"sender": "Temple x Greg", "is_team": true, "date": "28/05", "text": "‎Messages and calls are end-to-end encrypted. Only people in this chat can read, listen to, or share them."}, {"sender": "Temple x Greg", "is_team": true, "date": "28/05", "text": "‎‎‎Disappearing messages were turned on. ‎New messages will disappear from this chat ‎90 days after they're sent, except when kept. ‎Change timer"}, {"sender": "Veer Temple", "is_team": true, "date": "28/05", "text": "Hi Greg, this is Veer
