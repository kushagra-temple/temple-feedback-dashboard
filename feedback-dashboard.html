<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Temple — Customer Feedback Dashboard</title>
<style>
:root{
  --ink:#1c1c1a;--ink2:#57564f;--ink3:#908e86;
  --rule:#e7e5dd;--rule2:#d2cfc4;--chip:#ecebe3;
  --bg:#f5f4f0;--card:#ffffff;--field:#fbfaf6;
  --pr-bg:#1c1c1a;--pr-tx:#ffffff;
  --ne-bg:#514f49;--ne-tx:#ffffff;
  --su-bg:#807e76;--su-tx:#ffffff;
  --qu-bg:#c2c0b6;--qu-tx:#2a2a27;
  --po-bg:#f5f4f0;--po-tx:#57564f;--po-br:#b6b3a8;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;font-size:14px;line-height:1.5;}
.wrap{max-width:1140px;margin:0 auto;padding:24px 28px 70px;}
h1{font-size:22px;font-weight:700;letter-spacing:-.01em;}
h2{font-size:12px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--ink2);margin-bottom:12px;}
.sub{color:var(--ink3);font-size:12px;margin-top:3px;}
.topbar{padding-bottom:14px;border-bottom:1px solid var(--rule);margin-bottom:22px;}
.kpis{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:22px;max-width:340px;}
.kpi{background:var(--card);padding:14px 18px;border:1px solid var(--rule);border-radius:10px;}
.kpi-lbl{color:var(--ink3);font-size:10px;text-transform:uppercase;letter-spacing:.05em;font-weight:600;}
.kpi-val{font-size:28px;font-weight:700;margin-top:5px;line-height:1;}
.tabs{display:flex;gap:3px;border-bottom:1px solid var(--rule);margin-bottom:20px;}
.tab{background:none;border:none;font-family:inherit;font-size:13px;cursor:pointer;padding:9px 15px;color:var(--ink3);border-bottom:2px solid transparent;margin-bottom:-1px;}
.tab:hover{color:var(--ink2);}
.tab.on{color:var(--ink);font-weight:700;border-bottom-color:var(--ink);}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(310px,1fr));gap:11px;}
.card{background:var(--card);border:1px solid var(--rule);border-radius:11px;padding:14px 17px;cursor:pointer;transition:border-color .12s,box-shadow .12s,transform .12s;display:flex;flex-direction:column;gap:8px;}
.card:hover{border-color:var(--ink);box-shadow:0 5px 16px rgba(0,0,0,.06);transform:translateY(-2px);}
.cn{font-size:15px;font-weight:700;letter-spacing:-.01em;}
.cm{color:var(--ink3);font-size:11px;}
.ct{font-size:22px;font-weight:700;line-height:1;}
.ctop{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;}
.cf{font-size:11px;color:var(--ink2);border-top:1px dashed var(--rule);padding-top:8px;}
.cf b{color:var(--ink);font-weight:600;}
.cgo{font-size:10px;color:var(--ink3);text-transform:uppercase;letter-spacing:.05em;}
.back{background:none;border:none;cursor:pointer;font-family:inherit;color:var(--ink2);font-size:12px;padding:0;margin-bottom:14px;display:inline-flex;align-items:center;gap:5px;}
.back:hover{color:var(--ink);}
.dh{display:flex;align-items:flex-end;justify-content:space-between;padding-bottom:14px;border-bottom:1px solid var(--rule);margin-bottom:20px;gap:14px;}
.dhc{color:var(--ink3);font-size:11px;white-space:nowrap;}
.blk{background:var(--card);border:1px solid var(--rule);border-radius:11px;padding:17px 19px;margin-bottom:16px;}
.hint{font-size:10px;color:var(--ink3);font-weight:500;margin-left:5px;text-transform:none;letter-spacing:0;}
.crow{display:grid;grid-template-columns:150px 1fr 32px;gap:10px;align-items:center;padding:4px 5px;margin:0 -5px;border-radius:6px;}
.crow.clk{cursor:pointer;}
.crow.clk:hover{background:#f0eee7;}
.crow.act{background:var(--chip);}
.clbl{font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.crow.act .clbl{font-weight:700;}
.ctrk{height:14px;background:var(--rule);border-radius:99px;overflow:hidden;display:flex;}
.cseg{height:100%;}
.ccnt{font-weight:700;font-size:12px;text-align:right;font-variant-numeric:tabular-nums;}
.lgnd{display:flex;gap:12px;flex-wrap:wrap;margin-top:12px;padding-top:10px;border-top:1px solid var(--rule);}
.lgnd span{display:inline-flex;align-items:center;gap:5px;font-size:10px;color:var(--ink2);}
.sw{width:10px;height:10px;border-radius:3px;display:inline-block;}
.cseg.Problem,.sw.Problem{background:var(--pr-bg);}
.cseg.Negative,.sw.Negative{background:var(--ne-bg);}
.cseg.Suggestion,.sw.Suggestion{background:var(--su-bg);}
.cseg.Question,.sw.Question{background:var(--qu-bg);}
.cseg.Positive,.sw.Positive{background:var(--po-br);}
.fbar{display:flex;align-items:center;flex-wrap:wrap;gap:7px;margin-bottom:12px;}
.fblbl{font-size:10px;color:var(--ink3);font-weight:600;text-transform:uppercase;letter-spacing:.05em;margin-right:2px;}
.chip{padding:4px 11px;border-radius:14px;border:1px solid var(--rule2);background:var(--card);font-size:11px;cursor:pointer;font-family:inherit;color:var(--ink2);transition:all .12s;}
.chip:hover{background:var(--chip);}
.chip.on{background:var(--ink);color:#fff;border-color:var(--ink);font-weight:600;}
.tcard{background:var(--card);border:1px solid var(--rule);border-radius:11px;overflow:hidden;}
.tscroll{overflow-x:auto;}
table.fb{width:100%;border-collapse:separate;border-spacing:0;font-size:12px;min-width:780px;}
table.fb th,table.fb td{padding:9px 13px;text-align:left;border-bottom:1px solid var(--rule);vertical-align:top;}
table.fb th{font-size:9px;text-transform:uppercase;letter-spacing:.05em;color:var(--ink3);font-weight:600;background:#faf9f5;}
table.fb tr:last-child td{border-bottom:none;}
table.fb td.sub{font-weight:600;white-space:nowrap;}
table.fb td.fbtx{min-width:220px;}
table.fb td.who{color:var(--ink3);white-space:nowrap;font-size:11px;}
.colr{width:220px;}
.pill{display:inline-block;padding:2px 9px;border-radius:10px;font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;white-space:nowrap;}
.pill.Problem{background:var(--pr-bg);color:var(--pr-tx);}
.pill.Negative{background:var(--ne-bg);color:var(--ne-tx);}
.pill.Suggestion{background:var(--su-bg);color:var(--su-tx);}
.pill.Question{background:var(--qu-bg);color:var(--qu-tx);}
.pill.Positive{background:var(--po-bg);color:var(--po-tx);border:1px solid var(--po-br);}
.ri{width:100%;min-height:34px;resize:vertical;font-family:inherit;font-size:11px;padding:6px 8px;border:1px solid var(--rule2);border-radius:6px;background:var(--field);color:var(--ink);line-height:1.4;}
.ri:focus{outline:none;border-color:var(--ink);background:#fff;}
.ri.saved{border-color:var(--ink3);}
.empty{padding:26px;text-align:center;color:var(--ink3);font-style:italic;font-size:12px;}
.note{color:var(--ink3);font-size:10px;margin-top:8px;}
.mvtabs{display:flex;gap:2px;border-bottom:1px solid var(--rule);margin-bottom:16px;}
.mvtab{background:none;border:none;font-family:inherit;font-size:13px;cursor:pointer;padding:8px 13px;color:var(--ink3);border-bottom:2px solid transparent;margin-bottom:-1px;}
.mvtab:hover{color:var(--ink2);}
.mvtab.on{color:var(--ink);font-weight:700;border-bottom-color:var(--ink);}
.chat-thread{display:flex;flex-direction:column;gap:2px;padding:4px 0;}
.dsep{text-align:center;font-size:10px;color:var(--ink3);text-transform:uppercase;letter-spacing:.05em;padding:12px 0 5px;border-top:1px solid var(--rule);margin-top:8px;}
.dsep:first-child{border-top:none;margin-top:0;}
.brow{display:flex;gap:8px;align-items:flex-end;padding:2px 0;}
.brow.team{flex-direction:row-reverse;}
.bav{width:26px;height:26px;border-radius:50%;background:var(--chip);color:var(--ink2);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;}
.brow.team .bav{background:#e8e6df;}
.bubble{max-width:70%;padding:8px 11px;border-radius:13px;font-size:12px;line-height:1.5;}
.brow:not(.team) .bubble{background:#fff;border:1px solid var(--rule);border-bottom-left-radius:3px;}
.brow.team .bubble{background:#f0efe8;border:1px solid var(--rule);border-bottom-right-radius:3px;}
.bsndr{font-size:9px;font-weight:700;color:var(--ink2);margin-bottom:3px;text-transform:uppercase;letter-spacing:.04em;}
.btxt{white-space:pre-wrap;word-break:break-word;}
.faq-wrap{display:flex;flex-direction:column;gap:12px;}
.faq-item{border:1px solid var(--rule);border-radius:10px;padding:16px 18px;background:var(--card);}
.faq-item.hot{border-left:3px solid var(--ink);}
.faq-q{font-size:14px;font-weight:600;color:var(--ink);margin-bottom:10px;line-height:1.4;}
.faq-meta{display:flex;gap:8px;align-items:center;margin-bottom:12px;flex-wrap:wrap;}
.faq-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:10px;font-size:10px;font-weight:700;}
.faq-badge.hot{background:var(--ink);color:#fff;}
.faq-badge.single{background:var(--chip);color:var(--ink2);}
.faq-custs{font-size:11px;color:var(--ink3);}
.faq-ans-lbl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--ink3);margin-bottom:5px;}
.faq-ans{background:#f7f6f2;border-radius:7px;padding:11px 13px;font-size:12px;color:var(--ink2);line-height:1.7;}
.faq-empty{color:var(--ink3);font-style:italic;font-size:12px;background:#f7f6f2;border-radius:7px;padding:11px 13px;}
.faq-divider{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--ink3);padding:6px 0 4px;border-bottom:1px solid var(--rule);margin-bottom:4px;margin-top:8px;}
[hidden]{display:none!important;}
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <h1>Customer feedback</h1>
    <div class="sub" id="dsub"></div>
  </div>
  <div id="home-view">
    <div class="kpis" id="kpis"></div>
    <div class="tabs">
      <button class="tab on" id="tab-teams" onclick="goTeams()">By team</button>
      <button class="tab" id="tab-members" onclick="goMembers()">By member</button>
    </div>
    <section id="teams-panel"><div class="grid" id="team-grid"></div></section>
    <section id="members-panel" hidden><div class="grid" id="member-grid"></div></section>
  </div>
  <div id="team-view" hidden>
    <button class="back" onclick="goTeams()">&#8592; All teams</button>
    <div class="dh">
      <div><h1 id="tv-title"></h1><div class="sub" id="tv-sub"></div></div>
      <div class="dhc" id="tv-cnt"></div>
    </div>
    <div class="mvtabs">
      <button class="mvtab on" id="tv-tab-ov" onclick="tvTab('ov')">Overview</button>
      <button class="mvtab" id="tv-tab-faq" onclick="tvTab('faq')">FAQ</button>
    </div>
    <div id="tv-ov">
      <div class="blk"><h2>Feedback by subcategory <span class="hint">click bar to filter</span></h2><div id="tv-chart"></div></div>
      <div class="fbar" id="tv-sf"></div>
      <div class="fbar" id="tv-tf"></div>
      <div class="tcard"><div class="tscroll"><table class="fb" id="tv-table"></table></div></div>
      <div class="note">Remarks save in your browser only.</div>
    </div>
    <div id="tv-faq" hidden></div>
  </div>
  <div id="member-view" hidden>
    <button class="back" onclick="goMembers()">&#8592; All members</button>
    <div class="dh">
      <div><h1 id="mv-title"></h1><div class="sub" id="mv-sub"></div></div>
      <div class="dhc" id="mv-cnt"></div>
    </div>
    <div class="mvtabs">
      <button class="mvtab on" id="mv-tab-sum" onclick="mvTab('sum')">Summary</button>
      <button class="mvtab" id="mv-tab-chat" onclick="mvTab('chat')">Full chat</button>
    </div>
    <div id="mv-sum">
      <div class="blk"><h2>Feedback by team <span class="hint">click bar to filter</span></h2><div id="mv-chart"></div></div>
      <div class="fbar" id="mv-af"></div>
      <div class="fbar" id="mv-tf"></div>
      <div class="tcard"><div class="tscroll"><table class="fb" id="mv-table"></table></div></div>
      <div class="note">Remarks save in your browser only.</div>
    </div>
    <div id="mv-chat" hidden>
      <div class="blk"><h2 id="mv-chat-title">Full conversation</h2><div class="chat-thread" id="mv-thread"></div></div>
    </div>
  </div>
</div>
<script>
const DATA={"records": [{"id": "WA-001", "customer": "Aakash", "group": "Aakash", "date": "19/05", "text": "if i drop the device somewhere or misplace it is there a way to track it (like findmy on iphone)", "area": "Product Team", "subcategory": "Feature Requests", "classification": "Question", "answer": "Not yet, Aakash. We are building this feature and will launch this soon. Meanwhile, if you ever lose or misplace the device we will send a replacement device for you immediately."}, {"id": "WA-002", "customer": "Aakash", "group": "Aakash", "date": "19/05", "text": "it would be cool if at some point bone conduction audio can be added so i can drop my current head phones", "area": "Product Team", "subcategory": "Feature Requests", "classification": "Suggestion", "answer": ""}, {"id": "WA-003", "customer": "Aakash", "group": "Aakash", "date": "19/05", "text": "my kids rejected placement on temple so i am wearing behind my ear", "area": "Hardware/Firmware", "subcategory": "Device Body", "classification": "Problem", "answer": "Temple will not work for any other location, other than the temple. The physiology of the temporal area is unique."}, {"id": "WA-004", "customer": "Ajit", "group": "Ajit", "date": "15/05", "text": "this app is absolutely beautiful. Beyond words.", "area": "Product Team", "subcategory": "Feature Requests", "classification": "Positive", "answer": ""}, {"id": "WA-005", "customer": "Ajit", "group": "Ajit", "date": "17/05", "text": "Reducing Entropy: I've got a rough idea of when it spikes, but still figuring out what actually brings it down and keeps it low. Do we know what I could try?", "area": "Science Team", "subcategory": "Entropy", "classification": "Question", "answer": "To get your Entropy down you can try - meditation, cold shower, head down tilt, and even sleeping!"}, {"id": "WA-006", "customer": "Ajit", "group": "Ajit", "date": "17/05", "text": "Sleep position & recovery: I usually sleep on my tummy, but switched to my side last night and felt noticeably better. Both cognitive and physical recovery were the highest I've hit. What else moves the sleep score?", "area": "Science Team", "subcategory": "Recovery Score", "classification": "Question", "answer": "Side sleeping improves glymphatic system at night. To really move the sleep score, try to reduce your entropy and keep it low for 1-2 hrs before sleeping."}, {"id": "WA-007", "customer": "Ajit", "group": "Ajit", "date": "17/05", "text": "UI overlap bug: When Entropy is just a point or two away from a section boundary, the numbers on the left start overlapping.", "area": "Tech", "subcategory": "UI/UX", "classification": "Problem", "answer": "Noted here!"}, {"id": "WA-008", "customer": "Ajit", "group": "Ajit", "date": "18/05", "text": "A bowl of litchis just spiked my entropy. That's possible?", "area": "Science Team", "subcategory": "Entropy", "classification": "Question", "answer": "Eating does increase entropy. Extent of increase depends on the food item and how it affects your body."}, {"id": "WA-009", "customer": "Ajit", "group": "Ajit", "date": "25/05", "text": "BTW, the new interface looks really good.", "area": "Product Team", "subcategory": "Feature Requests", "classification": "Positive", "answer": ""}, {"id": "WA-010", "customer": "Ajit", "group": "Ajit", "date": "26/05", "text": "Are we planning to change this icon to the kind of activity logged?", "area": "Product Team", "subcategory": "Activity Logging", "classification": "Suggestion", "answer": ""}, {"id": "WA-011", "customer": "Akanksha", "group": "Akanksha", "date": "03/06", "text": "why is my entropy so high after waking up? Have been awake for an hour but doesn't seem to be coming down", "area": "Science Team", "subcategory": "Entropy", "classification": "Question", "answer": "Entropy goes down at night if you've had a good sleep. Wait 3 days for the device to calibrate. You can dip your face in ice and do some breath work to lower it."}, {"id": "WA-012", "customer": "Akanksha", "group": "Akanksha", "date": "04/06", "text": "For a moment, I thought I was surplus by 1516 calories. Then saw 'burned' on the right to realise that surplus was just a tag.", "area": "Tech", "subcategory": "UI/UX", "classification": "Problem", "answer": "Yes, the app tags the surplus which in this case is marginal at 16. Calories consumed in total were 1516 and 1500 of those were calories burned."}, {"id": "WA-013", "customer": "Akanksha", "group": "Akanksha", "date": "04/06", "text": "My entropy was quite high through the day. Switched side after my night routine and the entropy came down by about 30-40 points. Right side = high entropy, left side = much lower.", "area": "Science Team", "subcategory": "Entropy", "classification": "Question", "answer": "There could be a difference in blood flow between left and right placement sides sometimes. We are continuously working on newer updates to make this even more accurate."}, {"id": "WA-014", "customer": "Akanksha", "group": "Akanksha", "date": "07/06", "text": "Felt very anxious, heart rate shot up. Was pleased to see the same trend in heart reads. However, entropy didn't show much of a change during the anxiety.", "area": "Science Team", "subcategory": "Entropy", "classification": "Question", "answer": ""}, {"id": "WA-015", "customer": "Akanksha", "group": "Akanksha", "date": "09/06", "text": "Why is active cal burned bar indicated in red? It is similar to the colour of Diffused state in Focus, which indicates underperformance. Shouldn't the bar be in green?", "area": "Tech", "subcategory": "UI/UX", "classification": "Suggestion", "answer": "That's really good feedback Akanksha. Noted and I'll take it up with the team."}, {"id": "WA-016", "customer": "Akanksha", "group": "Akanksha", "date": "13/06", "text": "Period tracker: it is auto logging for me the first time itself — not sure from where it is picking the estimate. The calendar should be forward scrollable too so I can see the ovulation window. Edit button is hard to find. Predictions hierarchy looks off.", "area": "Product Team", "subcategory": "Women's Health", "classification": "Problem", "answer": "Noted Akanksha! Will relay this to the team."}, {"id": "WA-017", "customer": "Akshant", "group": "Akshant", "date": "11/05", "text": "I am trying to look for my calories consumed data from yesterday. Where can I find it on the app?", "area": "Science Team", "subcategory": "Calorie Tracking", "classification": "Question", "answer": "You can click on today's calories consumed card and navigate to yesterday using the arrows on top right."}, {"id": "WA-018", "customer": "Akshant", "group": "Akshant", "date": "13/05", "text": "I don't get to understand why my recovery is low and what can make it better. All the metrics shown under recovery are good for me - RHR, HRV, Sleep Efficiency, total sleep time etc.", "area": "Science Team", "subcategory": "Recovery Score", "classification": "Question", "answer": "There are additional factors which determine recovery, not being reflected on the app currently. We will be live with these by end of the week."}, {"id": "WA-019", "customer": "Akshant", "group": "Akshant", "date": "14/05", "text": "At the top, once I pause the activity, it is not obvious how to end it. That action is buried inside the 3 vertical dots.", "area": "Tech", "subcategory": "UI/UX", "classification": "Problem", "answer": "Kept it intentional to keep the screen clean. One time learning. There's nowhere else to go for ending activity."}, {"id": "WA-020", "customer": "Akshant", "group": "Akshant", "date": "14/05", "text": "Is our science for calculating active calories burned same as other wearables?", "area": "Data Science", "subcategory": "Calorie Tracking", "classification": "Question", "answer": "No, we also do strength workouts really well. Our strength calories are based on entropy swings. Heart rate doesn't capture strength training intensity."}, {"id": "WA-021", "customer": "Akshant", "group": "Akshant", "date": "14/05", "text": "Same input showing 988 kcal today - cortado coffee + 5 overnight soaked almonds. The calories have been inconsistent day to day.", "area": "Data Science", "subcategory": "Calorie Tracking", "classification": "Problem", "answer": "Hmm, these are AI goof ups - will see if we can do something about it."}, {"id": "WA-022", "customer": "Akshant", "group": "Akshant", "date": "19/05", "text": "The entropy dial shows a max of 160 but my entropy was 180+ while running today", "area": "Science Team", "subcategory": "Entropy", "classification": "Question", "answer": "By design - post that, you are overclocking the engine. Not intuitive - can take the dial back to 200."}, {"id": "WA-023", "customer": "Akshant", "group": "Akshant", "date": "25/05", "text": "Entropy and focus have become very erratic since the new update - generally very high all the time. Focus is also high for large blocks when I am not doing any activity.", "area": "Science Team", "subcategory": "Entropy", "classification": "Problem", "answer": "Let me get to the bottom of this."}, {"id": "WA-024", "customer": "Akshant", "group": "Akshant", "date": "26/05", "text": "I had very good sleep in the night. But the entropy was always in stimulated zone. It's paradoxical that sleep summary is saying I had high entropy and great sleep quality.", "area": "Science Team", "subcategory": "Recovery Score", "classification": "Question", "answer": "Currently physical recovery factors in HRV, RHR and Deep Sleep duration. Workstream to ingress entropy and BF values in sleep quality is in progress."}, {"id": "WA-025", "customer": "Akshant", "group": "Akshant", "date": "28/05", "text": "Not seeing any data in my charts post 11am yesterday. No eating detection also post 2pm. Device ran out of charge during sleep.", "area": "Tech", "subcategory": "Sync & Data", "classification": "Problem", "answer": "Getting this checked. Seems like some issue with flash storage - getting your device replaced."}, {"id": "WA-026", "customer": "Akshant", "group": "Akshant", "date": "30/05", "text": "I did a 36 hour fast. Zero calories. Would have been cool for the product to pick up that I haven't eaten and bake that into my morning insight card.", "area": "Product Team", "subcategory": "Feature Requests", "classification": "Suggestion", "answer": "Very cool! We'll bake this in. Fasting will be great lever for giving commentary in morning insights."}, {"id": "WA-027", "customer": "Akshant", "group": "Akshant", "date": "03/06", "text": "Possible activity detected message came even though my activity was already on. Needs to be fixed.", "area": "Tech", "subcategory": "App Crashes", "classification": "Problem", "answer": "Should not happen. Will get this fixed. A device reboot happened during your workout causing previous context to be lost. Hotfix releasing tonight."}, {"id": "WA-028", "customer": "Akshant", "group": "Akshant", "date": "08/06", "text": "What's the basis of sleep quality? I woke up at 4am, sleep quality was 4/10. I slept again till 6am. Both sleep scores went up although there is no deep sleep between 4-6am.", "area": "Data Science", "subcategory": "Sleep Tracking", "classification": "Question", "answer": "Sleep quality depends on duration and Brain Flow factors during Deep and REM stages. When the sleep got updated, we recompute the sleep stages for the entire duration."}, {"id": "WA-029", "customer": "Ankush", "group": "Ankush", "date": "23/05", "text": "The tape's stickiness strengthens over time. However by day 3 one starts to feel the glue stress on the skin akin to an old band-aid.", "area": "Adhesion", "subcategory": "Skin Issues", "classification": "Problem", "answer": "The skin stress is most likely first-time adaptation. Should ease by your second or third cycle."}, {"id": "WA-030", "customer": "Ankush", "group": "Ankush", "date": "23/05", "text": "When you take off the tape after 3-4 days, some small dots appear on surface of the skin where it was mounted.", "area": "Adhesion", "subcategory": "Skin Issues", "classification": "Problem", "answer": "On the small dots - were they sticky to the touch when you ran your finger over them, or just visible marks on the skin?"}, {"id": "WA-031", "customer": "Ankush", "group": "Ankush", "date": "23/05", "text": "Many a times one munches onto something during a meeting. Can we add an option to dismiss the eating detection ask, since one may want to feed in info on all major meals but not on tit-bits?", "area": "Product Team", "subcategory": "Feature Requests", "classification": "Suggestion", "answer": "We believe every nibble deserves a journal entry. However, dismiss/snooze on the eating prompt is on the roadmap."}, {"id": "WA-032", "customer": "Ankush", "group": "Ankush", "date": "23/05", "text": "Battery life only 3.5 days. It will be great if battery life can be increased to match the tape life.", "area": "Hardware/Firmware", "subcategory": "Battery", "classification": "Suggestion", "answer": "Battery is built around the tape rhythm by design - we want you to change the tapes every 3-4 days to keep the skin comfortable."}, {"id": "WA-033", "customer": "Ankush", "group": "Ankush", "date": "12/06", "text": "Every 3.5 days when I take it off to charge, it leaves residual glue on the device which needs to be cleaned. Some cleaning instructions will be helpful to ensure one doesn't damage the device or scratch the sensor.", "area": "Adhesion", "subcategory": "Residue", "classification": "Problem", "answer": "Device and tapes are designed to prevent residual glue. You can use a dry cloth or wet wipe to gently wipe the glue off."}, {"id": "WA-034", "customer": "Ankush", "group": "Ankush", "date": "12/06", "text": "Around the sensor, could consider raising the plastic to create a mini boundary wall so that residual glue doesn't slide over onto the sensor.", "area": "Hardware/Firmware", "subcategory": "Sensor", "classification": "Suggestion", "answer": "Appreciate the feedback. I've forwarded this to the relevant teams."}, {"id": "WA-035", "customer": "Ankush", "group": "Ankush", "date": "12/06", "text": "During travel, on a long flight, when I see I have less than 10-15% battery, if I can move to a 'light mode' that makes the battery last longer.", "area": "Hardware/Firmware", "subcategory": "Battery", "classification": "Suggestion", "answer": "Point taken. I've conveyed the same to the product team."}, {"id": "WA-036", "customer": "Dhruv B", "group": "Dhruv B", "date": "15/06", "text": "Logged in my first workout today - missed the rep and exercise logging on the app itself like Whoop does. Are we planning to build this internally or integrating with any 3p app to log the details?", "area": "Product Team", "subcategory": "Activity Logging", "classification": "Question", "answer": "Yes this is something we are absolutely integrating into Temple. We will launch Automated Set Detection soon."}, {"id": "WA-037", "customer": "Dr Apoorva", "group": "Dr Apoorva", "date": "16/05", "text": "I asked Dad to use my temple, I changed gender/weight/height in profile and it instantly changed parameters. Not sure if temple can be shared between people.", "area": "Support", "subcategory": "Onboarding", "classification": "Question", "answer": "Temple can't be shared between people. It has to be reset before you share it with someone. And the reset functionality hasn't been built yet."}, {"id": "WA-038", "customer": "Dr Apoorva", "group": "Dr Apoorva", "date": "16/05", "text": "I tracked my sleep and I am very proud that in morning I saw 99% efficiency! Positive feedback and Good mood to start day!", "area": "Data Science", "subcategory": "Sleep Tracking", "classification": "Positive", "answer": ""}, {"id": "WA-039", "customer": "Dr Apoorva", "group": "Dr Apoorva", "date": "16/05", "text": "Questions from my patients: Where is the manufacturing? Is it made in India? One full charge allows you to wear Temple for how many days? Does the wireless waves and network affect the mind/health?", "area": "Hardware/Firmware", "subcategory": "Connectivity", "classification": "Question", "answer": "Manufacturing in India. One full charge lasts for 2.5-4 days. There is ZERO radiation towards the body side. Our Bluetooth is a custom made ultra low powered Bluetooth that only emits waves away from the body."}, {"id": "WA-040", "customer": "Dr Apoorva", "group": "Dr Apoorva", "date": "16/05", "text": "Will there be more color options in future?", "area": "Manufacturing", "subcategory": "Color/Finish", "classification": "Question", "answer": "Three more - Reflective Silver, True Gold, Matte Titanium."}, {"id": "WA-041", "customer": "Dr Apoorva", "group": "Dr Apoorva", "date": "16/05", "text": "At some point it will be nice if you guys introduce rose gold for women!", "area": "Manufacturing", "subcategory": "Color/Finish", "classification": "Suggestion", "answer": "Yes, working on it. Trying to get the perfect rose gold."}, {"id": "WA-042", "customer": "Dr Apoorva", "group": "Dr Apoorva", "date": "19/05", "text": "My skin had irritation after wearing it for 2 days so I removed it and put it on right side. Is that normal?", "area": "Adhesion", "subcategory": "Skin Issues", "classification": "Question", "answer": "Skin irritation - yes, can switch sides. Irritation should not happen once you put it on clean skin. Your skin will also get used to it in a week."}, {"id": "WA-043", "customer": "Dr Apoorva", "group": "Dr Apoorva", "date": "19/05", "text": "How do you measure focus? I perform 3 hour long highly precise plastic surgery which needs crazy focus but my focus reading is soft. Is it because my hands, body and legs are moving?", "area": "Science Team", "subcategory": "Focus", "classification": "Question", "answer": "Focus is a physiological signal - nothing to do with motion. Next time you do a surgery, please log an activity on Temple as 'surgery' and we will study what happens to your focus at that time."}, {"id": "WA-044", "customer": "Dr Apoorva", "group": "Dr Apoorva", "date": "19/05", "text": "What is cognitive work? How does it work? What does one do to increase cognitive work?", "area": "Science Team", "subcategory": "Cognitive Work", "classification": "Question", "answer": "Cognitive work is simply focus x hours. So if focus is low, CW is also low."}, {"id": "WA-045", "customer": "Dr Apoorva", "group": "Dr Apoorva", "date": "19/05", "text": "Is it safe for pregnant females?", "area": "Hardware/Firmware", "subcategory": "Sensor", "classification": "Question", "answer": "Yes, fully safe for pregnant females. There's nothing in it which is unsafe in any way."}, {"id": "WA-046", "customer": "Dr Apoorva", "group": "Dr Apoorva", "date": "27/05", "text": "Is it possible that new software updates are draining battery quickly?", "area": "Hardware/Firmware", "subcategory": "Battery", "classification": "Question", "answer": ""}, {"id": "WA-047", "customer": "Dr Apoorva", "group": "Dr Apoorva", "date": "27/05", "text": "My skin feels slightly itchy and I get the urge to take it off and give my skin rest. Removing and putting the adhesive tape on same area is making my skin itchy especially in this hot weather.", "area": "Adhesion", "subcategory": "Skin Issues", "classification": "Problem", "answer": ""}, {"id": "WA-048", "customer": "Dr Apoorva", "group": "Dr Apoorva", "date": "31/05", "text": "Got up in morning and saw app crash notification.", "area": "Tech", "subcategory": "App Crashes", "classification": "Problem", "answer": "Will check the crash. The crash was because of a few features being rolled out regarding activity auto detection."}, {"id": "WA-049", "customer": "Dr Apoorva", "group": "Dr Apoorva", "date": "31/05", "text": "Can I not record two activities back to back? I ended the first but there was no option to start another activity.", "area": "Product Team", "subcategory": "Activity Logging", "classification": "Problem", "answer": "Should have been able to start a new one after ending the first. Will check this."}, {"id": "WA-050", "customer": "Dr Apoorva", "group": "Dr Apoorva", "date": "15/06", "text": "It's showing me eating detected whereas there was no activity. I am sitting in my car on my way home with closed eyes - it says eating detected. This is the third time since morning.", "area": "Data Science", "subcategory": "Chewing Detection", "classification": "Problem", "answer": "We are working on a personalized chewing detection pattern that would have removed most of the false detections today."}, {"id": "WA-051", "customer": "Dr Apoorva", "group": "Dr Apoorva", "date": "12/06", "text": "I logged surgery today - the timeline one, not live. It showed all vitals but not focus.", "area": "Product Team", "subcategory": "Activity Logging", "classification": "Problem", "answer": "Shouldn't happen. Let me get this checked for you. We fixed the duplicate surgery entries."}, {"id": "WA-052", "customer": "Mayur", "group": "Mayur", "date": "26/05", "text": "I don't know what the different colours of lights mean on the charger. Does this mean it's charging?", "area": "Hardware/Firmware", "subcategory": "Charger", "classification": "Question", "answer": "The device because of old firmware of the charger had gone into ship mode. The device should start working once it's charged."}, {"id": "WA-053", "customer": "Mayur", "group": "Mayur", "date": "27/05", "text": "What if we map the macros for all the Bistro menu items? Then we will get very accurate calorie counts and analysis when we log Bistro food.", "area": "Data Science", "subcategory": "Calorie Tracking", "classification": "Suggestion", "answer": "Yes, that's under consideration, even Zomato listed restaurants."}, {"id": "WA-054", "customer": "Mayur", "group": "Mayur", "date": "05/06", "text": "My Temple failed to record a nap last evening and my morning coffee with coconut milk.", "area": "Data Science", "subcategory": "Sleep Tracking", "classification": "Problem", "answer": "We don't track naps yet. We are not doing liquids as of now - just chewing detection. Getting the nap issue picked up."}, {"id": "WA-055", "customer": "Mayur", "group": "Mayur", "date": "10/06", "text": "My Temple did not record my meal last night. Dinner between 9-10:30pm.", "area": "Data Science", "subcategory": "Chewing Detection", "classification": "Problem", "answer": "Getting this checked."}, {"id": "WA-056", "customer": "Mayur", "group": "Mayur", "date": "10/06", "text": "Sleep - I closed my eyes at 12:35am and fell asleep almost instantly. My Temple recorded sleep as starting 01:25am - a 50 minute discrepancy.", "area": "Data Science", "subcategory": "Sleep Tracking", "classification": "Problem", "answer": "Getting this checked."}, {"id": "WA-057", "customer": "Mayur", "group": "Mayur", "date": "13/06", "text": "I slept 9 hours. My device ran out of charge at some stage at night and this afternoon post charging here's what it said. The display was alarming - like I was dying.", "area": "Data Science", "subcategory": "Sleep Tracking", "classification": "Problem", "answer": "If the device loses charge mid-sleep, it won't be able to identify what happened after. Should say 'insufficient data' instead. Getting this checked."}, {"id": "WA-058", "customer": "Mayur", "group": "Mayur", "date": "16/06", "text": "Totally missed detecting my lunch and 3 hour dinner yesterday. Also 2 small snacks went undetected.", "area": "Data Science", "subcategory": "Chewing Detection", "classification": "Problem", "answer": "This is being picked, Mayur. Thanks for reporting."}, {"id": "WA-059", "customer": "Mohit", "group": "Mohit", "date": "16/05", "text": "You forget you are wearing it. Love the fact it's completely waterproof. Battery life is 3 days - wish it was 7 days.", "area": "Hardware/Firmware", "subcategory": "Battery", "classification": "Negative", "answer": ""}, {"id": "WA-060", "customer": "Mohit", "group": "Mohit", "date": "16/05", "text": "The eating detections fire multiple times in the same meal - for the same meal it should detect once.", "area": "Data Science", "subcategory": "Chewing Detection", "classification": "Problem", "answer": "They are spaced at 30 mins right now. Sometimes slow multi-course meals get multiple notifications."}, {"id": "WA-061", "customer": "Mohit", "group": "Mohit", "date": "16/05", "text": "I would like to see it impact my workouts more. Given I train with an online coach I cannot view the app while working out. I don't have a post workout synopsis. It does not auto-detect workouts?", "area": "Data Science", "subcategory": "Auto Workout", "classification": "Question", "answer": "Auto detect workout feature is yet to go live. But start an activity before starting to work out."}, {"id": "WA-062", "customer": "Mohit", "group": "Mohit", "date": "19/05", "text": "Charged my Temple device and put it back on. After 30-45 min the device had become hot and ended up burning my skin.", "area": "Hardware/Firmware", "subcategory": "Heating", "classification": "Problem", "answer": "Sorry about this, Mohit. First time I am hearing this - will get to the bottom of this. There seems to be physical damage to the device from inside. Failsafes have been implemented."}, {"id": "WA-063", "customer": "Mohit", "group": "Mohit", "date": "31/05", "text": "Lost Temple - my device fell off somewhere between waking up and the golf course.", "area": "Support", "subcategory": "Device Replacement", "classification": "Problem", "answer": "No worries at all. Will get replacement done immediately."}, {"id": "WA-064", "customer": "Mohit", "group": "Mohit", "date": "02/06", "text": "Received replacement device. Unfortunately not connecting. Had to unlink the old device manually and then it connected.", "area": "Tech", "subcategory": "Connectivity", "classification": "Problem", "answer": "You shouldn't have to unlink the old device manually to be able to connect a new one - this is on us to handle cleanly."}, {"id": "WA-065", "customer": "Niharika", "group": "Niharika", "date": "16/06", "text": "Is there a way to log fever or general symptoms on the app?", "area": "Product Team", "subcategory": "Feature Requests", "classification": "Question", "answer": "You can log fever and symptoms using the 'Journal' feature, which can be accessed by the + Activity button on the bottom right side of the Home Screen."}, {"id": "WA-066", "customer": "Niharika", "group": "Niharika", "date": "16/06", "text": "I sometimes forget to put the device back on after a shower. Is there a way to enable a more prominent reminder or stronger vibration?", "area": "Tech", "subcategory": "Notifications", "classification": "Suggestion", "answer": "Feedback noted on the notification. Currently we prompt once the device is completely charged. Will keep you posted on updates."}, {"id": "WA-067", "customer": "Niharika", "group": "Niharika", "date": "16/06", "text": "Is there a Find My Temple feature or another way to locate it if I misplace it?", "area": "Product Team", "subcategory": "Feature Requests", "classification": "Question", "answer": "Find My Temple is now live on version v1.1.0."}, {"id": "WA-068", "customer": "Niharika", "group": "Niharika", "date": "16/06", "text": "The eating detection trigger usually comes in very late, often towards the end of my meal. Is there a setting I should adjust?", "area": "Data Science", "subcategory": "Chewing Detection", "classification": "Problem", "answer": "Thank you for your inputs regarding chewing detection - this is being worked on by the team."}, {"id": "WA-069", "customer": "Prerna", "group": "Prerna", "date": "06/06", "text": "Device slipped and fell off during the morning workout. Happens often with me during very heavy workouts. I was doing a Murph CrossFit workout.", "area": "Adhesion", "subcategory": "Tapes", "classification": "Problem", "answer": "You're using Athlete tapes or Comfort tapes while working out? Let me look into this. Use the new tapes on the replacement device we'll send."}, {"id": "WA-070", "customer": "Prerna", "group": "Prerna", "date": "11/06", "text": "If I record an outdoor running, it doesn't show the distance covered.", "area": "Data Science", "subcategory": "GPS/Distance", "classification": "Problem", "answer": "We're shipping this soon. Will have GPS integration with phone."}, {"id": "WA-071", "customer": "Pulkit", "group": "Pulkit", "date": "11/06", "text": "The paper bag had a golden temple outside. The temple box is silver. We should keep this consistent with the device colour.", "area": "Manufacturing", "subcategory": "Packaging", "classification": "Suggestion", "answer": "Will happen."}, {"id": "WA-072", "customer": "Pulkit", "group": "Pulkit", "date": "13/06", "text": "While playing Padel today for 1.5 hours, the calorie burn count seems low. It's usually 2x on Whoop.", "area": "Data Science", "subcategory": "Calorie Tracking", "classification": "Problem", "answer": "The HR numbers for your activity today are accurate for the duration logged. Whoop often has cadence lock issues that lead to inflated calorie counts."}, {"id": "WA-073", "customer": "Pulkit", "group": "Pulkit", "date": "13/06", "text": "The tape was 1 day old but the device fell off while playing Padel, maybe because of too much sweat.", "area": "Adhesion", "subcategory": "Tapes", "classification": "Problem", "answer": "Before placing it on your temple wipe your skin with a tissue to remove any residue oil and press gently for 3-5 seconds."}, {"id": "WA-074", "customer": "RG", "group": "RG", "date": "22/05", "text": "Device looks slick now and onboarding was a breeze! Tapes much better.", "area": "Hardware/Firmware", "subcategory": "Device Body", "classification": "Positive", "answer": ""}, {"id": "WA-075", "customer": "RG", "group": "RG", "date": "23/05", "text": "How long does the device take to charge? The low battery notification should include that info.", "area": "Hardware/Firmware", "subcategory": "Charger", "classification": "Suggestion", "answer": "To fully charge - about an hour and fifteen. 80% in 30 mins or so. Will do this."}, {"id": "WA-076", "customer": "RG", "group": "RG", "date": "23/05", "text": "I would make the charging box bigger and add time to charging info - may even consider a big countdown for time to use again - to reduce drop off/off-body times.", "area": "Product Team", "subcategory": "Feature Requests", "classification": "Suggestion", "answer": "We are also working on a live notification for charging states."}, {"id": "WA-077", "customer": "RG", "group": "RG", "date": "25/05", "text": "Entropy was lower on Friday and kept going up since Friday evening which coincided with illness.", "area": "Science Team", "subcategory": "Entropy", "classification": "Positive", "answer": "Entropy picks up illness. In fact, it starts picking up a day before illness really becomes symptomatic."}, {"id": "WA-078", "customer": "RG", "group": "RG", "date": "02/06", "text": "Unable to close the charging case.", "area": "Hardware/Firmware", "subcategory": "Charger", "classification": "Problem", "answer": "This is likely due to the holding magnet coming out. We are sending a replacement here."}, {"id": "WA-079", "customer": "RG", "group": "RG", "date": "14/06", "text": "No blinking light on the case for charging indication.", "area": "Hardware/Firmware", "subcategory": "Charger", "classification": "Question", "answer": "This is intentional. When you put the device on charge, the small LED will breathe 4 times and then stop."}, {"id": "WA-080", "customer": "Ragini", "group": "Ragini", "date": "13/05", "text": "When I skip adding my meal input from the previous day and eat today, then my last evening's enter food notification doesn't show - only today's does.", "area": "Tech", "subcategory": "Notifications", "classification": "Problem", "answer": "To check your missed food logs, you can scroll down to the previous days on the home page itself."}, {"id": "WA-081", "customer": "Ragini", "group": "Ragini", "date": "15/05", "text": "My favourite feature is the eating detection. However it doesn't detect drinking. By design?", "area": "Data Science", "subcategory": "Chewing Detection", "classification": "Question", "answer": "Haven't been able to detect drinking so far. It's part of our list of things to solve."}, {"id": "WA-082", "customer": "Ragini", "group": "Ragini", "date": "25/05", "text": "I feel like temperature is an important metric we're missing. I wish the battery lasted a little longer. I have extremely sensitive skin so removing the tape is leaving a slight mark. Data sync takes about a minute sometimes.", "area": "Adhesion", "subcategory": "Skin Issues", "classification": "Negative", "answer": ""}, {"id": "WA-083", "customer": "Ragini", "group": "Ragini", "date": "14/05", "text": "Same data not loading issue again post update - seems to be a bug.", "area": "Tech", "subcategory": "Sync & Data", "classification": "Problem", "answer": "Getting this looked into."}, {"id": "WA-084", "customer": "Ragini", "group": "Ragini", "date": "28/05", "text": "Morning 4-4:15 it kept saying connecting. Had already done the update and seen the last stats around 10pm. Had also fully charged it.", "area": "Tech", "subcategory": "Sync & Data", "classification": "Problem", "answer": "Getting this looked into. From a couple of days onwards, all updates will be in the background."}, {"id": "WA-085", "customer": "Ragini", "group": "Ragini", "date": "02/06", "text": "When my temple has fully charged and I don't immediately wear it back, I get a push notification every 5 minutes. Is that by design?", "area": "Tech", "subcategory": "Notifications", "classification": "Problem", "answer": "Not at all. Getting this looked into."}, {"id": "WA-086", "customer": "Ragini", "group": "Ragini", "date": "14/05", "text": "Suggestion - if my Bluetooth is off, maybe I should get a push notification similar to what I get when I close the app.", "area": "Tech", "subcategory": "Notifications", "classification": "Suggestion", "answer vening wind down feature in the works. You will be able to see your pre sleep Entropy and ways to optimise it."}, {"id": "WA-109", "customer": "Joel & Joy", "group": "Joel & Joy", "date": "14/06", "text": "Majorly for me in Whoop I just ask the chat bot. Would be great to have that on Temple.", "area": "Product Team", "subcategory": "Feature Requests", "classification": "Suggestion", "answer": "We're soon building a chat bot on the app to serve this and other needs."}, {"id": "WA-110", "customer": "Joel & Joy", "group": "Joel & Joy", "date": "14/06", "text": "Battery was almost 58% in morning, trained quickly, and by evening it showed low.", "area": "Hardware/Firmware", "subcategory": "Battery", "classification": "Problem", "answer": "Your battery was 58% on 13th June around 6pm. Morning of the 14th, it was around 40%. So, it drained as expected. We are launching battery trends on the app soon."}, {"id": "WA-111", "customer": "Kees", "group": "Kees", "date": "29/05", "text": "During workout (recovery run at 125 bpm), I am hitting entropy of around 190 - so off the scale of 120?", "area": "Science Team", "subcategory": "Entropy", "classification": "Question", "answer": "The actual range for Entropy is 1-200. We only show up to 120 on the scale. 120+ is almost always achieved in workouts. We will change the range of the Entropy dial to 1-200 on the home page."}, {"id": "WA-112", "customer": "Kees", "group": "Kees", "date": "30/05", "text": "Between the Garmin and Oura it is just not enough new insight for me.", "area": "Science Team", "subcategory": "Entropy", "classification": "Negative", "answer": ""}, {"id": "WA-113", "customer": "Kunal Khambhati", "group": "Kunal Khambhati", "date": "23/05", "text": "Packaging for early access/beta mode - brown box was underwhelming even for early access. Metal case and device felt really good in the hand.", "area": "Manufacturing", "subcategory": "Packaging", "classification": "Negative", "answer": ""}, {"id": "WA-114", "customer esn't change as much during meditation. But the focus changes a lot during meditation but not much during the shower.", "area": "Science Team", "subcategory": "Entropy", "classification": "Question", "answer": ""}, {"id": "WA-120", "customer": "Merani", "group": "Merani", "date": "15/06", "text": "The biggest problem with the device is that you have to explain to each person you meet. Infact strangers come up to me and start conversations just to know what I'm wearing.", "area": "Hardware/Firmware", "subcategory": "Device Body", "classification": "Negative", "answer": ""}, {"id": "WA-121", "customer": "Nicco", "group": "Nicco", "date": "30/05", "text": "Entropy in the night was low as 3 but up and down.", "area": "Science Team", "subcategory": "Entropy", "classification": "Question", "answer": "Looks related to your sleep cycles, Deep and REM."}, {"id": "WA-122", "customer": "Nicco", "group": "Nicco", "date": "02/06", "text": "Last night I slept 6 hours but I woke up for 5 min to drink at night and fell asleep again. The tracker only sees 3 hours of sleep. So it is not merging the sleep sessions?", "area": "Data Science", "subcategory": "Sleep Tracking", "classification": "Problem", "answer": "Your second half of the sleep looks very disturbed with high motion. We are updating our algos to capture these types of disturbed sleep better."}, {"id": "WA-123", "customer": "RP", "group": "RP", "date": "05/06", "text": "Apologies for the delay, we're just trying to align with Rishabh and BCCI on permissions for the onboarding person.", "area": "Support", "subcategory": "Onboarding", "classification": "Negative", "answer": ""}, {"id": "WA-124", "customer": "RP", "group": "RP", "date": "08/06", "text": "The permissions at the hotel have been a menace and same with getting time during the game. Would it be possible to arrange for someone to visit Rishabh for the onboarding at his Delhi house?", "area": "Support", "subcategory": "Logistics", "classification": "Problem", "answe mputation is done and on app open it fetches the data again.", "area": "Tech", "subcategory": "Notifications", "classification": "Suggestion", "answer": ""}, {"id": "WA-142", "customer": "Vatsal", "group": "Vatsal", "date": "21/05", "text": "Maybe night time twists and turns are computed as steps - not sure.", "area": "Data Science", "subcategory": "Accuracy", "classification": "Problem", "answer": ""}, {"id": "WA-143", "customer": "Vatsal", "group": "Vatsal", "date": "21/05", "text": "Can I wear it in sauna? It'll be at 70 degrees.", "area": "Hardware/Firmware", "subcategory": "Sensor", "classification": "Question", "answer": "Sauna is fine. Max temple temp reached is 45ish at 70 degrees. Temple area is at core body temperature so there's a cooling effect on the device."}, {"id": "WA-144", "customer": "Vatsal", "group": "Vatsal", "date": "21/05", "text": "Do you have a temperature sensor on it?", "area": "Hardware/Firmware", "subcategory": "Sensor", "classification": "Question", "answer": "We use IMU temp sensor. Didn't have space for a dedicated temp sensor. Next version for sure."}, {"id": "WA-145", "customer": "Vatsal", "group": "Vatsal", "date": "22/05", "text": "Anyway to know how much charge is in the battery case?", "area": "Hardware/Firmware", "subcategory": "Charger", "classification": "Question", "answer": "No, it's binary - white or red. Fixing this in the next version."}, {"id": "WA-146", "customer": "Vatsal", "group": "Vatsal", "date": "23/05", "text": "I forgot wearing the temple because I put it to charge - we should add multiple reminders to wear it as soon as it is charged. Biggest drop off event.", "area": "Tech", "subcategory": "Notifications", "classification": "Suggestion", "answer": "We currently send a notification when Temple is fully charged asking user to re-wear. A live notification tray is also in works."}, {"id": "WA-147", "customer": "Vatsal", "group": "Vatsal", "date": "25/05", "text": "Still not able to figure how to use Brain flow - basically it's at 80 now, how do I control or move it?", "area": "Science Team", "subcategory": "Brain Flow", "classification": "Question", "answer": ""}, {"id": "WA-148", "customer": "Vidur", "group": "Vidur", "date": "29/05", "text": "When the eating detection notification comes and I put in the food, the notification doesn't go away and requires a refresh of the page.", "area": "Tech", "subcategory": "App Crashes", "classification": "Problem", "answer": "Noted. Will fix it."}, {"id": "WA-149", "customer": "Vidur", "group": "Vidur", "date": "30/05", "text": "Bug - troubleshooting guide page is not accessible.", "area": "Tech", "subcategory": "App Crashes", "classification": "Problem", "answer": "Getting this fixed. Thanks for checking."}, {"id": "WA-150", "customer": "Vidur", "group": "Vidur", "date": "30/05", "text": "FAQ section doesn't have a description of entropy. Even the app itself doesn't really describe the constituents/drivers of entropy as a metric. If I am going to run my life basis that metric, I would like to know what goes into it.", "area": "Science Team", "subcategory": "Entropy", "classification": "Suggestion", "answer": "Yes, this is under works. We will also be releasing a white paper on Entropy."}, {"id": "WA-151", "customer": "Vidur", "group": "Vidur", "date": "01/06", "text": "In the FAQ section, you can also add a boilerplate answer for 'what is this device?' in local language.", "area": "Product Team", "subcategory": "Feature Requests", "classification": "Suggestion", "answer": "We will soon update the website so that you can tell people to go to temple.com."}, {"id": "WA-152", "customer": "Vidur", "group": "Vidur", "date": "01/06", "text": "Put a tape dispenser in the battery box. There are zero situations where the user uses the charger and does not need the sticking tape thereafter.", "area": "Hardware/Firmware", "subcategory": "Charger", "classification": "Suggestion", "answer": "We are making a pouch for the charger and also have a pocket for the tapes."}, {"id": "WA-153", "customer": "Vidur", "group": "Vidur", "date": "01/06", "text": "The new tapes with the stencils - after changing stickers 3-4 times I don't think it's a big problem to match the device to the stickers. The larger size of the stencil wala sticker might outweigh the benefit.", "area": "Adhesion", "subcategory": "Tapes", "classification": "Suggestion", "answer": "I agree with this. We are in two minds about this."}, {"id": "WA-154", "customer": "Vidur", "group": "Vidur", "date": "02/06", "text": "Is there a way to see three charts - entropy, CBF and HR on the same chart with time on the x-axis?", "area": "Product Team", "subcategory": "Feature Requests", "classification": "Suggestion", "answer": "This is a super advanced user feature. Some users find even the existing charts too many."}, {"id": "WA-155", "customer": "Vidur", "group": "Vidur", "date": "02/06", "text": "Feature request: Ability to annotate activities on the chart itself.", "area": "Product Team", "subcategory": "Feature Requests", "classification": "Suggestion", "answer": "Currently we have a feature where you can tag the peaks in Brain flow and troughs in Entropy."}, {"id": "WA-156", "customer": "Vidur", "group": "Vidur", "date": "05/06", "text": "Let's say I have just charged my temple and have put it back on my face. It seems like the device doesn't get calibrated till I open the app. Background calibration would be a good feature.", "area": "Tech", "subcategory": "Sync & Data", "classification": "Problem", "answer": "Sounds like a bug. It should get calibrated in the background automatically. Getting it checked. Fixed - calibration was completing but banner wasn't clearing."}], "members": [{"name": "Aakash", "group": "Aakash", "thread": [{"sender": "DG US", "is_team": true, "date": "14/05", "text": "Karan - one temple onboarding tomorrow for Aakash please."}, {"sender": "Karan Temple CS", "is_team": true, "date": "14/05", "text": "Sure Deepi."}, {"sender": "DG US", "is_team": true, "date": "14/05", "text": "Aakash - please send us time and location, and we will make it happen."}, {"sender": "+91 99582 05206", "is_team": false, "date": "14/05", "text": "is Saturday good?\n11:30am <This message was edited>"}, {"sender": "+91 99582 05206", "is_team": false, "date": "14/05", "text": "13, Kautilya Marg\nChanakyapuri\nNew Delhi-21"}, {"sender": "Karan Temple CS", "is_team": true, "date": "14/05", "text": "Sure Aakash. We will be there at 11.30AM"}, {"sender": "DG US", "is_team": true, "date": "14/05", "text": "Aakash – this group serves as your customer care, product feedback, or friendly help for any questions you might have. Feel free to ask for replacement devices/tapes in case you lose your Temple and so on…"}, {"sender": "+91 99582 05206", "is_team": false, "date": "14/05", "text": "Cool\nthanks\nlook fwd to use/experience the device"}, {"sender": "+91 99582 05206", "is_team": false, "date": "15/05", "text": "Karan\ni would be reaching by 12:30 if that’s ok\ncould u pls plan accordingly\nthanks"}, {"sender": "Karan Temple CS", "is_team": true, "date": "16/05", "text": "Sure Aakash. Will be there by 12.30."}, {"sender": "+91 99582 05206", "is_team": false, "date": "16/05", "text": "thanks"}, {"sender": "+91 99582 05206", "is_team": false, "date": "19/05", "text": "Karan\nif i drop the device somewhere or misplace it\nis there a way to track it (like findmy on iphone)"}, {"sender": "Karan Temple CS", "is_team": true, "date": "19/05", "text": "Not yet, Aakash. We are building this feature and will launch this soon.\nMeanwhile, if you ever lose or misplace the device we will send a replacement device for you immediately."}, {"sender": "+91 99582 05206", "is_team": false, "date": "19/05", "text": "ok cool"}, {"sender": "+91 99582 05206", "is_team": false, "date": "19/05", "text": "demanding customers 😅"}, {"sender": "+91 99582 05206", "is_team": false, "date": "19/05", "text": "also…my kids rejected placement on temple\nso i am wearing behind my ear 😂"}, {"sender": "DG US", "is_team": true, "date": "19/05", "text": "Temple will not work for any other location, other than the temple."}, {"sender": "DG US", "is_team": true, "date": "19/05", "text": "Next year’s version."}, {"sender": "DG US", "is_team": true, "date": "19/05", "text": "The physiology of the temporal area is unique – the way the trigeminal nerves interact with the temporal artery. This physiology is not available anywhere else on the body."}, {"sender": "DG US", "is_team": true, "date": "19/05", "text": "= need to ask the kids to get used to the “people from the future” 😀"}, {"sender": "+91 99582 05206", "is_team": false, "date": "19/05", "text": "data is showing well though…outside of brain flow"}, {"sender": "DG US", "is_team": true, "date": "19/05", "text": "Entropy and Brain Flow – both won’t work. everything else will"}, {"sender": "+91 99582 05206", "is_team": false, "date": "19/05", "text": "i did :)\nshot down"}, {"sender": "+91 99582 05206", "is_team": false, "date": "19/05", "text": "IMG-20260519-WA0002.jpg (file attached)"}, {"sender": "+91 99582 05206", "is_team": false, "date": "19/05", "text": "IMG-20260519-WA0004.jpg (file attached)"}, {"sender": "+91 99582 05206", "is_team": false, "date": "19/05", "text": "placement i am trying👆"}, {"sender": "DG US", "is_team": true, "date": "19/05", "text": "This location is not going to work, Aakash. The scores are not going to be even directionally correct."}, {"sender": "DG US", "is_team": true, "date": "19/05", "text": "If temple is not for you, happy to refund the money and you can return the device. But please don’t wear it here - bad for our brand as well."}, {"sender": "+91 99582 05206", "is_team": false, "date": "19/05", "text": "it solves a big problem for me\ni am not able to wear ring and whoop….they are interfering with day to day"}, {"sender": "+91 99582 05206", "is_team": false, "date": "19/05", "text": "temple get plugged seamlessly"}, {"sender": "+91 99582 05206", "is_team": false, "date": "19/05", "text": "and i will chat when we meet tomm"}, {"sender": "+91 99582 05206", "is_team": false, "date": "19/05", "text": "see you"}, {"sender": "DG US", "is_team": true, "date": "19/05", "text": "See you!"}, {"sender": "DG US", "is_team": true, "date": "20/05", "text": "This message was deleted"}]}, {"name": "Ajit", "group": "Ajit", "thread": [{"sender": "Karan Temple CS", "is_team": true, "date": "11/05", "text": "Hi Ajit, I’m Karan from the Temple team, along with Akriti [@⁨+919289946764⁩].\nExcited to have you as one of our first 100 Founding Users.\nThis group is your direct line to us. Please send anything that comes up while using Temple - bugs, ideas, screenshots, voice notes, confusing moments, things you like, and things that frustrate you.\nThe more honest you are, the more useful it is for us."}, {"sender": "+91 99998 86558", "is_team": false, "date": "11/05", "text": "Hello folks, thanks for reaching out.\nI shall be in touch shortly!"}, {"sender": "DG US", "is_team": true, "date": "15/05", "text": "Ajit - how’s it going with temple"}, {"sender": "DG US", "is_team": true, "date": "15/05", "text": "Pls let us know if you have any questions or suggestions"}, {"sender": "+91 99998 86558", "is_team": false, "date": "15/05", "text": "Going well, Deepi!\nI do have some questions. I'll compile them and post them here, before tomorrow ends 🫠\nBut I have to say, this app is absolutely beautiful. Beyond words."}, {"sender": "DG US", "is_team": true, "date": "15/05", "text": "Can keep sending questions as and when they come"}, {"sender": "DG US", "is_team": true, "date": "15/05", "text": "Please treat this group as your customer care channel 🙂"}, {"sender": "+91 99998 86558", "is_team": false, "date": "15/05", "text": "Yes, absolutely."}, {"sender": "+91 99998 86558", "is_team": false, "date": "17/05", "text": "Hey everyone,\nA few questions and things I've noticed. Please feel free to respond at your convenience.\n1. Reducing Entropy: I've got a rough idea of when it spikes, but still figuring out what actually brings it down and keeps it low. Do we know what I could try\n2. Sleep position & recovery: I usually sleep on my tummy, but switched to my side last night and felt noticeably better. Both cognitive and physical recovery were the highest I've hit. I'm wondering, what else do we know that actually moves the sleep score?\n3. UI overlap bug: When Entropy is just a point or two away from a section boundary, the numbers on the left start overlapping. Attaching a screenshot - you can see it tightly packed at 20/25, it overlaped when my Entropy hit 91 the day before (missed getting a screenshot of that)."}, {"sender": "+91 99998 86558", "is_team": false, "date": "17/05", "text": "IMG-20260517-WA0002.jpg (file attached)"}, {"sender": "+91 98713 00111", "is_team": false, "date": "17/05", "text": "Hello hello!\n1. To get your Entropy down you can try - meditation, cold shower, head down tilt, and even sleeping!\n—\n2. Side sleeping improves glymphatic system (brain clearance system) at night, your BF will be lower and you will see higher Cognitive Recovery.\nSleeping on right side, is even better.\nTo really move the sleep score, try to reduce your entropy and keep it low for 1-2 hrs before sleeping. Very highly correlated.\nYou can do things like;\n- Breathing\n- ⁠wash face and feet with cold water\n- ⁠cold environment - very good for deep sleep\n- ⁠finish eating 3 hrs before sleeping <This message was edited>"}, {"sender": "+91 98713 00111", "is_team": false, "date": "17/05", "text": "Noted here!"}, {"sender": "DG US", "is_team": true, "date": "18/05", "text": "Regular sleep, and low/no substance abuse is the most important factor in getting entropy down @⁨~Ajit Singh⁩"}, {"sender": "+91 99998 86558", "is_team": false, "date": "18/05", "text": "A bowl of litchis just spiked it. That's possible?"}, {"sender": "+91 99998 86558", "is_team": false, "date": "18/05", "text": "IMG-20260518-WA0000.jpg (file attached)"}, {"sender": "+91 98713 00111", "is_team": false, "date": "18/05", "text": "Eating does increase entropy.\nExtent of increase depends on the food item and how it affects your body. It can vary from person to person."}, {"sender": "DG US", "is_team": true, "date": "25/05", "text": "How’s it going with temple? Any new observations?"}, {"sender": "+91 99998 86558", "is_team": false, "date": "25/05", "text": "No new observations yet, Deepi. Honestly, I haven't done what I needed to for the feedback I was hoping for.\nPlanning to take a stab at a few things this week though: meditation, strength training, and stretching. Will keep you all posted on my observations.\nBTW, the new interface looks really good."}, {"sender": "+91 99998 86558", "is_team": false, "date": "26/05", "text": "IMG-20260526-WA0002.jpg (file attached)\nAre we planning to change this icon to the kind of activity logged?"}, {"sender": "+91 99998 86558", "is_team": false, "date": "26/05", "text": "IMG-20260526-WA0003.jpg (file attached)\nThis was meditation this morning.\nWhen I click the activity, the icon depicting meditation is quite apt."}]}, {"name": "Akanksha", "group": "Akanksha", "thread": [{"sender": "Veer New", "is_team": true, "date": "02/06", "text": "Hi Akanksha, it was great meeting you.\nThis group is your direct line to us. Please use this group for anything that comes up while using the app: bugs, ideas, screenshots, voice notes, things you like, and things that you don't\nCheers."}, {"sender": "+91 98104 92531", "is_team": false, "date": "03/06", "text": "IMG-20260603-WA0000.jpg (file attached)\nHey Veer - yesterday you explained that entropy would be high in sleep, which is similar here for me but why is my entropy so high after waking up too. Have been awake for an hour so but doesn’t seem to be coming down"}, {"sender": "+91 98104 92531", "is_team": false, "date": "03/06", "text": "IMG-20260603-WA0002.jpg (file attached)\nHey Veer - yesterday you explained that entropy would be high in sleep, which is similar here for me but why is my entropy so high after waking up too. Have been awake for an hour so but doesn’t seem to be coming down"}, {"sender": "Veer New", "is_team": true, "date": "03/06", "text": "Hi @⁨~Akanksha⁩ entropy goes down at night if you’ve had a good sleep, as you’re calmer. In your case,\n1. I would wait 3 days for the device to calibrate to you and give accurate data\n2. ⁠You can always dip your face in ice, and do some breath work to lower it"}, {"sender": "Veer New", "is_team": true, "date": "03/06", "text": "And as I can see from the screenshot, you were in 1hr 25 mins of zen mode which is great 😊"}, {"sender": "+91 98104 92531", "is_team": false, "date": "04/06", "text": "My entropy was quite high through the day. Switched side after my night routine and the entropy came down by about 30-40 points. Out of curiosity, i switched side again - went up by ~30 points again.\nRight side - high entropy\nLeft side - much lower"}, {"sender": "+91 98104 92531", "is_team": false, "date": "04/06", "text": "IMG-20260604-WA0006.jpg (file attached)\nFor a moment, i thought i was surplus by 1516 calories. Then saw burned on the right to realise that surplus was just a tag."}, {"sender": "+91 98104 92531", "is_team": false, "date": "04/06", "text": "IMG-20260604-WA0008.jpg (file attached)\nFor a moment, i thought i was surplus by 1516 calories. Then saw burned on the right to realise that surplus was just a tag."}, {"sender": "Ramni", "is_team": true, "date": "05/06", "text": "Hey Akanksha,\nGot it, let me check with the backend team and get back to you on this soon!"}, {"sender": "Ramni", "is_team": true, "date": "05/06", "text": "- Getting back on this, just like a variation in a Blood pressure machine between your left and right arm there could be a difference in blood flow between left and right placement sides sometimes. We are continuously working on newer updates to make this even more accurate and I'll keep you in the loop.\n- Yes, the app tags the surplus which in this case is marginal at 16 :) Calories consumed in total were 1516 and 1500 of those were calories burned."}, {"sender": "+91 98104 92531", "is_team": false, "date": "07/06", "text": "IMG-20260607-WA0000.jpg (file attached)\nDue to a sudden event today, felt very anxious at a point where my heart rate shot up. Was pleased to see the same trend in heart reads of the device as well. However, entropy didn’t show much of a change. It remained in a similar range over a longer period. Curious to know why that would be."}, {"sender": "+91 98104 92531", "is_team": false, "date": "07/06", "text": "IMG-20260607-WA0001.jpg (file attached)"}, {"sender": "Ramni", "is_team": true, "date": "08/06", "text": "Hi Akanksha\nSorry to hear that you had a tough time yesterday. Hope everything is better now?\nYes your metrics did show a change in blood flow pattern which was captured in your entropy metric, however at the same time we also saw a significant drop in temperature.\nDo you remember washing your face or entering a much colder environment at that time? Was there anything you did do cope with the anxiety that helped you?\nIf you are comfortable to share, we can understand how your body’s entropy remained stable through the event."}, {"sender": "+91 98104 92531", "is_team": false, "date": "08/06", "text": "Washing face - no i was sitting at a restaurant and was present there for at least next 20 mins or so.\nI did nothing to cope with it, i was fine in a few mins.\nIt wasn’t a clinical anxiety or panic attack. Some medical reports of a family member were awaited. The notification came unexpectedly which shot up my anxiety. I couldn’t open it immediately because of the social setting i was in and the reports took time to load too. So, i could actually hear my heartbeat for a couple of mins - something that’s visible from the heart rate spike. Entropy showed no such disturbance though."}, {"sender": "+91 98104 92531", "is_team": false, "date": "09/06", "text": "IMG-20260609-WA0000.jpg (file attached)\nWhy is active cal burned bar indicated in red(ish) tone? It is similar to the colour of “Diffused” state in Focus, which i think indicates underperformance in that metric. Shouldn’t the bar be in green considering most positive things in app like higher brain flow, lower entropy, etc are indicated in green, or am i missing something?\nRed bar filling up on active days, gives me dissonance."}, {"sender": "Ramni", "is_team": true, "date": "09/06", "text": "That’s really good feedback Akanksha. Noted and I’ll take it up with the team."}, {"sender": "Ramni", "is_team": true, "date": "09/06", "text": "How is the app working for you otherwise?"}, {"sender": "Ramni", "is_team": true, "date": "09/06", "text": "Now your device would be calibrated to your body signals.\nAre you happy with the pointers you get on Temple Sense? Hope those helpful to you as you go about your day!"}, {"sender": "+91 98104 92531", "is_team": false, "date": "09/06", "text": "All’s good :)"}, {"sender": "+91 98104 92531", "is_team": false, "date": "13/06", "text": "IMG-20260613-WA0006.jpg (file attached)\nLogged in my period. A few things here -\n1. ⁠Let me log in my dates, it is auto logging for me the first time itself. I haven’t synced apple health with this so not sure from where it is picking the estimate. 5 days is common but anything between 2-7 is normal and not as uncommon.\n2. ⁠Even when it’s auto logging we could make de-selection easier with a straightforward tap on the calendar date. Took sometime to find the edit button at the bottom. Apple health has made this calendar logging bit quite simple i think.\n3. ⁠The calendar on the top should be forward scrollable too so i can see the ovulation window like apple health and flo\n4. ⁠Predictions - the hierarchy looks off. Shouldn’t it be the name of the predicted vector followed by the date? Took me a while to understand that second one is for my next cycle. Saying “period in” x days when my current one has just started felt off"}, {"sender": "Ramni", "is_team": true, "date": "13/06", "text": "Noted Akanksha! Will relay this to the team"}, {"sender": "Ramni", "is_team": true, "date": "13/06", "text": "Keep it coming :) this is very helpful"}]}, {"name": "Akshant", "group": "Akshant", "thread": [{"sender": "Karan Temple CS", "is_team": true, "date": "11/05", "text": "Hi Akshant, I’m Karan from the Temple team, along with Akriti [@⁨Akriti⁩].\nExcited to have you as one of our first 100 Founding Users.\nThis group is your direct line to us. Please send anything that comes up while using Temple — bugs, ideas, screenshots, voice notes, confusing moments, things you like, and things that frustrate you.\nThe more honest you are, the more useful it is for us."}, {"sender": "+91 99202 13572", "is_team": false, "date": "11/05", "text": "sounds good"}, {"sender": "+91 99202 13572", "is_team": false, "date": "11/05", "text": "First one  - I am trying to look for my calories consumed data from yesterday. Where can I find it on the app?"}, {"sender": "Karan Temple CS", "is_team": true, "date": "11/05", "text": "You can click on today's calories consumed card and navigate to yesterday using the arrows on top right.\nAdding this to the day end summary soon for easier access."}, {"sender": "+91 99202 13572", "is_team": false, "date": "11/05", "text": "got it, thanks"}, {"sender": "+91 99202 13572", "is_team": false, "date": "13/05", "text": "I don’t get to understand why my recovery is low and what can make it better"}, {"sender": "+91 99202 13572", "is_team": false, "date": "13/05", "text": "All the metrics shown under recovery are good for me - RHR, HRV, Sleep Efficiency, total sleep time etc"}, {"sender": "+91 99202 13572", "is_team": false, "date": "13/05", "text": "But cognitive recovery is 73% and physical 86%"}, {"sender": "+91 99202 13572", "is_team": false, "date": "13/05", "text": "I dont understand what was missing and what do I need to do to address it"}, {"sender": "+91 99202 13572", "is_team": false, "date": "13/05", "text": "Can share my screenshots here"}, {"sender": "Karan Temple CS", "is_team": true, "date": "13/05", "text": "Hi Akshant - apologies for late response.\nThere are additional factors which determine recovery, not being reflected on the app currently.\nWe will be live with these by the end of the week which will help you better understand both the reasons and the actionables for a good recovery score."}, {"sender": "+91 99202 13572", "is_team": false, "date": "13/05", "text": "Great"}, {"sender": "+91 99202 13572", "is_team": false, "date": "14/05", "text": "IMG-20260514-WA0004.jpg (file attached)"}, {"sender": "+91 99202 13572", "is_team": false, "date": "14/05", "text": "This drop in entropy seems accidental. Its at the precise time I got up in the morning. Its a momentary dip to 6. Should we record and show “low” like this or follow RHR kind of maths which requires a reasonable period"}, {"sender": "DG US", "is_team": true, "date": "14/05", "text": "Discussed this yesterday"}, {"sender": "+91 99202 13572", "is_team": false, "date": "14/05", "text": "IMG-20260514-WA0009.jpg (file attached)"}, {"sender": "+91 99202 13572", "is_team": false, "date": "14/05", "text": "1. At the top, once I pause the activity, it is not obvious how do I end it. That action is buried inside the 3 vertical dots."}, {"sender": "+91 99202 13572", "is_team": false, "date": "14/05", "text": "2. Physical work at 0.1 is not getting updated here. Even in the screenshot below, you will see that while at the top physical work is updated to 8.1, the activity log is still showing 0.1"}, {"sender": "+91 99202 13572", "is_team": false, "date": "14/05", "text": "IMG-20260514-WA0010.jpg (file attached)"}, {"sender": "+91 99202 13572", "is_team": false, "date": "14/05", "text": "3. Question - is our science for calculating active calories burned same as other wearables? I have read in the past that wearables meaningfully over state active calories by using outdated science and not incorporating all the signals. This become more important if active calories is also an input to Physical Work."}, {"sender": "+91 99202 13572", "is_team": false, "date": "14/05", "text": "IMG-20260514-WA0011.jpg (file attached)"}, {"sender": "+91 99202 13572", "is_team": false, "date": "14/05", "text": "4. I have noticed that physical work moves up meaningfully when doing cardio and does not move up that much on strength training. Could be linked to #3 above where we are relying on HR as a core indicator. Someone doing strength training with large gaps between sets will run at 100-110 HR in strength vs a normal jog which can average 130-140 HR."}, {"sender": "DG US", "is_team": true, "date": "14/05", "text": "Kept it intentional to keep the screen clean. One time learning. There’s nowhere else to go for ending activity."}, {"sender": "DG US", "is_team": true, "date": "14/05", "text": "Checking the sync issue - will get back"}, {"sender": "DG US", "is_team": true, "date": "14/05", "text": "No, we also do strength workouts really well. Other wearables don’t."}, {"sender": "DG US", "is_team": true, "date": "14/05", "text": "Our strength calories are based on entropy swings. Heart rate doesn’t capture strength training intensity."}, {"sender": "DG US", "is_team": true, "date": "14/05", "text": "Will check your data"}, {"sender": "DG US", "is_team": true, "date": "14/05", "text": "This issue was fixed yesterday. Should go live with today’s release."}, {"sender": "+91 99202 13572", "is_team": false, "date": "14/05", "text": "can we not have a \"square\" next to the \"resume\" button? Once I hit pause, it shows both those buttons."}, {"sender": "DG US", "is_team": true, "date": "14/05", "text": "Did you do strength training today?"}, {"sender": "+91 99202 13572", "is_team": false, "date": "14/05", "text": "No, running"}, {"sender": "+91 99202 13572", "is_team": false, "date": "14/05", "text": "IMG-20260514-WA0012.jpg (file attached)"}, {"sender": "+91 99202 13572", "is_team": false, "date": "14/05", "text": "Same input showing 988 kcal today. “cortado coffee + 5 overnight soaked almonds”"}, {"sender": "+91 99202 13572", "is_team": false, "date": "14/05", "text": "This is what I was seeing for last 3-4 days since wearing Temple"}, {"sender": "+91 99202 13572", "is_team": false, "date": "14/05", "text": "IMG-20260514-WA0013.jpg (file attached)\nThis is today"}, {"sender": "DG US", "is_team": true, "date": "14/05", "text": "This went from 5 pieces, to 5 portions I think"}, {"sender": "+91 99202 13572", "is_team": false, "date": "14/05", "text": "My input was exactly same"}, {"sender": "DG US", "is_team": true, "date": "14/05", "text": "Hmm, these are AI goof ups - will see if we can do something about it"}, {"sender": "+91 99202 13572", "is_team": false, "date": "19/05", "text": "The entropy dial shows a max of 160 but my entropy was 180+ while running today"}, {"sender": "DG US", "is_team": true, "date": "19/05", "text": "By design – post that, you are overclocking the engine"}, {"sender": "+91 99202 13572", "is_team": false, "date": "19/05", "text": "Got it"}, {"sender": "DG US", "is_team": true, "date": "19/05", "text": "Not intuitive?"}, {"sender": "DG US", "is_team": true, "date": "19/05", "text": "Can take the dial back to 200"}, {"sender": "+91 99202 13572", "is_team": false, "date": "19/05", "text": "My HR was around 160 at that time. I felt it was moderate effort. So yes was a bit non intuitive"}, {"sender": "+91 99202 13572", "is_team": false, "date": "19/05", "text": "IMG-20260519-WA0001.jpg (file attached)"}, {"sender": "+91 99202 13572", "is_team": false, "date": "22/05", "text": "IMG-20260522-WA0000.jpg (file attached)"}, {"sender": "DG US", "is_team": true, "date": "25/05", "text": "How’s it going with temple? Any new observations?"}, {"sender": "+91 99202 13572", "is_team": false, "date": "25/05", "text": "Was about to message. Entropy and f
